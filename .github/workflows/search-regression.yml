name: Search & Export Quality Check

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/search-regression.yml'
      - 'wiki/**'
      - 'scripts/**'
      - 'schema/**'
      - 'sources/**'
  pull_request:
    paths:
      - '.github/workflows/search-regression.yml'
      - 'wiki/**'
      - 'scripts/**'
      - 'schema/**'
      - 'sources/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-ci-lite.txt

      - name: Install dependencies
        run: pip install -r requirements-ci-lite.txt

      - name: Run CI preflight
        id: preflight
        run: python3 scripts/ci_preflight.py

      - name: Summary
        if: always()
        run: |
          echo "## CI preflight（搜索回归 / Wiki lint / 导出质量）" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "步骤结果：**${{ steps.preflight.outcome }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "脚本 \`ci_preflight.py\` 依次执行：目录同步与导出、搜索质量回归、\`lint_wiki --report\`、导出一致性检查。详见日志中的各子步骤。" >> "$GITHUB_STEP_SUMMARY"
