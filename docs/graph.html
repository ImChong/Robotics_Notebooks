<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Robotics Notebooks 知识图谱 — 75 个概念节点、429 条关联边、8 个社区的力导向可视化" />
  <title>知识图谱 | Robotics Notebooks</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕸️</text></svg>" />
  <meta name="color-scheme" content="dark light" />
  <script src="theme-init.js"></script>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── 图谱页专用样式（不影响其他页面）── */
    body { 
      overflow: hidden; 
      font-family: var(--font-sans);
    }

    /* 显式声明字体以防部分浏览器组件继承失效 */
    #graph-toolbar, .filter-panel, .physics-panel, #graph-tooltip, #graph-sidebar, #graph-legend, #graph-legend-fab, .chip, .mode-chip, .filter-mode-chip, .filter-subtitle {
      font-family: var(--font-sans);
    }

    /* ── 工具栏 ── */
    #graph-toolbar {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      background: rgba(13, 17, 23, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-wrap: wrap;
    }
    #graph-search {
      height: 34px;
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #e6edf3;
      font-size: .85rem;
      font-family: inherit;
      width: 180px;
      outline: none;
      transition: border-color .18s, width .22s;
    }
    #graph-search::placeholder { color: rgba(255,255,255,0.3); }
    #graph-search:focus { border-color: rgba(0,212,255,0.5); width: 240px; }
    /* 专题视图区块（在筛选面板里，可折叠 <details>）*/
    .filter-topic-section {
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .filter-topic-summary {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      list-style: none;
      user-select: none;
      transition: background .12s;
    }
    .filter-topic-summary:hover { background: rgba(255,255,255,0.03); }
    .filter-topic-summary::-webkit-details-marker { display: none; }
    .filter-topic-summary::after {
      content: '▾';
      margin-left: auto;
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      transition: transform .18s;
    }
    .filter-topic-section[open] .filter-topic-summary::after {
      transform: rotate(180deg);
    }
    .filter-topic-summary-label {
      font-size: .68rem;
      font-weight: 700;
      color: rgba(255,255,255,0.34);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .filter-topic-summary-current {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .75rem;
      font-weight: 600;
      color: rgba(255,255,255,0.78);
    }
    .filter-topic-summary-current span:first-child { font-size: .92rem; line-height: 1; }
    .filter-topic-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 2px 14px 12px;
    }
    .filter-topic-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 26px;
      padding: 0 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.65);
      font-size: .74rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .15s, color .15s, background .15s;
      white-space: nowrap;
    }
    .filter-topic-chip:hover {
      border-color: rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.92);
    }
    .filter-topic-chip.is-active {
      background: rgba(0,212,255,0.16);
      border-color: rgba(0,212,255,0.55);
      color: #e6edf3;
    }
    .filter-topic-chip span:first-child { font-size: .9rem; line-height: 1; }
    .chip-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      height: 28px;
      padding: 0 11px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.5);
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .chip:hover { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.8); }
    .chip.is-running {
      background: rgba(0,212,255,0.16);
      border-color: rgba(0,212,255,0.55);
      color: #e6edf3;
      cursor: wait;
    }
    .chip:disabled {
      opacity: 0.72;
      cursor: wait;
    }
    .chip.active {
      background: #00d4ff;
      color: #0d1117;
      border-color: transparent;
      font-weight: 700;
    }
    .chip[data-type="concept"].active    { background: #60a5fa; }
    .chip[data-type="method"].active     { background: #34d399; }
    .chip[data-type="task"].active       { background: #f472b6; }
    .chip[data-type="entity"].active     { background: #fbbf24; }
    .chip[data-type="comparison"].active { background: #c084fc; }
    .chip[data-type="query"].active      { background: #94a3b8; color: #fff; }
    .chip[data-type="formalization"].active { background: #fb923c; }
    .toolbar-sep { width: 1px; height: 24px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
    .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    #graph-node-count {
      font-size: .78rem;
      color: rgba(255,255,255,0.3);
      white-space: nowrap;
      margin-left: auto;
    }
    #graph-back {
      display: inline-flex; align-items: center; gap: 5px;
      height: 28px; padding: 0 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.55);
      font-size: .8rem;
      text-decoration: none;
      transition: all .15s;
      white-space: nowrap;
    }
    #graph-back:hover { border-color: rgba(255,255,255,0.3); color: #e6edf3; text-decoration: none; }

    /* ── 画布 ── */
    #graph-wrap {
      position: fixed;
      top: calc(var(--header-h) + 46px);
      left: 0; right: 0; bottom: 0;
    }
    #graph-canvas {
      width: 100%; height: 100%;
      background:
        radial-gradient(circle at 20% 20%, rgba(96,165,250,.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(52,211,153,.04) 0%, transparent 50%),
        #0d1117;
      cursor: grab;
      display: block;
    }
    #graph-canvas:active { cursor: grabbing; }

    /* dot-grid overlay (CSS only) */
    #graph-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Tooltip ── */
    #graph-tooltip {
      position: fixed;
      z-index: 200;
      padding: 12px 15px;
      border-radius: 10px;
      background: rgba(22, 27, 34, 0.97);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      max-width: 280px;
      max-height: 70vh;
      overflow-y: auto;
      pointer-events: none;
      transition: opacity .12s;
    }
    #graph-tooltip.hidden { opacity: 0; pointer-events: none !important; }
    #graph-tooltip.tt-pinned {
      pointer-events: auto;
      border-color: rgba(0,212,255,0.35);
      box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,212,255,0.15);
    }
    .tt-type {
      display: inline-block;
      font-size: .7rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .tt-title { font-size: .92rem; font-weight: 700; color: #e6edf3; margin-bottom: 5px; line-height: 1.3; }
    .tt-summary { font-size: .78rem; color: rgba(255,255,255,0.45); line-height: 1.5; }
    .tt-link {
      display: inline-block;
      font-size: .72rem;
      color: rgba(0,212,255,0.8);
      margin-top: 9px;
      text-decoration: none;
      border-bottom: 1px solid rgba(0,212,255,0.3);
      transition: color .12s, border-color .12s;
    }
    .tt-link:hover { color: #00d4ff; border-color: rgba(0,212,255,0.7); }

    /* ── 图例 ── */
    #graph-legend {
      position: absolute;
      bottom: 20px; left: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 10px 13px;
      background: rgba(13,17,23,0.88);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      backdrop-filter: blur(6px);
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .72rem;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      padding: 3px 6px;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .legend-row:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .legend-row.active { background: rgba(0,212,255,0.15); color: #00d4ff; font-weight: 700; }
    .legend-title { font-size: .68rem; font-weight: 700; color: rgba(255,255,255,0.32); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* ── 移动端图例 FAB + 左侧抽屉 ── */
    #graph-legend-fab {
      display: none;
    }
    #graph-legend-scrim {
      display: none;
    }
    @media (max-width: 768px) {
      #graph-legend-fab {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        bottom: 16px;
        left: 16px;
        z-index: 12;
        width: 44px;
        height: 44px;
        padding: 0;
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 50%;
        background: rgba(13,17,23,0.92);
        color: rgba(255,255,255,0.82);
        font-size: 1.1rem;
        line-height: 1;
        cursor: pointer;
        box-shadow: 0 4px 18px rgba(0,0,0,0.45);
        backdrop-filter: blur(8px);
        transition: transform .15s, border-color .15s, box-shadow .15s;
      }
      #graph-legend-fab:hover,
      #graph-legend-fab:focus-visible {
        border-color: rgba(0,212,255,0.45);
        box-shadow: 0 6px 22px rgba(0,212,255,0.18);
        outline: none;
      }
      #graph-legend-fab[aria-expanded="true"] {
        opacity: 0;
        pointer-events: none;
      }
      #graph-legend {
        /* 与桌面端相同的卡片外观，仅改为默认隐藏 + 自左滑入 */
        position: fixed;
        bottom: 16px;
        left: 16px;
        top: auto;
        width: auto;
        max-width: calc(100vw - 32px);
        max-height: min(72vh, calc(100dvh - var(--header-h) - 120px));
        margin: 0;
        padding: 10px 13px;
        background: rgba(13,17,23,0.88);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 10px;
        backdrop-filter: blur(6px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.45);
        transform: translateX(calc(-100% - 28px));
        transition: transform .28s cubic-bezier(.4,0,.2,1);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        z-index: 46;
        pointer-events: none;
      }
      #graph-legend.graph-legend-open {
        transform: translateX(0);
        pointer-events: auto;
      }
      #graph-legend-scrim {
        position: fixed;
        top: calc(var(--header-h) + 46px);
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 44;
        background: rgba(0,0,0,0.42);
        opacity: 0;
        pointer-events: none;
        transition: opacity .22s ease;
      }
      #graph-legend-scrim.is-visible {
        display: block;
        opacity: 1;
        pointer-events: auto;
      }
    }

    /* 加载状态仅由工具栏 #graph-node-count 提示，不遮挡画布 */
    #graph-loading {
      display: none !important;
    }

    /* ── 移动端优化 ── */
    @media (max-width: 768px) {
      #graph-tooltip {
        max-width: calc(100vw - 40px);
        max-height: 60vh;
      }
      #graph-toolbar {
        padding: 6px 12px;
        gap: 6px;
      }
      #graph-search {
        width: 120px;
        font-size: .8rem;
        height: 30px;
      }
      #graph-search:focus {
        width: 160px;
      }
      .chip {
        height: 26px;
        padding: 0 8px;
        font-size: .72rem;
      }
      #filter-label {
        display: none;
      }
      #filter-toggle {
        padding: 0 6px;
      }
      #physics-toggle span:first-child {
        margin-right: 0;
      }
      #physics-toggle span:last-child {
        display: none;
      }
      #graph-node-count {
        display: none;
      }
      .toolbar-sep {
        display: none;
      }
      #graph-back {
        height: 26px;
        padding: 0 8px;
        font-size: .72rem;
      }
      #graph-back span {
        display: none;
      }
      .toolbar-right {
        gap: 4px;
      }
    }

    @media (max-width: 480px) {
      #graph-search {
        width: 90px;
      }
      #graph-search:focus {
        width: 120px;
      }
    }

    /* ── 提示条 ── */
    #graph-hint {
      position: absolute;
      bottom: 20px; right: 20px;
      z-index: 10;
      font-size: .72rem;
      color: rgba(255,255,255,0.2);
      text-align: right;
      line-height: 1.7;
    }

    /* ── SVG 节点动画 ── */
    .node-circle { transition: r .15s, fill-opacity .15s; }
    .node-label { transition: opacity .15s; }

    /* ════════════════════════════════════════════
       白天模式覆盖（[data-theme="light"]）
    ════════════════════════════════════════════ */
    [data-theme="light"] #graph-toolbar {
      background: rgba(250,249,246,0.96);
      border-bottom-color: rgba(0,0,0,0.07);
    }
    [data-theme="light"] #graph-search {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.12);
      color: #2f2d29;
    }
    [data-theme="light"] #graph-search::placeholder { color: rgba(0,0,0,0.3); }
    [data-theme="light"] .chip {
      border-color: rgba(0,0,0,0.1);
      background: rgba(0,0,0,0.04);
      color: rgba(0,0,0,0.5);
    }
    [data-theme="light"] .chip:hover {
      border-color: rgba(0,0,0,0.28);
      color: rgba(0,0,0,0.8);
    }
    [data-theme="light"] .chip.is-running {
      background: #e6f7ff;
      border-color: rgba(22,89,180,0.45);
      color: #1659b4;
    }
    [data-theme="light"] .filter-topic-section {
      border-bottom-color: rgba(0,0,0,0.07);
    }
    [data-theme="light"] .filter-topic-summary:hover { background: rgba(0,0,0,0.03); }
    [data-theme="light"] .filter-topic-summary::after { color: rgba(0,0,0,0.45); }
    [data-theme="light"] .filter-topic-summary-label { color: rgba(0,0,0,0.4); }
    [data-theme="light"] .filter-topic-summary-current { color: rgba(0,0,0,0.7); }
    [data-theme="light"] .filter-topic-chip {
      border-color: rgba(0,0,0,0.1);
      background: rgba(0,0,0,0.04);
      color: rgba(0,0,0,0.62);
    }
    [data-theme="light"] .filter-topic-chip:hover {
      border-color: rgba(0,0,0,0.28);
      color: rgba(0,0,0,0.85);
    }
    [data-theme="light"] .filter-topic-chip.is-active {
      background: #e6f7ff;
      border-color: rgba(22,90,180,0.45);
      color: #1659b4;
    }
    [data-theme="light"] .toolbar-sep { background: rgba(0,0,0,0.1); }
    [data-theme="light"] #graph-node-count { color: rgba(0,0,0,0.38); }
    [data-theme="light"] #graph-back {
      border-color: rgba(0,0,0,0.1);
      background: rgba(0,0,0,0.04);
      color: rgba(0,0,0,0.55);
    }
    [data-theme="light"] #graph-back:hover {
      border-color: rgba(0,0,0,0.28);
      color: #2f2d29;
    }
    /* 画布背景 */
    [data-theme="light"] #graph-canvas {
      background:
        radial-gradient(circle at 20% 20%, rgba(96,165,250,.07) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(52,211,153,.07) 0%, transparent 50%),
        #eef2f7;
    }
    /* dot-grid：深色点改为浅色点 */
    [data-theme="light"] #graph-wrap::before {
      background-image: radial-gradient(circle, rgba(0,0,0,.06) 1px, transparent 1px);
    }
    /* Tooltip */
    [data-theme="light"] #graph-tooltip {
      background: rgba(255,255,255,0.98);
      border-color: rgba(0,0,0,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    [data-theme="light"] .tt-title   { color: #1a1a1a; }
    [data-theme="light"] .tt-summary { color: rgba(0,0,0,0.5); }
    [data-theme="light"] .tt-link    { color: rgba(22,90,180,0.85); border-color: rgba(22,90,180,0.3); }
    [data-theme="light"] .tt-link:hover { color: #1659b4; border-color: rgba(22,90,180,0.7); }
    [data-theme="light"] #graph-tooltip.tt-pinned {
      border-color: rgba(22,90,180,0.35);
      box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 0 0 1px rgba(22,90,180,0.15);
    }
    /* 图例 */
    [data-theme="light"] #graph-legend {
      background: rgba(255,255,255,0.94);
      border-color: rgba(0,0,0,0.08);
    }
    [data-theme="light"] .legend-title { color: rgba(0,0,0,0.45); }
    [data-theme="light"] .legend-row { color: rgba(0,0,0,0.5); }
    [data-theme="light"] .legend-row:hover { background: rgba(0,0,0,0.04); }
    [data-theme="light"] .legend-row.active { background: #e6f7ff; color: #1659b4; }
    [data-theme="light"] #graph-legend-fab {
      background: rgba(255,255,255,0.96);
      border-color: rgba(0,0,0,0.12);
      color: rgba(0,0,0,0.72);
      box-shadow: 0 4px 18px rgba(0,0,0,0.12);
    }
    [data-theme="light"] #graph-legend-fab[aria-expanded="true"] {
      border-color: rgba(22,90,180,0.45);
      background: #e6f7ff;
    }
    [data-theme="light"] #graph-legend-scrim.is-visible {
      background: rgba(0,0,0,0.28);
    }
    /* 物理参数面板 */
    [data-theme="light"] .physics-panel {
      background: rgba(255,255,255,0.97);
      border-color: rgba(0,0,0,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
    [data-theme="light"] .physics-header {
      color: rgba(0,0,0,0.62);
      border-bottom-color: rgba(0,0,0,0.07);
    }
    [data-theme="light"] .physics-close { color: rgba(0,0,0,0.3); }
    [data-theme="light"] .physics-close:hover { color: rgba(0,0,0,0.72); }
    [data-theme="light"] .slider-label { color: rgba(0,0,0,0.45); }
    [data-theme="light"] .slider-val { color: #1659b4; }
    [data-theme="light"] .physics-toggle { color: rgba(0,0,0,0.45); }
    [data-theme="light"] .physics-toggle input[type=checkbox] { accent-color: #1659b4; }
    [data-theme="light"] .physics-section-title { color: rgba(0,0,0,0.4); }
    [data-theme="light"] .physics-action-btn {
      border-color: rgba(0,0,0,0.12);
      background: rgba(0,0,0,0.04);
      color: rgba(0,0,0,0.72);
    }
    [data-theme="light"] .physics-action-btn:hover:not(:disabled) {
      border-color: rgba(22,89,180,0.45);
      background: rgba(22,89,180,0.08);
      color: #1659b4;
    }
    [data-theme="light"] .physics-action-btn.is-running,
    [data-theme="light"] .physics-action-btn:disabled {
      border-color: rgba(22,89,180,0.4);
      background: rgba(22,89,180,0.1);
    }
    [data-theme="light"] .slider-divider { background: rgba(0,0,0,0.06); }
    [data-theme="light"] input[type=range] { background: rgba(0,0,0,0.1); }
    [data-theme="light"] .physics-action-btn.is-timeline-active {
      border-color: rgba(22,89,180,0.5);
      background: rgba(22,89,180,0.12);
      color: #1659b4;
    }
    [data-theme="light"] .timeline-ctrl-btn {
      color: rgba(0,0,0,0.72);
    }
    [data-theme="light"] .timeline-ctrl-btn:hover:not(:disabled) {
      color: #1659b4;
    }
    [data-theme="light"] .timeline-progress {

    .filter-panel {

    /* 筛选面板缩放把手（右侧 / 下侧 / 右下角，参照 RL Sim2Sim Demo） */
    .filter-resize-handle {
      position: absolute;
      z-index: 4;
      touch-action: none;
    }
    .filter-resize-e {
      top: 44px;
      right: 0;
      width: 8px;
      bottom: 18px;
      cursor: ew-resize;
    }
    .filter-resize-s {
      left: 18px;
      right: 0;
      bottom: 0;
      height: 8px;
      cursor: ns-resize;
    }
    .filter-resize-se {
      right: 0;
      bottom: 0;
      width: 16px;
      height: 16px;
      cursor: nwse-resize;
      background: transparent;
    }
    .filter-resize-se::before {
      content: '';
      position: absolute;
      right: 4px;
      bottom: 4px;
      width: 8px;
      height: 8px;
      border-right: 1.5px solid rgba(0, 212, 255, 0.45);
      border-bottom: 1.5px solid rgba(0, 212, 255, 0.45);
      border-bottom-right-radius: 3px;
      pointer-events: none;
      transition: border-color .18s ease;
    }
    .filter-resize-e:hover,
    .filter-resize-e:active,
    .filter-resize-s:hover,
    .filter-resize-s:active {
      background-color: rgba(0, 212, 255, 0.12);
    }
    .filter-resize-se:hover::before,
    .filter-resize-se:active::before {
      border-color: rgba(0, 212, 255, 0.9);
    }
    [data-theme="light"] .filter-resize-e:hover,
    [data-theme="light"] .filter-resize-e:active,
    [data-theme="light"] .filter-resize-s:hover,
    [data-theme="light"] .filter-resize-s:active {
      background-color: rgba(22, 89, 180, 0.1);
    }
    [data-theme="light"] .filter-resize-se::before {
      border-color: rgba(22, 89, 180, 0.45);
    }
    [data-theme="light"] .filter-resize-se:hover::before,
    [data-theme="light"] .filter-resize-se:active::before {
      border-color: rgba(22, 89, 180, 0.85);
    }
    body.filter-panel-resizing {
      user-select: none;
      cursor: inherit;
    }

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

  <script>
  (async function () {
    /* ── 颜色 & 类型标签 ── */
    const TYPE_COLOR = {
      concept:       '#60a5fa',
      method:        '#34d399',
      task:          '#f472b6',
      entity:        '#fbbf24',
      comparison:    '#c084fc',
      query:         '#94a3b8',
      formalization: '#fb923c',
      '':            '#64748b',
    };
    const TYPE_LABEL = {
      concept: '概念', method: '方法', task: '任务',
      entity: '工具', comparison: '对比', query: 'Query',
      formalization: '形式化', '': 'Wiki',
    };
    const TYPE_FILTER_OPTIONS = [
      { value: 'concept', label: '概念', color: '#60a5fa' },
      { value: 'method', label: '方法', color: '#34d399' },
      { value: 'task', label: '任务', color: '#f472b6' },
      { value: 'formalization', label: '形式化', color: '#fb923c' },
      { value: 'comparison', label: '对比', color: '#c084fc' },
      { value: 'entity', label: '工具', color: '#fbbf24' },
      { value: 'query', label: 'Query', color: '#94a3b8' },
      { value: '__orphan__', label: '孤儿（度≤1）', color: '#94a3b8' }
    ];
    const HEALTH_FILTER_OPTIONS = [
      { value: '0', label: '0 分', color: '#f87171' },
      { value: '1', label: '1 分', color: '#fb923c' },
      { value: '2', label: '2 分', color: '#facc15' },
      { value: '3', label: '3 分', color: '#4ade80' }
    ];
    const COMMUNITY_COLORS = d3.schemeTableau10;
    const graphLegend = document.getElementById('graph-legend');
    const graphLegendFab = document.getElementById('graph-legend-fab');
    const graphLegendScrim = document.getElementById('graph-legend-scrim');
    let legendDrawerOpen = false;

    function isLegendDrawerMode() {
      return window.matchMedia('(max-width: 768px)').matches;
    }

    function setLegendDrawerOpen(open) {
      if (!isLegendDrawerMode()) {
        graphLegend.classList.remove('graph-legend-open');
        if (graphLegendScrim) {
          graphLegendScrim.classList.remove('is-visible');
          graphLegendScrim.hidden = true;
        }
        if (graphLegendFab) graphLegendFab.setAttribute('aria-expanded', 'false');
        legendDrawerOpen = false;
        return;
      }
      legendDrawerOpen = open;
      graphLegend.classList.toggle('graph-legend-open', open);
      if (graphLegendScrim) {
        graphLegendScrim.classList.toggle('is-visible', open);
        graphLegendScrim.hidden = !open;
        graphLegendScrim.setAttribute('aria-hidden', open ? 'false' : 'true');
      }
      if (graphLegendFab) graphLegendFab.setAttribute('aria-expanded', open ? 'true' : 'false');
    }

    function closeLegendDrawer() { setLegendDrawerOpen(false); }
    function toggleLegendDrawer() { setLegendDrawerOpen(!legendDrawerOpen); }

    if (graphLegendFab) {
      graphLegendFab.addEventListener('click', (ev) => {
        ev.stopPropagation();
        toggleLegendDrawer();
      });
    }
    if (graphLegendScrim) {
      graphLegendScrim.addEventListener('click', () => closeLegendDrawer());
    }
    window.addEventListener('resize', () => {
      if (!isLegendDrawerMode()) closeLegendDrawer();
    });
    const filterToggle = document.getElementById('filter-toggle');
    const filterLabel = document.getElementById('filter-label');
    const filterPanel = document.getElementById('filter-panel');
    const filterPanelTitle = document.getElementById('filter-panel-title');
    const filterSubtitle = document.getElementById('filter-subtitle');
    const filterModeTypeBtn = document.getElementById('filter-mode-type');
    const filterModeCommunityBtn = document.getElementById('filter-mode-community');
    const filterModeHealthBtn = document.getElementById('filter-mode-health');
    const filterPanelBody = document.getElementById('filter-panel-body');
    const filterPanelScrim = document.getElementById('filter-panel-scrim');

    function isFilterPanelMobileMode() {
      return window.matchMedia('(max-width: 768px)').matches;
    }

    function setFilterPanelOpen(open) {
      if (open && areFiltersLocked()) return;
      if (!filterPanel) return;
      filterPanel.hidden = !open;
      filterPanel.setAttribute('aria-hidden', open ? 'false' : 'true');
      if (!filterPanelScrim) return;
      if (isFilterPanelMobileMode() && open) {
        filterPanelScrim.classList.add('is-visible');
        filterPanelScrim.hidden = false;
        filterPanelScrim.setAttribute('aria-hidden', 'false');
      } else {
        filterPanelScrim.classList.remove('is-visible');
        filterPanelScrim.hidden = true;
        filterPanelScrim.setAttribute('aria-hidden', 'true');
      }
    }

    if (filterPanelScrim) {
      filterPanelScrim.addEventListener('click', () => setFilterPanelOpen(false));
    }

    let colorMode = 'community';
    let activeFilters = new Set();
    let timelineAnimating = false;   // 处于时序模式（播放 / 暂停 / 拖拽中均为 true）
    let timelinePlaying = false;     // 计时器是否正在推进
    let timelineAnimTimer = null;
    let timelineOrdered = [];        // 按时间排序后的节点
    let timelineIdx = 0;             // 当前已显现节点数（进度）
    let timelineTotal = 0;
    let timelineStepMs = 40;
    let timelineBatchSize = 1;
    let timelineIncident = null;        // nodeId -> 关联边数组（把新节点种在邻居附近）
    let timelineSavedPositions = null;  // 进入前布局快照（退出时还原）
    let timelineLastFit = 0;            // 上次相机自适应时间戳（节流）
    const timelineRevealedIds = new Set();
    const TIMELINE_TARGET_MS = 12000;

    function areFiltersLocked() {
      return timelineAnimating;
    }

    let communityColorMap = new Map();
    let communityLabelMap = new Map();
    let focusedCommunityId = null;
    let focusedType = null;
    let focusedHealth = null;

    /* ── 专题视图（V22 P3）：复用 link-graph.json 的 path / community 元数据 ── */
    // 每个专题给一组路径片段或 community id，命中即视为属于该专题（叠加关系，任一命中即可）。
    const TOPIC_FILTERS = {
      'motion-retargeting': {
        communities: new Set(['community-8']),
        segments: new Set([
          'retargeting','retarget','gmr','nmr','reactor','sonic','exoactor',
          'spider','wilor','mocap','teleoperation','deepmimic','amp',
          'character','animation','keyframe','pipeline'
        ])
      },
      'grasp': {
        segments: new Set([
          'grasp','graspnet','anygrasp','dexterous','manipulation',
          'pick','place','bimanual','curobo'
        ])
      },
      'tactile': {
        segments: new Set([
          'tactile','haptic','impedance','force','contact','visuo'
        ]),
        excludeSegments: new Set(['reinforcement'])
      },
      'communication': {
        segments: new Set([
          'ethercat','can','uart','dds','foxglove','rs485','rs232',
          'serial','communication','protocol','bus','protocols','firmware'
        ])
      },
      'wbc': {
        communities: new Set(['community-2','community-15']),
        segments: new Set([
          'wbc','tsid','hqp','cbf','clf','whole','body','balance','hierarchical'
        ])
      },
      'locomotion': {
        communities: new Set(['community-14']),
        segments: new Set([
          'locomotion','gait','mpc','zmp','lip','walking','swing','stance','capture'
        ])
      },
      'vla': {
        communities: new Set(['community-0','community-5']),
        segments: new Set([
          'vla','foundation','octo','openvla','rt','pi0','gr00t'
        ])
      },
      'learning': {
        communities: new Set(['community-3','community-4']),
        segments: new Set([
          'imitation','reinforcement','ppo','sac','behavior','cloning','dreamer'
        ])
      },
      'sim2real': {
        communities: new Set(['community-11']),
        segments: new Set([
          'sim2real','randomization'
        ])
      },
      'state-estimation': {
        communities: new Set(['community-10']),
        segments: new Set([
          'estimation','ekf','ukf','slam','vio','odometry'
        ])
      }
    };
    let currentTopic = 'all';

    function nodeSegments(d) {
      if (d._segs) return d._segs;
      const base = (d.id || '').toLowerCase().replace(/\.md$/, '');
      d._segs = new Set(base.split(/[/._-]/).filter(Boolean));
      return d._segs;
    }

    function nodeMatchesTopic(d) {
      if (currentTopic === 'all') return true;
      const cfg = TOPIC_FILTERS[currentTopic];
      if (!cfg) return true;
      const segs = nodeSegments(d);
      if (cfg.excludeSegments) {
        for (const ex of cfg.excludeSegments) if (segs.has(ex)) return false;
      }
      if (cfg.communities && cfg.communities.has(d.community)) return true;
      if (cfg.segments) {
        for (const seg of cfg.segments) if (segs.has(seg)) return true;
      }
      return false;
    }

    /* ── 可变物理参数（由滑动块控制）── */
    let chargeStrength = -800;   // 排斥力（负值）
    let nodeScale      = 1.0;    // 节点大小倍数
    let linkWidthBase  = 1.0;    // 连接线基础粗细（px）
    let fontSliderVal  = 15;     // 字体滑块值（6-22），作为乘数作用在nodeScale上
    let isMagnetic     = false;

    /* ── 主题辅助（响应 data-theme 切换）── */
    function isDark() {
      return document.documentElement.getAttribute('data-theme') !== 'light';
    }
    function edgeBaseColor() {
      return isDark() ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.1)';
    }
    function labelFill() {
      return isDark() ? 'rgba(255,255,255,0.55)' : 'rgba(0,0,0,0.5)';
    }

    const HEALTH_COLORS = ['#f87171', '#fb923c', '#facc15', '#4ade80'];
    function nodeColor(d)  {
      if (colorMode === 'community') {
        return communityColorMap.get(d.community) || COMMUNITY_COLORS[9];
      }
      if (colorMode === 'health') {
        return HEALTH_COLORS[d.health_score != null ? Math.min(d.health_score, 3) : 0];
      }
      return TYPE_COLOR[d.type] || TYPE_COLOR[''];
    }
    function baseRadius(d) { return Math.max(5, Math.min(18, 4 + Math.sqrt(d._degree || 0) * 2.2)); }
    function scaledRadius(d) { return baseRadius(d) * nodeScale; }
    // 最终字号 = baseRadius × nodeScale × 0.4 × (fontSliderVal/10)
    // 0.4 让 baseRadius=10 的节点在 nodeScale=1, fontSliderVal=10 时字体≈10px
    function scaledFontSize(d) { return Math.max(6, baseRadius(d) * nodeScale * 0.4 * (fontSliderVal / 10)); }
    function toDetailId(path) {
      const item = indexItems && indexItems.find(it => it.path === path || it.id === path);
      return item?.id || path.replace(/\//g, '-').replace('.md', '');
    }
    function renderLegend() {
      const rows = [];
      if (colorMode === 'community') {
        rows.push('<div class="legend-title">按社区着色</div>');
        for (const [communityId, label] of communityLabelMap.entries()) {
          const color = communityColorMap.get(communityId) || COMMUNITY_COLORS[9];
          const isActive = (focusedCommunityId === communityId);
          rows.push(`<div class="legend-row ${isActive ? 'active' : ''}" data-community-id="${escapeHtml(String(communityId))}">
            <div class="legend-dot" style="background:${escapeHtml(String(color))}"></div>${escapeHtml(String(label))}
          </div>`);
        }
      } else if (colorMode === 'health') {
        rows.push('<div class="legend-title">按健康度着色</div>');
        const healthRows = [
          { score: '0', color: '#f87171', label: '0分 — 缺 summary/sources' },
          { score: '1', color: '#fb923c', label: '1分 — 基础信息不完整' },
          { score: '2', color: '#facc15', label: '2分 — summary + sources 齐全' },
          { score: '3', color: '#4ade80', label: '3分 — 完整且近期更新' },
        ];
        for (const h of healthRows) {
          const isActive = (focusedHealth === h.score);
          rows.push(`<div class="legend-row ${isActive ? 'active' : ''}" data-health="${escapeHtml(String(h.score))}">
            <div class="legend-dot" style="background:${escapeHtml(String(h.color))}"></div>${escapeHtml(String(h.label))}
          </div>`);
        }
      } else {
        rows.push('<div class="legend-title">按类型着色</div>');
        const typeRows = [
          { type: 'concept',       color: '#60a5fa', label: '概念 Concept' },
          { type: 'method',        color: '#34d399', label: '方法 Method' },
          { type: 'task',          color: '#f472b6', label: '任务 Task' },
          { type: 'formalization', color: '#fb923c', label: '形式化 Formalization' },
          { type: 'comparison',    color: '#c084fc', label: '对比 Comparison' },
          { type: 'entity',        color: '#fbbf24', label: '工具 Entity' },
          { type: 'query',         color: '#94a3b8', label: 'Query 产物' },
        ];
        for (const t of typeRows) {
          const isActive = (focusedType === t.type);
          rows.push(`<div class="legend-row ${isActive ? 'active' : ''}" data-type="${escapeHtml(String(t.type))}">
            <div class="legend-dot" style="background:${escapeHtml(String(t.color))}"></div>${escapeHtml(String(t.label))}
          </div>`);
        }
      }
      graphLegend.innerHTML = rows.join('');
      if (graphLegendFab) {
        const fabLabels = {
          community: '按社区着色',
          health: '按健康度着色',
          type: '按类型着色',
        };
        const label = fabLabels[colorMode] || '图例';
        graphLegendFab.title = label;
        graphLegendFab.setAttribute('aria-label', '打开' + label + '图例');
      }
    }

    /* ── 加载数据 ──
       仅首屏阻塞 link-graph.json（~570KB，含 summary）。
       index-v1.json（~3.4MB）懒加载，供节点侧栏的 tags / related / source_links 使用。 */
    let graphData;
    let indexItems = [];
    try {
      graphData = await fetch('exports/link-graph.json').then(r => r.json());
    } catch (e) {
      const countEl = document.getElementById('graph-node-count');
      if (countEl) {
        countEl.textContent = '数据加载失败';
        countEl.title = e.message || '';
      }
      return;
    }
    fetch('exports/index-v1.json')
      .then(r => r.json())
      .then(d => { indexItems = d.items || []; })
      .catch(() => { /* 侧栏 tags / related 退化为空，不阻塞主图 */ });

    (graphData.communities || []).forEach((community, idx) => {
      communityColorMap.set(community.id, COMMUNITY_COLORS[idx % COMMUNITY_COLORS.length]);
      communityLabelMap.set(community.id, community.label || community.id);
    });
    renderLegend();

    /* ── 计算节点度数 ── */
    const degreeMap = {};
    for (const e of graphData.edges) {
      degreeMap[e.source] = (degreeMap[e.source] || 0) + 1;
      degreeMap[e.target] = (degreeMap[e.target] || 0) + 1;
    }

    /* ── 准备节点/边数据：title / summary / recency 都直接来自 link-graph.json ── */
    const nodes = graphData.nodes.map(n => ({
      ...n,
      recency: n.recency || '1970-01-01',
      _degree: degreeMap[n.id] || 0,
      _info: { title: n.label || n.id, summary: n.summary || '' },
    }));
    const edges = graphData.edges.map(e => ({ ...e }));

    /* ── 连接数 Top N 筛选（滑动条）── */
    const totalNodeCount = nodes.length;
    const degreeTopMin = Math.min(10, totalNodeCount);
    let topDegreeLimit = totalNodeCount;
    let topDegreeIds = null;

    function computeTopDegreeIds(limit) {
      if (limit >= totalNodeCount) return null;
      return new Set(
        nodes.slice()
          .sort((a, b) => (b._degree || 0) - (a._degree || 0))
          .slice(0, limit)
          .map(n => n.id)
      );
    }

    function nodeMatchesDegreeTop(d) {
      return !topDegreeIds || topDegreeIds.has(d.id);
    }

    function updateDegreeTopLabel() {
      const valEl = document.getElementById('val-degree-top');
      if (!valEl) return;
      valEl.textContent = topDegreeLimit >= totalNodeCount ? '全部' : String(topDegreeLimit);
    }

    function initDegreeTopSlider() {
      const slider = document.getElementById('sl-degree-top');
      if (!slider) return;
      slider.min = String(degreeTopMin);
      slider.max = String(totalNodeCount);
      slider.value = String(topDegreeLimit);
      updateDegreeTopLabel();
    }

    function setTopDegreeLimit(limit) {
      topDegreeLimit = Math.max(degreeTopMin, Math.min(totalNodeCount, Number(limit)));
      topDegreeIds = computeTopDegreeIds(topDegreeLimit);
      const slider = document.getElementById('sl-degree-top');
      if (slider) slider.value = String(topDegreeLimit);
      updateDegreeTopLabel();
      applyFilters();
      updateFilterCount();
    }

    initDegreeTopSlider();
    const slDegreeTop = document.getElementById('sl-degree-top');
    if (slDegreeTop) {
      slDegreeTop.addEventListener('input', ev => {
        if (areFiltersLocked()) return;
        setTopDegreeLimit(ev.target.value);
      });
      slDegreeTop.addEventListener('change', () => {
        if (topDegreeIds) fitToScreen();
      });
    }

    /* ── 初始化搜索自动联想 ── */
    const searchList = document.getElementById('graph-search-list');
    if (searchList) {
      searchList.innerHTML = nodes.map(n => '<option value="' + escapeHtml(n._info.title || n.label) + '"></option>').join('');
    }

    /* ── SVG 尺寸（移动端首屏 clientHeight 可能为 0，需延后 fit）── */
    const wrap = document.getElementById('graph-wrap');
    const svg = d3.select('#graph-canvas');
    let W = 0;
    let H = 0;

    function measureGraphViewport() {
      if (!wrap) return false;
      const nextW = wrap.clientWidth;
      const nextH = wrap.clientHeight;
      if (nextW <= 0 || nextH <= 0) return false;
      W = nextW;
      H = nextH;
      svg.attr('width', W).attr('height', H);
      return true;
    }

    function updateGraphViewport() {
      if (!measureGraphViewport()) return false;
      if (simulation) {
        simulation.force('center', d3.forceCenter(W / 2, H / 2).strength(0.05));
      }
      return true;
    }

    function whenGraphViewportReady(callback, attempt) {
      const n = attempt || 0;
      if (updateGraphViewport()) {
        callback();
        return;
      }
      if (n < 80) {
        requestAnimationFrame(() => whenGraphViewportReady(callback, n + 1));
        return;
      }
      window.addEventListener('load', () => {
        if (updateGraphViewport()) callback();
      }, { once: true });
    }

    /* ── Zoom ── */
    const gRoot = svg.append('g');
    const zoom = d3.zoom()
      .scaleExtent([0.08, 5])
      .on('zoom', ev => {
        gRoot.attr('transform', ev.transform);
        const k = ev.transform.k;
        label.style('opacity', k > 0.6 ? Math.min(1, (k - 0.6) * 2.5) : 0);
      });
    svg.call(zoom);

    // 尽早拿到视口尺寸；若容器尚未布局完成则用兜底尺寸，
    // 避免 W=H=0 时 forceCenter(0,0) 把所有节点钉在 SVG 左上角。
    if (!measureGraphViewport()) {
      W = 1200;
      H = 800;
      svg.attr('width', W).attr('height', H);
    }

    function randomizeNodePositions() {
      const cx = W / 2;
      const cy = H / 2;
      for (const n of nodes) {
        n.fx = null;
        n.fy = null;
        n.vx = 0;
        n.vy = 0;
        n.x = cx + (Math.random() - 0.5) * 80;
        n.y = cy + (Math.random() - 0.5) * 80;
      }
    }

    /* ── 力模拟 ── */
    const simulation = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(edges).id(d => d.id).distance(80).strength(0.35))
      .force('charge', d3.forceManyBody().strength(chargeStrength).distanceMax(400))
      .force('center', d3.forceCenter(W / 2, H / 2).strength(0.05))
      .force('collision', d3.forceCollide().radius(d => scaledRadius(d) + 5).strength(0.7))
      .alphaDecay(0.025);

    function updateForces() {
      simulation.force('charge').strength(chargeStrength);
      
      if (isMagnetic) {
        const categories = (colorMode === 'community') 
          ? Array.from(communityLabelMap.keys())
          : Array.from(new Set(nodes.map(n => n.type)));
          
        const angleStep = (2 * Math.PI) / (categories.length || 1);
        const radius = Math.min(W, H) * 0.25;
        const centers = {};
        categories.forEach((cat, i) => {
          centers[cat] = {
            x: W/2 + radius * Math.cos(i * angleStep),
            y: H/2 + radius * Math.sin(i * angleStep)
          };
        });

        const getTargetX = d => {
          const key = (colorMode === 'community') ? d.community : d.type;
          return centers[key]?.x || W/2;
        };
        const getTargetY = d => {
          const key = (colorMode === 'community') ? d.community : d.type;
          return centers[key]?.y || H/2;
        };

        simulation.force('x', d3.forceX(getTargetX).strength(0.18));
        simulation.force('y', d3.forceY(getTargetY).strength(0.18));
      } else {
        simulation.force('x', null);
        simulation.force('y', null);
      }
      simulation.alpha(0.3).restart();
    }

    /* ── 渲染边 ── */
    const gEdges = gRoot.append('g').attr('class', 'edges');
    const link = gEdges.selectAll('line')
      .data(edges)
      .join('line')
      .attr('stroke', edgeBaseColor())
      .attr('stroke-width', linkWidthBase);

    /* ── 渲染节点 ── */
    const gNodes = gRoot.append('g').attr('class', 'nodes');
    const node = gNodes.selectAll('g')
      .data(nodes)
      .join('g')
      .attr('class', 'node-g')
      .style('cursor', 'pointer')
      .call(d3.drag()
        .on('start', (ev, d) => {
          if (!ev.active) simulation.alphaTarget(0.3).restart();
          d.fx = d.x; d.fy = d.y;
        })
        .on('drag', (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
        .on('end', (ev, d) => {
          if (!ev.active) simulation.alphaTarget(0);
          d.fx = null; d.fy = null;
        })
      );

    node.append('circle')
      .attr('class', 'node-glow')
      .attr('r', d => scaledRadius(d) + 6)
      .attr('fill', d => nodeColor(d))
      .attr('fill-opacity', 0)
      .attr('stroke', 'none');

    node.append('circle')
      .attr('class', 'node-circle')
      .attr('r', scaledRadius)
      .attr('fill', d => nodeColor(d))
      .attr('fill-opacity', 1)
      .attr('stroke', d => nodeColor(d))
      .attr('stroke-width', 1.5)
      .attr('stroke-opacity', 0.35);

    const label = node.append('text')
      .attr('class', 'node-label')
      .text(d => d._info.title || d.label)
      .attr('dy', d => scaledRadius(d) + 13)
      .attr('text-anchor', 'middle')
      .attr('font-size', d => scaledFontSize(d) + 'px')
      .attr('fill', labelFill())
      .attr('pointer-events', 'none')
      .style('opacity', 0);

    function getFilterOptions() {
      if (colorMode === 'community') {
        return Array.from(communityLabelMap.entries()).map(([communityId, label]) => ({
          value: communityId,
          label: label,
          color: communityColorMap.get(communityId) || COMMUNITY_COLORS[9]
        }));
      }
      if (colorMode === 'health') {
        return HEALTH_FILTER_OPTIONS;
      }
      return TYPE_FILTER_OPTIONS;
    }

    function getColorModeLabel(mode) {
      if (mode === 'community') return '按社区';
      if (mode === 'health') return '按健康度';
      return '按类型';
    }

    function renderFilterPanel() {
      const title = '🔍 图谱筛选';
      if (filterToggle) filterToggle.title = '图谱筛选（当前' + getColorModeLabel(colorMode) + '）';
      if (filterPanelTitle) filterPanelTitle.textContent = title;
      if (filterLabel) filterLabel.textContent = '筛选';
      if (filterSubtitle) filterSubtitle.textContent = '当前' + getColorModeLabel(colorMode) + '着色与筛选';
      if (filterModeTypeBtn) filterModeTypeBtn.classList.toggle('active', colorMode === 'type');
      if (filterModeCommunityBtn) filterModeCommunityBtn.classList.toggle('active', colorMode === 'community');
      if (filterModeHealthBtn) filterModeHealthBtn.classList.toggle('active', colorMode === 'health');
      if (!filterPanelBody) return;
      const options = getFilterOptions();
      if (!options.length) {
        filterPanelBody.innerHTML = '<div class="filter-empty">当前暂无可筛选项</div>';
      } else {
        filterPanelBody.innerHTML =
          '<div class="filter-section-title">' + escapeHtml(getColorModeLabel(colorMode)) + '筛选</div>'
          + options.map(option => {
              const checked = activeFilters.has(option.value) ? ' checked' : '';
              return '<label class="filter-item">'
                + '<input type="checkbox" value="' + escapeHtml(option.value) + '"' + checked + ' /> '
                + '<span class="filter-dot" style="background:' + escapeHtml(option.color) + '"></span>'
                + escapeHtml(option.label)
                + '</label>';
            }).join('');
      }

      filterPanelBody.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', () => {
          if (areFiltersLocked()) return;
          if (cb.checked) {
            activeFilters.add(cb.value);
          } else {
            activeFilters.delete(cb.value);
          }
          applyFilters();
          updateFilterCount();
        });
      });
    }

    function refreshNodeColors() {
      node.select('.node-glow').attr('fill', d => nodeColor(d));
      node.select('.node-circle')
        .attr('fill', d => nodeColor(d))
        .attr('stroke', d => nodeColor(d));
      renderLegend();
      renderFilterPanel();
    }

    function setColorMode(mode) {
      if (areFiltersLocked()) return;
      if (colorMode === mode) return;
      colorMode = mode;
      activeFilters.clear();
      focusedCommunityId = null;
      focusedType = null;
      focusedHealth = null;
      updateFilterCount();
      refreshNodeColors();
      applyFilters();
      if (isMagnetic) updateForces();
    }

    if (filterModeTypeBtn) filterModeTypeBtn.addEventListener('click', () => setColorMode('type'));
    if (filterModeCommunityBtn) filterModeCommunityBtn.addEventListener('click', () => setColorMode('community'));
    if (filterModeHealthBtn) filterModeHealthBtn.addEventListener('click', () => setColorMode('health'));

    function syncGraphDomFromSimulation() {
      link
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    }

    function finishSimulationLoad() {
      node.select('.node-label').transition().duration(400).style('opacity', 0.85);
      whenGraphViewportReady(() => fitToScreen());
    }

    function restartForceSimulation() {
      node.select('.node-label').style('opacity', 0);
      updateGraphViewport();
      randomizeNodePositions();
      syncGraphDomFromSimulation();
      simulation.alpha(1).restart();
    }

    /* ── Tick ── */
    simulation.on('tick', () => {
      syncGraphDomFromSimulation();
    });

    /* ── 布局稳定后标签渐显 ── */
    simulation.on('end', () => {
      if (timelineAnimating) return;   // 时序动画期间不触发整图标签渐显 / 自适应
      finishSimulationLoad();
    });

    setTimeout(() => {
      if (simulation.alpha() > 0.01) return;
      finishSimulationLoad();
    }, 1200);

    const restartSimulationBtn = document.getElementById('restart-simulation');
    if (restartSimulationBtn) {
      restartSimulationBtn.addEventListener('click', () => {
        if (timelineAnimating) teardownTimelineMode();   // 先干净退出时序动画
        restartForceSimulation();                        // 再对整图重新随机布局
      });
    }

    /* ── Tooltip ── */
    const tooltip = document.getElementById('graph-tooltip');

    /* ── 移动端检测 ── */
    const isMobile = window.matchMedia('(hover: none) and (pointer: coarse)').matches;

    /* ── 固定卡片状态（仅移动端使用）── */
    let pinnedNode = null;

    function tooltipHtml(d) {
      const color = nodeColor(d);
      const info = d._info;
      const typeLabel = TYPE_LABEL[d.type] || d.type || 'Wiki';
      const summary = (info.summary || '').slice(0, 100) + (info.summary?.length > 100 ? '…' : '');
      const detailUrl = 'detail.html?id=' + encodeURIComponent(toDetailId(d.id));
      const communityLabel = communityLabelMap.get(d.community);
      const community = communityLabel
        ? `<div class="tt-summary">社区：${escapeHtml(String(communityLabel))}</div>`
        : '';
      return `<span class="tt-type" style="background:${escapeHtml(String(color))};color:#0d1117">${escapeHtml(String(typeLabel))}</span>` +
             `<div class="tt-title">${escapeHtml(String(info.title || d.label))}</div>` +
             (summary ? `<div class="tt-summary">${escapeHtml(String(summary))}</div>` : '') +
             community +
             `<a class="tt-link" href="${escapeHtml(detailUrl)}" target="_self">打开详情页 →</a>`;
    }

    function showTooltip(ev, d) {
      tooltip.innerHTML = tooltipHtml(d);
      tooltip.classList.remove('hidden');
      // 清理可能残留的 left/top/width，确保重新计算尺寸
      tooltip.style.left = '';
      tooltip.style.top = '';
      tooltip.style.width = '';
      tooltip.style.transform = '';
      if (isMobile) {
        tooltip.classList.add('tt-pinned');
        tooltip.style.right = '20px';
        tooltip.style.bottom = '20px';
        pinnedNode = d;
      } else {
        tooltip.classList.remove('tt-pinned');
        moveTooltip(ev);
      }
    }

    function moveTooltip(ev) {
      const x = ev.clientX + 14, y = ev.clientY - 10;
      const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
      tooltip.style.left = (x + tw > window.innerWidth - 20 ? x - tw - 28 : x) + 'px';
      tooltip.style.top  = (y + th > window.innerHeight - 20 ? y - th : y) + 'px';
      tooltip.style.transform = '';
    }

    function hideTooltip() {
      tooltip.classList.add('hidden');
      tooltip.style.left = '';
      tooltip.style.top = '';
      tooltip.style.transform = '';
      tooltip.style.right = '';
      tooltip.style.bottom = '';
    }

    // 移动端 tooltip 内链接点击：先跳转，再关闭 tooltip（避免 pointer-events: none 中断导航）
    tooltip.addEventListener('click', ev => {
      const link = ev.target.closest && ev.target.closest('.tt-link');
      if (link) {
        const href = link.getAttribute('href');
        if (href) {
          // 先导航
          window.location.href = href;
          // 然后异步关闭 tooltip（确保导航已开始）
          setTimeout(() => {
            pinnedNode = null;
            hideTooltip();
          }, 100);
        }
      }
    });

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function isSafeUrl(url) {
      if (!url) return false;
      const s = String(url).trim();
      if (/^\/\//.test(s)) return false;
      if (/^(?:https?|mailto|tel):/i.test(s)) return true;
      if (/:/i.test(s)) return false;
      return true;
    }

    /* ── 悬停高亮 ── */
    const neighborSet = new Set();

    function buildNeighborSet(d) {
      neighborSet.clear();
      neighborSet.add(d.id);
      for (const e of edges) {
        const srcId = typeof e.source === 'object' ? e.source.id : e.source;
        const tgtId = typeof e.target === 'object' ? e.target.id : e.target;
        if (srcId === d.id) neighborSet.add(tgtId);
        if (tgtId === d.id) neighborSet.add(srcId);
      }
    }

    node
      .on('mouseenter', (ev, d) => {
        // 时序动画进行中：禁用节点悬停，避免选中尚未显现的背景节点
        if (timelineAnimating) return;
        // V21 修复：如果当前已经点击聚焦了某个节点（侧边栏打开），跳过 hover 高亮逻辑
        if (sidebar.classList.contains('open')) return;
        
        buildNeighborSet(d);
        const hasFilter = topDegreeIds !== null || activeFilters.size > 0 || searchQuery.length > 0
          || focusedCommunityId || focusedType || focusedHealth !== null;
        node.select('.node-circle').attr('fill-opacity', n => {
          // 过滤后被隐藏的节点保持原始低透明度，不被 hover 恢复
          if (hasFilter && !visibleNodeIds.has(n.id)) return 0.06;
          return neighborSet.has(n.id) ? 1 : 0.15;
        });
        node.select('.node-glow').attr('fill-opacity', n =>
          n.id === d.id ? 0.18 : 0);
        link
          .attr('stroke', e => {
            const s = typeof e.source === 'object' ? e.source.id : e.source;
            const t = typeof e.target === 'object' ? e.target.id : e.target;
            const dimColor = isDark() ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.06)';
            return (s === d.id || t === d.id) ? nodeColor(d) : dimColor;
          })
          .attr('stroke-width', e => {
            const s = typeof e.source === 'object' ? e.source.id : e.source;
            const t = typeof e.target === 'object' ? e.target.id : e.target;
            return (s === d.id || t === d.id) ? linkWidthBase * 1.8 : linkWidthBase * 0.5;
          })
          .attr('stroke-opacity', e => {
            const s = typeof e.source === 'object' ? e.source.id : e.source;
            const t = typeof e.target === 'object' ? e.target.id : e.target;
            return (s === d.id || t === d.id) ? 0.7 : 0.3;
          });
        showTooltip(ev, d);
      })
      .on('mousemove', ev => {
        if (timelineAnimating) return;
        // 移动端固定卡片后，mousemove 不移动 tooltip
        if (!isMobile || !pinnedNode) {
          moveTooltip(ev);
        }
      })
      .on('mouseleave', () => {
        if (timelineAnimating) return;
        // V21 修复：如果当前已经点击聚焦了某个节点（侧边栏打开），不执行 mouseleave 的样式重置逻辑
        if (sidebar.classList.contains('open')) return;

        node.select('.node-glow').attr('fill-opacity', 0);
        link.attr('stroke', edgeBaseColor());
        applyFilters();
        // 移动端固定卡片后，mouseleave 不隐藏 tooltip
        if (!isMobile || !pinnedNode) {
          hideTooltip();
        }
      })
      .on('click', (ev, d) => {
        ev.stopPropagation();
        if (isMobile) {
          // 移动端：点击节点显示/关闭固定卡片
          if (pinnedNode === d) {
            pinnedNode = null;
            hideTooltip();
          } else {
            pinnedNode = d;
            showTooltip(ev, d);
          }
        } else {
          // PC：直接跳转详情页
          window.location.href = 'detail.html?id=' + encodeURIComponent(toDetailId(d.id));
        }
      });

    /* ── 节点计数 ── */
    function updateCount(visible) {
      document.getElementById('graph-node-count').textContent =
        `${visible} / ${nodes.length} 节点 · ${edges.length} 边`;
    }
    updateCount(nodes.length);

    /* ── 点击背景：关闭面板 ── */
    document.addEventListener('click', ev => {
      const onLink    = ev.target.closest && ev.target.closest('.tt-link');

      const onToggle  = ev.target.closest && ev.target.closest('#physics-toggle');

      const onFilterScrim = ev.target.closest && ev.target.closest('#filter-panel-scrim');
      const onFilterToggle = ev.target.closest && ev.target.closest('#filter-toggle');
