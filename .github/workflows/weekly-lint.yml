name: Weekly Wiki Lint Report

on:
  schedule:
    - cron: '0 2 * * 1'  # 每周一 UTC 02:00
  workflow_dispatch:       # 支持手动触发

jobs:
  lint-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-ci-lite.txt

      - name: Install dependencies
        run: pip install -r requirements-ci-lite.txt

      - name: Run lint and save report
        run: |
          python3 scripts/lint_wiki.py --report
          python3 scripts/update_badge.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exports/lint-report.md README.md
          git diff --cached --quiet || git commit -m "chore: 自动更新每周 lint 报告 + sources badge [skip ci]"
          git push
