name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 站点大 JSON（search-index / index-v1 / site-data-v1 / link-graph）与 sitemap
      # 不入库，部署时现场生成（等价 make export graph，纯标准库依赖，约 40s）
      - name: Generate site data
        run: |
          python3 scripts/export_minimal.py
          python3 scripts/generate_link_graph.py
          python3 scripts/generate_home_stats.py
          python3 scripts/graph_exports_sync.py

      - name: Copy README to docs
        run: cp README.md docs/README.md

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
