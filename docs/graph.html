<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Robotics Notebooks 知识图谱 — 75 个概念节点、429 条关联边、8 个社区的力导向可视化" />
  <title>知识图谱 | Robotics Notebooks</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕸️</text></svg>" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── 图谱页专用样式（不影响其他页面）── */
    body { 
      overflow: hidden; 
      font-family: var(--font-sans);
    }

    /* 显式声明字体以防部分浏览器组件继承失效 */
    #graph-toolbar, .filter-panel, .physics-panel, #graph-tooltip, #graph-sidebar, #graph-legend, .chip, .mode-chip, .filter-mode-chip, .filter-subtitle {
      font-family: var(--font-sans);
    }

    /* ── 工具栏 ── */
    #graph-toolbar {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      background: rgba(13, 17, 23, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-wrap: wrap;
    }
    #graph-search {
      height: 34px;
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #e6edf3;
      font-size: .85rem;
      font-family: inherit;
      width: 180px;
      outline: none;
      transition: border-color .18s, width .22s;
    }
    #graph-search::placeholder { color: rgba(255,255,255,0.3); }
    #graph-search:focus { border-color: rgba(0,212,255,0.5); width: 240px; }
    .chip-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      height: 28px;
      padding: 0 11px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.5);
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .chip:hover { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.8); }
    .chip.active {
      background: #00d4ff;
      color: #0d1117;
      border-color: transparent;
      font-weight: 700;
    }
    .chip[data-type="concept"].active    { background: #60a5fa; }
    .chip[data-type="method"].active     { background: #34d399; }
    .chip[data-type="task"].active       { background: #f472b6; }
    .chip[data-type="entity"].active     { background: #fbbf24; }
    .chip[data-type="comparison"].active { background: #c084fc; }
    .chip[data-type="query"].active      { background: #94a3b8; color: #fff; }
    .chip[data-type="formalization"].active { background: #fb923c; }
    .toolbar-sep { width: 1px; height: 24px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
    .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    #graph-node-count {
      font-size: .78rem;
      color: rgba(255,255,255,0.3);
      white-space: nowrap;
      margin-left: auto;
    }
    #graph-back {
      display: inline-flex; align-items: center; gap: 5px;
      height: 28px; padding: 0 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.55);
      font-size: .8rem;
      text-decoration: none;
      transition: all .15s;
      white-space: nowrap;
    }
    #graph-back:hover { border-color: rgba(255,255,255,0.3); color: #e6edf3; text-decoration: none; }

    /* ── 画布 ── */
    #graph-wrap {
      position: fixed;
      top: calc(var(--header-h) + 46px);
      left: 0; right: 0; bottom: 0;
    }
    #graph-canvas {
      width: 100%; height: 100%;
      background:
        radial-gradient(circle at 20% 20%, rgba(96,165,250,.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(52,211,153,.04) 0%, transparent 50%),
        #0d1117;
      cursor: grab;
      display: block;
    }
    #graph-canvas:active { cursor: grabbing; }

    /* dot-grid overlay (CSS only) */
    #graph-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Tooltip ── */
    #graph-tooltip {
      position: fixed;
      z-index: 200;
      padding: 12px 15px;
      border-radius: 10px;
      background: rgba(22, 27, 34, 0.97);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      max-width: 280px;
      max-height: 70vh;
      overflow-y: auto;
      pointer-events: none;
      transition: opacity .12s;
    }
    #graph-tooltip.hidden { opacity: 0; pointer-events: none !important; }
    #graph-tooltip.tt-pinned {
      pointer-events: auto;
      border-color: rgba(0,212,255,0.35);
      box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,212,255,0.15);
    }
    .tt-type {
      display: inline-block;
      font-size: .7rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .tt-title { font-size: .92rem; font-weight: 700; color: #e6edf3; margin-bottom: 5px; line-height: 1.3; }
    .tt-summary { font-size: .78rem; color: rgba(255,255,255,0.45); line-height: 1.5; }
    .tt-link {
      display: inline-block;
      font-size: .72rem;
      color: rgba(0,212,255,0.8);
      margin-top: 9px;
      text-decoration: none;
      border-bottom: 1px solid rgba(0,212,255,0.3);
      transition: color .12s, border-color .12s;
    }
    .tt-link:hover { color: #00d4ff; border-color: rgba(0,212,255,0.7); }

    /* ── 图例 ── */
    #graph-legend {
      position: absolute;
      bottom: 20px; left: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 10px 13px;
      background: rgba(13,17,23,0.88);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      backdrop-filter: blur(6px);
    }
    .legend-row { display: flex; align-items: center; gap: 8px; font-size: .72rem; color: rgba(255,255,255,0.5); }
    .legend-title { font-size: .68rem; font-weight: 700; color: rgba(255,255,255,0.32); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* ── 加载状态 ── */
    #graph-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      color: rgba(255,255,255,0.4);
      font-size: .9rem;
      z-index: 20;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid rgba(255,255,255,0.08);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 移动端优化 ── */
    @media (max-width: 768px) {
      #graph-tooltip {
        max-width: calc(100vw - 40px);
        max-height: 60vh;
      }
      #graph-toolbar {
        padding: 6px 12px;
        gap: 6px;
      }
      #graph-search {
        width: 120px;
        font-size: .8rem;
        height: 30px;
      }
      #graph-search:focus {
        width: 160px;
      }
      .chip {
        height: 26px;
        padding: 0 8px;
        font-size: .72rem;
      }
      #filter-label {
        display: none;
      }
      #filter-toggle {
        padding: 0 6px;
      }
      #physics-toggle span:first-child {
        margin-right: 0;
      }
      #physics-toggle span:last-child {
        display: none;
      }
      #graph-node-count {
        display: none;
      }
      .toolbar-sep {
        display: none;
      }
      #graph-back {
        height: 26px;
        padding: 0 8px;
        font-size: .72rem;
      }
      #graph-back span {
        display: none;
      }
      .toolbar-right {
        gap: 4px;
      }
    }

    @media (max-width: 480px) {
      #graph-search {
        width: 100px;
      }
      #graph-search:focus {
        width: 140px;
      }
    }

    /* ── 提示条 ── */
    #graph-hint {
      position: absolute;
      bottom: 20px; right: 20px;
      z-index: 10;
      font-size: .72rem;
      color: rgba(255,255,255,0.2);
      text-align: right;
      line-height: 1.7;
    }

    /* ── SVG 节点动画 ── */
    .node-circle { transition: r .15s, fill-opacity .15s; }
    .node-label { transition: opacity .15s; }

    /* ════════════════════════════════════════════
       白天模式覆盖（[data-theme="light"]）
    ════════════════════════════════════════════ */
    [data-theme="light"] #graph-toolbar {
      background: rgba(250,249,246,0.96);
      border-bottom-color: rgba(0,0,0,0.07);
    }
    [data-theme="light"] #graph-search {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.12);
      color: #2f2d29;
    }
    [data-theme="light"] #graph-search::placeholder { color: rgba(0,0,0,0.3); }
    [data-theme="light"] .chip {
      border-color: rgba(0,0,0,0.1);
      background: rgba(0,0,0,0.04);
      color: rgba(0,0,0,0.5);
    }
    [data-theme="light"] .chip:hover {
      border-color: rgba(0,0,0,0.28);
      color: rgba(0,0,0,0.8);
    }
    [data-theme="light"] .toolbar-sep { background: rgba(0,0,0,0.1); }
    [data-theme="light"] #graph-node-count { color: rgba(0,0,0,0.38); }
    [data-theme="light"] #graph-back {
      border-color: rgba(0,0,0,0.1);
      background: rgba(0,0,0,0.04);
      color: rgba(0,0,0,0.55);
    }
    [data-theme="light"] #graph-back:hover {
      border-color: rgba(0,0,0,0.28);
      color: #2f2d29;
    }
    /* 画布背景 */
    [data-theme="light"] #graph-canvas {
      background:
        radial-gradient(circle at 20% 20%, rgba(96,165,250,.07) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(52,211,153,.07) 0%, transparent 50%),
        #eef2f7;
    }
    /* dot-grid：深色点改为浅色点 */
    [data-theme="light"] #graph-wrap::before {
      background-image: radial-gradient(circle, rgba(0,0,0,.06) 1px, transparent 1px);
    }
    /* Tooltip */
    [data-theme="light"] #graph-tooltip {
      background: rgba(255,255,255,0.98);
      border-color: rgba(0,0,0,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    [data-theme="light"] .tt-title   { color: #1a1a1a; }
    [data-theme="light"] .tt-summary { color: rgba(0,0,0,0.5); }
    [data-theme="light"] .tt-link    { color: rgba(22,90,180,0.85); border-color: rgba(22,90,180,0.3); }
    [data-theme="light"] .tt-link:hover { color: #1659b4; border-color: rgba(22,90,180,0.7); }
    [data-theme="light"] #graph-tooltip.tt-pinned {
      border-color: rgba(22,90,180,0.35);
      box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 0 0 1px rgba(22,90,180,0.15);
    }
    /* 图例 */
    [data-theme="light"] #graph-legend {
      background: rgba(255,255,255,0.94);
      border-color: rgba(0,0,0,0.08);
    }
    [data-theme="light"] .legend-row { color: rgba(0,0,0,0.5); }
    /* 物理参数面板 */
    [data-theme="light"] .physics-panel {
      background: rgba(255,255,255,0.97);
      border-color: rgba(0,0,0,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
    [data-theme="light"] .physics-header {
      color: rgba(0,0,0,0.62);
      border-bottom-color: rgba(0,0,0,0.07);
    }
    [data-theme="light"] .physics-close { color: rgba(0,0,0,0.3); }
    [data-theme="light"] .physics-close:hover { color: rgba(0,0,0,0.72); }
    [data-theme="light"] .slider-label { color: rgba(0,0,0,0.45); }
    [data-theme="light"] .slider-divider { background: rgba(0,0,0,0.06); }
    [data-theme="light"] input[type=range] { background: rgba(0,0,0,0.1); }
    /* 提示文字 */
    [data-theme="light"] #graph-hint { color: rgba(0,0,0,0.22); }

    /* ── 筛选面板（白天模式）── */
    [data-theme="light"] .filter-panel {
      background: rgba(255,255,255,0.97);
      border-color: rgba(0,0,0,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
    [data-theme="light"] .filter-header {
      color: rgba(0,0,0,0.62);
      border-bottom-color: rgba(0,0,0,0.07);
    }
    [data-theme="light"] .filter-close { color: rgba(0,0,0,0.3); }
    [data-theme="light"] .filter-close:hover { color: rgba(0,0,0,0.72); }
    [data-theme="light"] .filter-item { color: rgba(0,0,0,0.55); }
    [data-theme="light"] .filter-item:hover {
      background: rgba(0,0,0,0.04);
      color: rgba(0,0,0,0.9);
    }
    [data-theme="light"] .filter-mode-tabs {
      border-bottom-color: rgba(0,0,0,0.07);
    }
    [data-theme="light"] .filter-subtitle {
      color: rgba(0,0,0,0.35);
    }
    [data-theme="light"] .filter-section-title {
      color: rgba(0,0,0,0.35);
    }
    [data-theme="light"] .filter-item input[type=checkbox] { accent-color: #1659b4; }
    [data-theme="light"] .filter-footer { border-top-color: rgba(0,0,0,0.07); }
    [data-theme="light"] .filter-clear {
      border-color: rgba(0,0,0,0.1);
      color: rgba(0,0,0,0.4);
    }
    [data-theme="light"] .filter-clear:hover {
      border-color: rgba(0,0,0,0.28);
      color: rgba(0,0,0,0.8);
    }
    [data-theme="light"] .filter-count {
      background: #1659b4;
      color: #fff;
    }
    [data-theme="light"] .chip.active { color: #0d1117; font-weight: 700; border-color: transparent; }
    [data-theme="light"] .chip[data-type="concept"].active    { background: #60a5fa; }
    [data-theme="light"] .chip[data-type="method"].active     { background: #34d399; }
    [data-theme="light"] .chip[data-type="task"].active       { background: #f472b6; }
    [data-theme="light"] .chip[data-type="entity"].active     { background: #fbbf24; }
    [data-theme="light"] .chip[data-type="comparison"].active { background: #c084fc; }
    [data-theme="light"] .chip[data-type="query"].active      { background: #94a3b8; color: #fff; }
    [data-theme="light"] .chip[data-type="formalization"].active { background: #fb923c; }

    /* ── 物理参数面板 ── */
    .physics-panel {
      position: absolute;
      top: 12px; right: 20px;
      z-index: 30;
      width: 230px;
      background: rgba(13,17,23,0.96);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.55);
      overflow: hidden;
    }
    .physics-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px 9px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: .8rem; font-weight: 700; color: rgba(255,255,255,0.65);
      letter-spacing: .03em;
    }
    .physics-close {
      background: none; border: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer; font-size: .9rem; line-height: 1;
      font-family: inherit;
      padding: 2px 4px; border-radius: 4px;
      transition: color .12s;
    }
    .physics-close:hover { color: rgba(255,255,255,0.75); }
    .slider-row { padding: 11px 14px 5px; }
    .slider-row:last-child { padding-bottom: 13px; }
    .slider-label {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 7px;
      font-size: .74rem; color: rgba(255,255,255,0.4);
    }
    .slider-val {
      color: #00d4ff; font-weight: 700; font-size: .72rem;
      font-variant-numeric: tabular-nums;
    }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 15px; height: 15px; border-radius: 50%;
      background: #00d4ff; cursor: pointer;
      box-shadow: 0 0 8px rgba(0,212,255,0.55);
      transition: box-shadow .15s, transform .1s;
    }
    input[type=range]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 14px rgba(0,212,255,0.85);
      transform: scale(1.15);
    }
    input[type=range]::-moz-range-thumb {
      width: 15px; height: 15px; border-radius: 50%; border: none;
      background: #00d4ff; cursor: pointer;
      box-shadow: 0 0 8px rgba(0,212,255,0.55);
    }
    .slider-divider {
      height: 1px; background: rgba(255,255,255,0.05);
      margin: 0 14px;
    }

    /* ── 筛选按钮计数徽章 ── */
    .filter-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 9px;
      background: #60a5fa;
      color: #0d1117;
      font-size: 11px;
      font-weight: 700;
      margin-left: 3px;
      line-height: 1;
    }

    /* ── 筛选浮窗面板 ── */
    .filter-panel {
      position: absolute;
      top: 12px; left: 20px;
      z-index: 30;
      min-width: 170px;
      background: rgba(13,17,23,0.97);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.55);
      overflow: hidden;
    }
    .filter-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px 9px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: .8rem; font-weight: 700; color: rgba(255,255,255,0.65);
      letter-spacing: .03em;
    }
    .filter-close {
      background: none; border: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer; font-size: .9rem; line-height: 1;
      font-family: inherit;
      padding: 2px 4px; border-radius: 4px;
      transition: color .12s;
    }
    .filter-close:hover { color: rgba(255,255,255,0.75); }
    .filter-mode-tabs {
      display: flex;
      gap: 6px;
      padding: 10px 14px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-wrap: wrap;
    }
    .filter-subtitle {
      padding: 10px 14px 2px;
      font-size: .72rem;
      color: rgba(255,255,255,0.4);
      font-family: inherit;
    }
    .filter-body {
      padding: 8px 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .filter-section-title {
      padding: 8px 14px 4px;
      font-size: .68rem;
      font-weight: 700;
      color: rgba(255,255,255,0.34);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .filter-item {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 14px;
      font-size: .78rem; color: rgba(255,255,255,0.6);
      font-family: inherit;
      cursor: pointer;
      transition: background .12s, color .12s;
      user-select: none;
    }
    .filter-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
    .filter-item input[type=checkbox] {
      width: 15px; height: 15px;
      accent-color: #60a5fa;
      cursor: pointer;
      flex-shrink: 0;
    }
    .filter-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .filter-footer {
      padding: 8px 14px 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .filter-clear {
      background: none; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: rgba(255,255,255,0.4);
      font-size: .72rem;
      font-family: inherit;
      padding: 4px 10px;
      cursor: pointer;
      transition: all .15s;
    }
    .filter-clear:hover { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.8); }
    .filter-empty {
      padding: 10px 14px 14px;
      font-size: .74rem;
      color: rgba(255,255,255,0.4);
    }

    /* ── 右侧详情侧边栏 ── */
    #graph-sidebar {
      position: fixed;

  <!-- ── D3.js ── -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="main.js"></script>
  <script>
  (async function () {
    /* ── 颜色 & 类型标签 ── */
    const TYPE_COLOR = {
      concept:       '#60a5fa',
      method:        '#34d399',
      task:          '#f472b6',
      entity:        '#fbbf24',
      comparison:    '#c084fc',
      query:         '#94a3b8',
      formalization: '#fb923c',
      '':            '#64748b',
    };
    const TYPE_LABEL = {
      concept: '概念', method: '方法', task: '任务',
      entity: '工具', comparison: '对比', query: 'Query',
      formalization: '形式化', '': 'Wiki',
    };
    const TYPE_FILTER_OPTIONS = [
      { value: 'concept', label: '概念', color: '#60a5fa' },
      { value: 'method', label: '方法', color: '#34d399' },
      { value: 'task', label: '任务', color: '#f472b6' },
      { value: 'formalization', label: '形式化', color: '#fb923c' },
      { value: 'comparison', label: '对比', color: '#c084fc' },
      { value: 'entity', label: '工具', color: '#fbbf24' },
      { value: 'query', label: 'Query', color: '#94a3b8' },
      { value: '__orphan__', label: '孤儿（度≤1）', color: '#94a3b8' }
    ];
    const HEALTH_FILTER_OPTIONS = [
      { value: '0', label: '0 分', color: '#f87171' },
      { value: '1', label: '1 分', color: '#fb923c' },
      { value: '2', label: '2 分', color: '#facc15' },
      { value: '3', label: '3 分', color: '#4ade80' }
    ];
    const COMMUNITY_COLORS = d3.schemeTableau10;
    const graphLegend = document.getElementById('graph-legend');
    const filterToggle = document.getElementById('filter-toggle');
    const filterLabel = document.getElementById('filter-label');
    const filterPanel = document.getElementById('filter-panel');
    const filterPanelTitle = document.getElementById('filter-panel-title');
    const filterSubtitle = document.getElementById('filter-subtitle');
    const filterModeTypeBtn = document.getElementById('filter-mode-type');
    const filterModeCommunityBtn = document.getElementById('filter-mode-community');
    const filterModeHealthBtn = document.getElementById('filter-mode-health');
    const filterPanelBody = document.getElementById('filter-panel-body');
    let colorMode = 'type';
    let activeFilters = new Set();
    let communityColorMap = new Map();
    let communityLabelMap = new Map();

    /* ── 可变物理参数（由滑动块控制）── */
    let chargeStrength = -800;   // 排斥力（负值）
    let nodeScale      = 1.0;    // 节点大小倍数
    let linkWidthBase  = 1.0;    // 连接线基础粗细（px）
    let fontSliderVal  = 15;     // 字体滑块值（6-22），作为乘数作用在nodeScale上

    /* ── 主题辅助（响应 data-theme 切换）── */
    function isDark() {
      return document.documentElement.getAttribute('data-theme') !== 'light';
    }
    function edgeBaseColor() {
      return isDark() ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.1)';
    }
    function labelFill() {
      return isDark() ? 'rgba(255,255,255,0.55)' : 'rgba(0,0,0,0.5)';
    }

    const HEALTH_COLORS = ['#f87171', '#fb923c', '#facc15', '#4ade80'];
    function nodeColor(d)  {
      if (colorMode === 'community') {
        return communityColorMap.get(d.community) || COMMUNITY_COLORS[9];
      }
      if (colorMode === 'health') {
        return HEALTH_COLORS[d.health_score != null ? Math.min(d.health_score, 3) : 0];
      }
      return TYPE_COLOR[d.type] || TYPE_COLOR[''];
    }
    function baseRadius(d) { return Math.max(5, Math.min(18, 4 + Math.sqrt(d._degree || 0) * 2.2)); }
    function scaledRadius(d) { return baseRadius(d) * nodeScale; }
    // 最终字号 = baseRadius × nodeScale × 0.4 × (fontSliderVal/10)
    // 0.4 让 baseRadius=10 的节点在 nodeScale=1, fontSliderVal=10 时字体≈10px
    function scaledFontSize(d) { return Math.max(6, baseRadius(d) * nodeScale * 0.4 * (fontSliderVal / 10)); }
    function toDetailId(path) { return path.replace(/\//g, '-').replace('.md', ''); }
    function renderLegend() {
      const rows = [];
      if (colorMode === 'community') {
        rows.push('<div class="legend-title">按社区着色</div>');
        for (const [communityId, label] of communityLabelMap.entries()) {
          const color = communityColorMap.get(communityId) || COMMUNITY_COLORS[9];
          rows.push(`<div class="legend-row"><div class="legend-dot" style="background:${color}"></div>${escapeHtml(label)}</div>`);
        }
      } else if (colorMode === 'health') {
        rows.push('<div class="legend-title">按健康度着色</div>');
        rows.push('<div class="legend-row"><div class="legend-dot" style="background:#f87171"></div>0分 — 缺 summary/sources</div>');
        rows.push('<div class="legend-row"><div class="legend-dot" style="background:#fb923c"></div>1分 — 基础信息不完整</div>');
        rows.push('<div class="legend-row"><div class="legend-dot" style="background:#facc15"></div>2分 — summary + sources 齐全</div>');
        rows.push('<div class="legend-row"><div class="legend-dot" style="background:#4ade80"></div>3分 — 完整且近期更新</div>');
      } else {
        rows.push('<div class="legend-title">按类型着色</div>');
        rows.push('<div class="legend-row"><div class="legend-dot" style="background:#60a5fa"></div>概念 Concept</div>');
        rows.push('<div class="legend-row"><div class="legend-dot" style="background:#34d399"></div>方法 Method</div>');
        rows.push('<div class="legend-row"><div class="legend-dot" style="background:#f472b6"></div>任务 Task</div>');
        rows.push('<div class="legend-row"><div class="legend-dot" style="background:#fb923c"></div>形式化 Formalization</div>');
        rows.push('<div class="legend-row"><div class="legend-dot" style="background:#c084fc"></div>对比 Comparison</div>');
        rows.push('<div class="legend-row"><div class="legend-dot" style="background:#fbbf24"></div>工具 Entity</div>');
        rows.push('<div class="legend-row"><div class="legend-dot" style="background:#94a3b8"></div>Query 产物</div>');
      }
      graphLegend.innerHTML = rows.join('');
    }

    /* ── 加载数据 ── */
    let graphData, indexItems;
    try {
      [graphData, indexItems] = await Promise.all([
        fetch('exports/link-graph.json').then(r => r.json()),
        fetch('exports/index-v1.json').then(r => r.json()).then(d => d.items),
      ]);
    } catch (e) {
      document.getElementById('graph-loading').innerHTML =
        '<span style="color:#f87171">数据加载失败：' + e.message + '</span>';
      return;
    }

    (graphData.communities || []).forEach((community, idx) => {
      communityColorMap.set(community.id, COMMUNITY_COLORS[idx % COMMUNITY_COLORS.length]);
      communityLabelMap.set(community.id, community.label || community.id);
    });
    renderLegend();

    /* ── 建立 path→info 映射 ── */
    const infoMap = {};
    for (const item of indexItems) {
      infoMap[item.path] = { title: item.title, summary: item.summary, pageType: item.page_type };
    }

    /* ── 计算节点度数 ── */
    const degreeMap = {};
    for (const e of graphData.edges) {
      degreeMap[e.source] = (degreeMap[e.source] || 0) + 1;
      degreeMap[e.target] = (degreeMap[e.target] || 0) + 1;
    }

    /* ── 准备节点/边数据 ── */
    const nodes = graphData.nodes.map(n => ({
      ...n,
      _degree: degreeMap[n.id] || 0,
      _info: infoMap[n.id] || { title: n.label || n.id, summary: '' },
    }));
    const edges = graphData.edges.map(e => ({ ...e }));

    /* ── SVG 尺寸 ── */
    const wrap = document.getElementById('graph-wrap');
    const svg = d3.select('#graph-canvas');
    let W = wrap.clientWidth, H = wrap.clientHeight;
    svg.attr('width', W).attr('height', H);

    /* ── Zoom ── */
    const gRoot = svg.append('g');
    const zoom = d3.zoom()
      .scaleExtent([0.08, 5])
      .on('zoom', ev => {
        gRoot.attr('transform', ev.transform);
        const k = ev.transform.k;
        label.style('opacity', k > 0.6 ? Math.min(1, (k - 0.6) * 2.5) : 0);
      });
    svg.call(zoom);

    /* ── 力模拟 ── */
    const simulation = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(edges).id(d => d.id).distance(80).strength(0.35))
      .force('charge', d3.forceManyBody().strength(chargeStrength).distanceMax(400))
      .force('center', d3.forceCenter(W / 2, H / 2).strength(0.05))
      .force('collision', d3.forceCollide().radius(d => scaledRadius(d) + 5).strength(0.7))
      .alphaDecay(0.025);

    /* ── 渲染边 ── */
    const gEdges = gRoot.append('g').attr('class', 'edges');
    const link = gEdges.selectAll('line')
      .data(edges)
      .join('line')
      .attr('stroke', edgeBaseColor())
      .attr('stroke-width', linkWidthBase);

    /* ── 渲染节点 ── */
    const gNodes = gRoot.append('g').attr('class', 'nodes');
    const node = gNodes.selectAll('g')
      .data(nodes)
      .join('g')
      .attr('class', 'node-g')
      .style('cursor', 'pointer')
      .call(d3.drag()
        .on('start', (ev, d) => {
          if (!ev.active) simulation.alphaTarget(0.3).restart();
          d.fx = d.x; d.fy = d.y;
        })
        .on('drag', (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
        .on('end', (ev, d) => {
          if (!ev.active) simulation.alphaTarget(0);
          d.fx = null; d.fy = null;
        })
      );

    node.append('circle')
      .attr('class', 'node-glow')
      .attr('r', d => scaledRadius(d) + 6)
      .attr('fill', d => nodeColor(d))
      .attr('fill-opacity', 0)
      .attr('stroke', 'none');

    node.append('circle')
      .attr('class', 'node-circle')
      .attr('r', scaledRadius)
      .attr('fill', d => nodeColor(d))
      .attr('fill-opacity', 1)
      .attr('stroke', d => nodeColor(d))
      .attr('stroke-width', 1.5)
      .attr('stroke-opacity', 0.35);

    const label = node.append('text')
      .attr('class', 'node-label')
      .text(d => d._info.title || d.label)
      .attr('dy', d => scaledRadius(d) + 13)
      .attr('text-anchor', 'middle')
      .attr('font-size', d => scaledFontSize(d) + 'px')
      .attr('fill', labelFill())
      .attr('pointer-events', 'none')
      .style('opacity', 0);

    function getFilterOptions() {
      if (colorMode === 'community') {
        return Array.from(communityLabelMap.entries()).map(([communityId, label]) => ({
          value: communityId,
          label: label,
          color: communityColorMap.get(communityId) || COMMUNITY_COLORS[9]
        }));
      }
      if (colorMode === 'health') {
        return HEALTH_FILTER_OPTIONS;
      }
      return TYPE_FILTER_OPTIONS;
    }

    function getColorModeLabel(mode) {
      if (mode === 'community') return '按社区';
      if (mode === 'health') return '按健康度';
      return '按类型';
    }

    function renderFilterPanel() {
      const title = '🔍 图谱筛选';
      if (filterToggle) filterToggle.title = '图谱筛选（当前' + getColorModeLabel(colorMode) + '）';
      if (filterPanelTitle) filterPanelTitle.textContent = title;
      if (filterLabel) filterLabel.textContent = '筛选';
      if (filterSubtitle) filterSubtitle.textContent = '当前' + getColorModeLabel(colorMode) + '着色与筛选';
      if (filterModeTypeBtn) filterModeTypeBtn.classList.toggle('active', colorMode === 'type');
      if (filterModeCommunityBtn) filterModeCommunityBtn.classList.toggle('active', colorMode === 'community');
      if (filterModeHealthBtn) filterModeHealthBtn.classList.toggle('active', colorMode === 'health');
      if (!filterPanelBody) return;
      const options = getFilterOptions();
      if (!options.length) {
        filterPanelBody.innerHTML = '<div class="filter-empty">当前暂无可筛选项</div>';
      } else {
        filterPanelBody.innerHTML =
          '<div class="filter-section-title">' + escapeHtml(getColorModeLabel(colorMode)) + '筛选</div>'
          + options.map(option => {
              const checked = activeFilters.has(option.value) ? ' checked' : '';
              return '<label class="filter-item">'
                + '<input type="checkbox" value="' + escapeHtml(option.value) + '"' + checked + ' /> '
                + '<span class="filter-dot" style="background:' + escapeHtml(option.color) + '"></span>'
                + escapeHtml(option.label)
                + '</label>';
            }).join('');
      }

      filterPanelBody.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', () => {
          if (cb.checked) {
            activeFilters.add(cb.value);
          } else {
            activeFilters.delete(cb.value);
          }
          applyFilters();
          updateFilterCount();
        });
      });
    }

    function refreshNodeColors() {
      node.select('.node-glow').attr('fill', d => nodeColor(d));
      node.select('.node-circle')
        .attr('fill', d => nodeColor(d))
        .attr('stroke', d => nodeColor(d));
      renderLegend();
      renderFilterPanel();
    }

    function setColorMode(mode) {
      if (colorMode === mode) return;
      colorMode = mode;
      activeFilters.clear();
      updateFilterCount();
      refreshNodeColors();
      applyFilters();
    }

    if (filterModeTypeBtn) filterModeTypeBtn.addEventListener('click', () => setColorMode('type'));
    if (filterModeCommunityBtn) filterModeCommunityBtn.addEventListener('click', () => setColorMode('community'));
    if (filterModeHealthBtn) filterModeHealthBtn.addEventListener('click', () => setColorMode('health'));

    /* ── Tick ── */
    simulation.on('tick', () => {
      link
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    });

    /* ── 隐藏加载 & 标签渐显 ── */
    simulation.on('end', () => {
      document.getElementById('graph-loading').style.display = 'none';
      // 仿真稳定后让所有标签渐显
      node.select('.node-label').transition().duration(400).style('opacity', 0.85);
      // 仿真稳定后自动适配屏幕
      setTimeout(() => fitToScreen(), 100);
    });
    setTimeout(() => {
      document.getElementById('graph-loading').style.display = 'none';
      node.select('.node-label').transition().duration(400).style('opacity', 0.85);
    }, 1200);

    /* ── Tooltip ── */
    const tooltip = document.getElementById('graph-tooltip');

    /* ── 移动端检测 ── */
    const isMobile = window.matchMedia('(hover: none) and (pointer: coarse)').matches;

    /* ── 固定卡片状态（仅移动端使用）── */
    let pinnedNode = null;

    function tooltipHtml(d) {
      const color = nodeColor(d);
      const info = d._info;
      const typeLabel = TYPE_LABEL[d.type] || d.type || 'Wiki';
      const summary = (info.summary || '').slice(0, 100) + (info.summary?.length > 100 ? '…' : '');
      const detailUrl = 'detail.html?id=' + encodeURIComponent(toDetailId(d.id));
      const community = d.community_label
        ? `<div class="tt-summary">社区：${escapeHtml(d.community_label)}</div>`
        : '';
      return `<span class="tt-type" style="background:${color};color:#0d1117">${typeLabel}</span>` +
             `<div class="tt-title">${escapeHtml(info.title || d.label)}</div>` +
             (summary ? `<div class="tt-summary">${escapeHtml(summary)}</div>` : '') +
             community +
             `<a class="tt-link" href="${detailUrl}" target="_self">打开详情页 →</a>`;
    }

    function showTooltip(ev, d) {
      tooltip.innerHTML = tooltipHtml(d);
      tooltip.classList.remove('hidden');
      // 清理可能残留的 left/top/width，确保重新计算尺寸
      tooltip.style.left = '';
      tooltip.style.top = '';
      tooltip.style.width = '';
      tooltip.style.transform = '';
      if (isMobile) {
        tooltip.classList.add('tt-pinned');
        tooltip.style.right = '20px';
        tooltip.style.bottom = '20px';
        pinnedNode = d;
      } else {
        tooltip.classList.remove('tt-pinned');
        moveTooltip(ev);
      }
    }

    function moveTooltip(ev) {
      const x = ev.clientX + 14, y = ev.clientY - 10;
      const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
      tooltip.style.left = (x + tw > window.innerWidth - 20 ? x - tw - 28 : x) + 'px';
      tooltip.style.top  = (y + th > window.innerHeight - 20 ? y - th : y) + 'px';
      tooltip.style.transform = '';
    }

    function hideTooltip() {
      tooltip.classList.add('hidden');
      tooltip.style.left = '';
      tooltip.style.top = '';
      tooltip.style.transform = '';
      tooltip.style.right = '';
      tooltip.style.bottom = '';
    }

    // 移动端 tooltip 内链接点击：先跳转，再关闭 tooltip（避免 pointer-events: none 中断导航）
    tooltip.addEventListener('click', ev => {
      const link = ev.target.closest && ev.target.closest('.tt-link');
      if (link) {
        const href = link.getAttribute('href');
        if (href) {
          // 先导航
          window.location.href = href;
          // 然后异步关闭 tooltip（确保导航已开始）
          setTimeout(() => {
            pinnedNode = null;
            hideTooltip();
          }, 100);
        }
      }
    });

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    /* ── 悬停高亮 ── */
    const neighborSet = new Set();

    function buildNeighborSet(d) {
      neighborSet.clear();
      neighborSet.add(d.id);
      for (const e of edges) {
        const srcId = typeof e.source === 'object' ? e.source.id : e.source;
        const tgtId = typeof e.target === 'object' ? e.target.id : e.target;
        if (srcId === d.id) neighborSet.add(tgtId);
        if (tgtId === d.id) neighborSet.add(srcId);
      }
    }

    node
      .on('mouseenter', (ev, d) => {
        buildNeighborSet(d);
        const hasFilter = activeFilters.size > 0 || searchQuery.length > 0;
        node.select('.node-circle').attr('fill-opacity', n => {
          // 过滤后被隐藏的节点保持原始低透明度，不被 hover 恢复
          if (hasFilter && !visibleNodeIds.has(n.id)) return 0.06;
          return neighborSet.has(n.id) ? 1 : 0.15;
        });
        node.select('.node-glow').attr('fill-opacity', n =>
          n.id === d.id ? 0.18 : 0);
        link
          .attr('stroke', e => {
            const s = typeof e.source === 'object' ? e.source.id : e.source;
            const t = typeof e.target === 'object' ? e.target.id : e.target;
            const dimColor = isDark() ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.06)';
            return (s === d.id || t === d.id) ? nodeColor(d) : dimColor;
          })
          .attr('stroke-width', e => {
            const s = typeof e.source === 'object' ? e.source.id : e.source;
            const t = typeof e.target === 'object' ? e.target.id : e.target;
            return (s === d.id || t === d.id) ? linkWidthBase * 1.8 : linkWidthBase * 0.5;
          })
          .attr('stroke-opacity', e => {
            const s = typeof e.source === 'object' ? e.source.id : e.source;
            const t = typeof e.target === 'object' ? e.target.id : e.target;
            return (s === d.id || t === d.id) ? 0.7 : 0.3;
          });
        showTooltip(ev, d);
      })
      .on('mousemove', ev => {
        // 移动端固定卡片后，mousemove 不移动 tooltip
        if (!isMobile || !pinnedNode) {
          moveTooltip(ev);
        }
      })
      .on('mouseleave', () => {
        node.select('.node-glow').attr('fill-opacity', 0);
        link.attr('stroke', edgeBaseColor());
        applyFilters();
        // 移动端固定卡片后，mouseleave 不隐藏 tooltip
        if (!isMobile || !pinnedNode) {
          hideTooltip();
        }
      })
      .on('click', (ev, d) => {
        ev.stopPropagation();
        if (isMobile) {
          // 移动端：点击节点显示/关闭固定卡片
          if (pinnedNode === d) {
            pinnedNode = null;
            hideTooltip();
          } else {
            pinnedNode = d;
            showTooltip(ev, d);
          }
        } else {
          // PC：直接跳转详情页
          window.location.href = 'detail.html?id=' + encodeURIComponent(toDetailId(d.id));
        }
      });

    /* ── 节点计数 ── */
    function updateCount(visible) {
      document.getElementById('graph-node-count').textContent =
        `${visible} / ${nodes.length} 节点 · ${edges.length} 边`;
    }
    updateCount(nodes.length);

    /* ── 点击背景：关闭移动端固定卡片 + 关闭面板 ── */
    document.addEventListener('click', ev => {
      const onNode    = ev.target.closest && ev.target.closest('g.node');
      const onLink    = ev.target.closest && ev.target.closest('.tt-link');
      const onPanel   = ev.target.closest && ev.target.closest('#physics-panel');
      const onToggle  = ev.target.closest && ev.target.closest('#physics-toggle');
      const onFilterPanel = ev.target.closest && ev.target.closest('#filter-panel');
      const onFilterToggle = ev.target.closest && ev.target.closest('#filter-toggle');
      if (onLink) return; // 点击卡片内链接：不处理（让它跳转）
      if (onNode) return; // 点击节点：节点自己的 click handler 处理
      if (!onPanel && !onToggle) {
        const panel = document.getElementById('physics-panel');
        if (panel && !panel.hidden) panel.hidden = true;
      }
      if (!onFilterPanel && !onFilterToggle) {
        const fpanel = document.getElementById('filter-panel');
        if (fpanel && !fpanel.hidden) fpanel.hidden = true;
      }
      // 移动端点击空白处：关闭固定卡片
      if (isMobile && pinnedNode) {
        pinnedNode = null;
        hideTooltip();
      }
    });
    document.addEventListener('keydown', ev => {
      if (ev.key === 'Escape') {
        document.getElementById('physics-panel').hidden = true;
        document.getElementById('filter-panel').hidden = true;
        if (isMobile && pinnedNode) {
          pinnedNode = null;
          hideTooltip();
        }
      }
    });

    /* ── 筛选面板开关 ── */
    filterToggle.addEventListener('click', () => {
      filterPanel.hidden = !filterPanel.hidden;
    });
    document.getElementById('filter-close').addEventListener('click', () => {
      filterPanel.hidden = true;
    });
    document.getElementById('filter-clear').addEventListener('click', () => {
      activeFilters.clear();
      renderFilterPanel();
      applyFilters();
      updateFilterCount();
    });
    renderFilterPanel();

    /* ── checkbox 筛选 ── */
    function updateFilterCount() {
      const count = activeFilters.size;
      const countEl = document.getElementById('filter-count');
      if (count > 0) {
        countEl.textContent = count;
        countEl.style.display = 'inline-flex';
      } else {
        countEl.style.display = 'none';
      }
    }

    /* ── 搜索 ── */
    let searchQuery = '';
    document.getElementById('graph-search').addEventListener('input', ev => {
      searchQuery = ev.target.value.trim().toLowerCase();
      applyFilters();
    });

    /* 当前可见节点 ID 集合（供 hover 检查筛选状态用） */
    const visibleNodeIds = new Set();

    function nodeMatchesCurrentFilter(d) {
      if (!activeFilters.size) return true;
      if (colorMode === 'community') {
        return activeFilters.has(d.community);
      }
      if (colorMode === 'health') {
        return activeFilters.has(String(d.health_score != null ? d.health_score : 0));
      }
      return activeFilters.has(d.type) || (activeFilters.has('__orphan__') && d._degree <= 1);
    }

    function edgeMatchesCurrentFilter(n) {
      if (!activeFilters.size) return true;
      if (colorMode === 'community') {
        return activeFilters.has(n.community);
      }
      if (colorMode === 'health') {
        return activeFilters.has(String(n.health_score != null ? n.health_score : 0));
      }
      return activeFilters.has(n.type) || (activeFilters.has('__orphan__') && n._degree <= 1);
    }

    function nodeMatchesSearch(d) {
      if (!searchQuery) return true;
      return (d._info.title || d.label || '').toLowerCase().includes(searchQuery)
          || d.id.toLowerCase().includes(searchQuery);
    }

    function applyFilters() {
      const hasFilter = activeFilters.size > 0 || searchQuery.length > 0;
      visibleNodeIds.clear();
      let visible = 0;
      node.each(function(d) {
        const ok = nodeMatchesCurrentFilter(d) && nodeMatchesSearch(d);
        if (ok) { visible++; visibleNodeIds.add(d.id); }
        d3.select(this).select('.node-circle')
          .attr('fill-opacity', ok ? 1 : 0.06)
          .attr('stroke-opacity', ok ? 0.35 : 0.05);
        d3.select(this).select('.node-label').style('opacity', ok && searchQuery ? 0.9 : null);
      });
      link
        .attr('stroke-opacity', e => {
          if (!hasFilter) return 1;
          const s = typeof e.source === 'object' ? e.source : nodes.find(n => n.id === e.source);
          const t = typeof e.target === 'object' ? e.target : nodes.find(n => n.id === e.target);
          if (!s || !t) return 0.03;
          return (edgeMatchesCurrentFilter(s) && nodeMatchesSearch(s) &&
                  edgeMatchesCurrentFilter(t) && nodeMatchesSearch(t)) ? 1 : 0.03;
        })
        .attr('stroke-width', e => {
          if (!hasFilter) return linkWidthBase;
          const s = typeof e.source === 'object' ? e.source : nodes.find(n => n.id === e.source);
          const t = typeof e.target === 'object' ? e.target : nodes.find(n => n.id === e.target);
          if (!s || !t) return linkWidthBase * 0.5;
          return (edgeMatchesCurrentFilter(s) && nodeMatchesSearch(s) &&
                  edgeMatchesCurrentFilter(t) && nodeMatchesSearch(t)) ? linkWidthBase : linkWidthBase * 0.5;
        });
      updateCount(visible);
      // 搜索时若命中节点 ≤ 15 个，自动飞行定位到目标区域
      if (searchQuery) flyToVisible();
    }

    /* ── 适配屏幕到所有节点 ── */
    function fitToScreen() {
      const allNodes = nodes.filter(n => n.x != null);
      if (allNodes.length === 0) return;
      const xs = allNodes.map(n => n.x), ys = allNodes.map(n => n.y);
      const x0 = Math.min(...xs), x1 = Math.max(...xs);
      const y0 = Math.min(...ys), y1 = Math.max(...ys);
      const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
      const pad = 120;
      const scale = Math.min(5, Math.max(0.5,
        Math.min(W / (x1 - x0 + pad), H / (y1 - y0 + pad))));
      svg.transition().duration(650).call(
        zoom.transform,
        d3.zoomIdentity.translate(W / 2 - scale * cx, H / 2 - scale * cy).scale(scale)
      );
    }

    /* ── 搜索飞行定位 ── */
    function flyToVisible() {
      const visNodes = nodes.filter(n => visibleNodeIds.has(n.id) && n.x != null);
      if (visNodes.length === 0 || visNodes.length > 15) return;
      const xs = visNodes.map(n => n.x), ys = visNodes.map(n => n.y);
      const x0 = Math.min(...xs), x1 = Math.max(...xs);
      const y0 = Math.min(...ys), y1 = Math.max(...ys);
      const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
      const pad = 120;
      const scale = Math.min(5, Math.max(0.5,
        Math.min(W / (x1 - x0 + pad), H / (y1 - y0 + pad))));
      svg.transition().duration(650).call(
        zoom.transform,
        d3.zoomIdentity.translate(W / 2 - scale * cx, H / 2 - scale * cy).scale(scale)
      );
    }

    /* ── resize ── */
    window.addEventListener('resize', () => {
      W = wrap.clientWidth; H = wrap.clientHeight;
      svg.attr('width', W).attr('height', H);
      simulation.force('center', d3.forceCenter(W / 2, H / 2).strength(0.05));
      simulation.alpha(0.1).restart();
    });

    /* ── 主题切换监听：同步更新 D3 SVG 元素颜色 ── */
    new MutationObserver(() => {
      link.attr('stroke', edgeBaseColor());
      label.attr('fill', labelFill());
    }).observe(document.documentElement, {
      attributes: true,
      attributeFilter: ['data-theme'],
    });

    /* ════════════════════════════════════════════
       物理参数面板（三个滑动块）
    ════════════════════════════════════════════ */

    /* 面板开关 */
    document.getElementById('physics-toggle').addEventListener('click', () => {
      const panel = document.getElementById('physics-panel');
      panel.hidden = !panel.hidden;
    });
    document.getElementById('physics-close').addEventListener('click', () => {
      document.getElementById('physics-panel').hidden = true;
    });

    /* 适配屏幕按钮 */
    document.getElementById('fit-to-screen').addEventListener('click', () => {
      fitToScreen();
    });

    /* 1. 排斥力 slider（min=50, max=800 → 实际 chargeStrength = -value） */
    document.getElementById('sl-charge').addEventListener('input', ev => {
      chargeStrength = -Number(ev.target.value);
      document.getElementById('val-charge').textContent = chargeStrength;
      simulation
        .force('charge', d3.forceManyBody().strength(chargeStrength).distanceMax(400))
        .alpha(0.45).restart();
    });

    /* 2. 节点大小 slider（min=40, max=280, value/100 = nodeScale） */
    document.getElementById('sl-size').addEventListener('input', ev => {
      nodeScale = Number(ev.target.value) / 100;
      document.getElementById('val-size').textContent = nodeScale.toFixed(1) + '×';
      // 更新圆半径 & 标签位置
      node.select('.node-circle').attr('r', scaledRadius);
      node.select('.node-glow').attr('r', d => scaledRadius(d) + 6);
      label.attr('dy', d => scaledRadius(d) + 13);
      // 更新碰撞半径并重新模拟
      simulation
        .force('collision', d3.forceCollide().radius(d => scaledRadius(d) + 5).strength(0.7))
        .alpha(0.3).restart();
    });

    /* 3. 连接线粗细 slider（min=2, max=60, value/10 = linkWidthBase） */
    document.getElementById('sl-link').addEventListener('input', ev => {
      linkWidthBase = Number(ev.target.value) / 10;
      document.getElementById('val-link').textContent = linkWidthBase.toFixed(1) + 'px';
      // 立即更新，无需重启模拟
      link.attr('stroke-width', linkWidthBase);
    });

    /* 4. 节点字体大小 slider（min=6, max=22, step=1）—— 在 nodeScale 基础上再缩放 */
    document.getElementById('sl-font').addEventListener('input', ev => {
      fontSliderVal = Number(ev.target.value);
      document.getElementById('val-font').textContent = '×' + (fontSliderVal / 10).toFixed(1);
      label.attr('font-size', d => scaledFontSize(d) + 'px');
    });

    /* ════════════════════════════════════════════
       右侧详情侧边栏
    ════════════════════════════════════════════ */

    const sidebar      = document.getElementById('graph-sidebar');
    const sbTypeBadge  = document.getElementById('sb-type-badge');
    const sbTitle      = document.getElementById('sb-title');
    const sbTags       = document.getElementById('sb-tags');
    const sbSummary    = document.getElementById('sb-summary');
    const sbCommunityBlock = document.getElementById('sb-community-block');
    const sbCommunityDot   = document.getElementById('sb-community-dot');
    const sbCommunityLabel = document.getElementById('sb-community-label');
    const sbRelSec     = document.getElementById('sb-related-section');
    const sbRelList    = document.getElementById('sb-related-list');
    const sbPaperSec   = document.getElementById('sb-paper-section');
    const sbPaperList  = document.getElementById('sb-paper-list');
    const sbOpenLink   = document.getElementById('sb-open-link');
    const sbSlidesLink = document.getElementById('sb-slides-link');
    const sbClose      = document.getElementById('sb-close');

    function openSidebar(d) {
      const color = nodeColor(d);
      const info  = d._info;
      const typeLabel = TYPE_LABEL[d.type] || d.type || 'Wiki';
      const detailUrl = 'detail.html?id=' + encodeURIComponent(toDetailId(d.id));
      const summary = (info.summary || '').slice(0, 150) + (info.summary?.length > 150 ? '…' : '');

      sbTypeBadge.style.background = color;
      sbTypeBadge.style.color = '#0d1117';
      sbTypeBadge.textContent = typeLabel;
      sbTitle.textContent = info.title || d.label;
      sbSummary.textContent = summary;
      if (d.community_label) {
        sbCommunityBlock.hidden = false;
        sbCommunityDot.style.background = communityColorMap.get(d.community) || color;
        sbCommunityLabel.textContent = d.community_label;
      } else {
        sbCommunityBlock.hidden = true;
      }

      // tags from index
      const item = indexItems.find(it => it.path === d.id);
      const tags = item?.tags || [];
      sbTags.innerHTML = tags.map(t => `<span class="sb-tag">${escapeHtml(t)}</span>`).join('');

      // related from index
      const related = item?.related || [];
      if (related.length) {
        sbRelList.innerHTML = related.slice(0, 8).map(r => {
          const relId = r.replace(/\//g,'-').replace('.md','');
          const relItem = indexItems.find(it => it.path === r || it.id === relId);
          const relTitle = relItem?.title || r.split('/').pop().replace('.md','');
          return `<li><a href="detail.html?id=${encodeURIComponent(relId)}">${escapeHtml(relTitle)}</a></li>`;
        }).join('');
        sbRelSec.hidden = false;
      } else {
        sbRelSec.hidden = true;
      }

      const paperLinks = (item?.source_links || []).filter(url =>
        String(url).includes('Humanoid_Robot_Learning_Paper_Notebooks')
      );
      if (paperLinks.length) {
        sbPaperList.innerHTML = paperLinks.slice(0, 6).map((url, idx) => {
          const stem = decodeURIComponent(String(url).split('/').pop().replace(/\.html$/, ''));
          const label = stem.replace(/[_-]+/g, ' ').trim() || `论文阅读笔记 ${idx + 1}`;
          return `<li><a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(label)}</a></li>`;
        }).join('');
        sbPaperSec.hidden = false;
      } else {
        sbPaperSec.hidden = true;
      }

      sbOpenLink.href = detailUrl;

      // slides button — derive stem from path (e.g. wiki/concepts/foo.md → foo)
      const stem = (d.id || '').split('/').pop().replace(/\.md$/, '');
      const slidesUrl = 'slides/' + stem + '.html';
      // Try to detect if slides file exists via a HEAD fetch (async, non-blocking)
      sbSlidesLink.style.opacity = '0.45';
      sbSlidesLink.style.cursor = 'default';
      sbSlidesLink.onclick = () => false;
      sbSlidesLink.title = '本地运行 make slides F=' + stem + ' 生成';
      fetch(slidesUrl, { method: 'HEAD' }).then(r => {
        if (r.ok) {
          sbSlidesLink.href = slidesUrl;
          sbSlidesLink.style.opacity = '1';
          sbSlidesLink.style.cursor = 'pointer';
          sbSlidesLink.onclick = null;
          sbSlidesLink.title = '查看幻灯片版';
        }
      }).catch(() => {});

      sidebar.classList.add('open');
      wrap.classList.add('sidebar-open');
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      wrap.classList.remove('sidebar-open');
      simulation.force('center', d3.forceCenter(
        (wrap.clientWidth || W) / 2, H / 2
      ).strength(0.05)).alpha(0.1).restart();
    }

    sbClose.addEventListener('click', closeSidebar);

    // 覆盖节点 click：PC 打开侧边栏而不是直接跳转
    node.on('click', (ev, d) => {
      ev.stopPropagation();
      if (isMobile) {
        if (pinnedNode === d) {
          pinnedNode = null;
          hideTooltip();
        } else {
          pinnedNode = d;
          showTooltip(ev, d);
        }
      } else {
        openSidebar(d);
      }
    });

    // Esc 也关闭侧边栏
    document.addEventListener('keydown', ev => {
      if (ev.key === 'Escape') {
        closeSidebar();
      }
    }, true);  // 用 capture 覆盖前面的 Esc handler

    /* ════════════════════════════════════════════
       ?focus=<id> URL 参数：页面加载后飞行定位
    ════════════════════════════════════════════ */

    const focusId = new URLSearchParams(location.search).get('focus');
    if (focusId) {
      const focusNode = nodes.find(n => n.id === focusId ||
        n.id === decodeURIComponent(focusId));
      if (focusNode) {
        const flyToFocus = () => {
          if (focusNode.x == null) return;
          const scale = 2.2;
          svg.transition().duration(700).call(
            zoom.transform,
            d3.zoomIdentity
              .translate(W / 2 - scale * focusNode.x, H / 2 - scale * focusNode.y)
              .scale(scale)
          );
          openSidebar(focusNode);
        };
        // 等仿真稳定后飞行
        simulation.on('end.focus', () => { flyToFocus(); simulation.on('end.focus', null); });
        setTimeout(flyToFocus, 1400);  // fallback: 1.4s 后强制执行
      }
    }

  })();
  </script>
</body>
</html>
