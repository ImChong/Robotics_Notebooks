name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check scripts/ tests/

      - name: Ruff format (check)
        run: ruff format --check scripts tests

      - name: Mypy
        env:
          PYTHONPATH: scripts
        run: mypy scripts

      - name: pip-audit (requirements-dev)
        run: python3 -m pip_audit -r requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: npm ci (ESLint)
        run: npm ci

      - name: ESLint docs/main.js
        run: npm run lint:js

      - name: Pytest with coverage
        env:
          PYTHONPATH: scripts
        run: python3 -m pytest
