<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robotics Notebooks — Mind Map</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: #1a1a2e;
      color: #fff;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-title { font-size: 16px; font-weight: 600; }
    .header-actions { display: flex; gap: 6px; }
    .btn {
      padding: 4px 10px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.3);
      background: transparent;
      color: #fff;
      cursor: pointer;
      font-size: 12px;
    }
    .btn:hover { background: rgba(255,255,255,0.12); }
    #chart { flex: 1; overflow: hidden; }
    svg { width: 100%; height: 100%; }

    .node rect {
      rx: 5; ry: 5;
      stroke-width: 1.5;
    }
    .node text {
      font-size: 12px;
      dominant-baseline: middle;
      pointer-events: none;
    }
    .link {
      fill: none;
      stroke-width: 1.5;
      stroke-opacity: 0.6;
    }

    #loading {
      position: fixed; inset: 0; background: #f0f4f8;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: #666;
    }
    #error {
      display: none; position: fixed; inset: 0;
      background: #fff3f3; color: #c00; padding: 40px; font-size: 14px; line-height: 1.8;
    }

    /* Dark */
    body.dark { background: #111827; }
    body.dark #chart { background: #111827; }
    body.dark #loading { background: #111827; color: #94a3b8; }
  </style>
</head>
<body>

<div class="header">
  <span class="header-title">🤖 Robotics Notebooks</span>
  <div class="header-actions">
    <button class="btn" id="btnZoomIn">+</button>
    <button class="btn" id="btnZoomOut">−</button>
    <button class="btn" id="btnFit">Fit</button>
    <button class="btn" id="btnTheme">🌙</button>
  </div>
</div>

<div id="chart"></div>
<div id="loading">Loading…</div>
<div id="error"><b>⚠ Error</b><br><span id="errMsg"></span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
// ── Theme ───────────────────────────────────────────────
const isDark = () => document.body.classList.contains('dark');
function setTheme(dark) {
  document.body.classList.toggle('dark', dark);
  document.getElementById('btnTheme').textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('rn-theme', dark ? 'dark' : 'light');
}
(function(){
  const s = localStorage.getItem('rn-theme');
  setTheme(s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme:dark)').matches));
})();
document.getElementById('btnTheme').onclick = () => setTheme(!isDark());

// ── Parser: bullet-point indentation → tree ─────────────
function parseMd(md) {
  const root = { text: 'Robotics Notebooks', children: [], links: [] };
  // stack entries: { node, depth }
  const stack = [{ node: root, depth: -1 }];

  for (const rawLine of md.split('\n')) {
    const line = rawLine.replace(/\t/g, '    ');
    const m = line.match(/^( *)-[ \t]+(.+)/);
    if (!m) continue;

    const depth = Math.floor(m[1].length / 4);   // 0-based indent level
    let text = m[2].trim();

    // extract markdown links
    const links = [];
    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, url) => {
      links.push({ label: label.trim(), url: url.trim() });
      return label.trim();
    });
    // strip inline code & bold
    text = text.replace(/`([^`]+)`/g, '$1').replace(/\*\*([^*]+)\*\*/g, '$1').trim();
    if (!text) continue;

    const node = { text, links, children: [] };

    // find parent: pop until stack top has depth < current depth
    while (stack.length > 1 && stack[stack.length - 1].depth >= depth) stack.pop();
    stack[stack.length - 1].node.children.push(node);
    stack.push({ node, depth });
  }
  return root;
}

// ── Renderer: horizontal left-to-right tree ─────────────
const NODE_H = 24;    // row height per node
const NODE_PAD_X = 12;
const COL_W = 200;    // horizontal step per depth level

let svgEl, zoomBehavior;

function render(data) {
  const container = document.getElementById('chart');
  container.innerHTML = '';

  const W = container.clientWidth;
  const H = container.clientHeight;

  // D3 hierarchy — children accessor returns the children array
  const root = d3.hierarchy(data, d => d.children && d.children.length ? d.children : null);

  // Tree layout: x = vertical position, y = horizontal (depth)
  const treeLayout = d3.tree()
    .nodeSize([NODE_H + 4, COL_W])
    .separation((a, b) => a.parent === b.parent ? 1 : 1.2);

  treeLayout(root);

  // Palette by depth
  const darkPalette  = ['#4f46e5','#7c3aed','#0369a1','#047857','#92400e','#9d174d'];
  const lightPalette = ['#4f46e5','#7c3aed','#0369a1','#047857','#92400e','#9d174d'];
  const palette = isDark() ? darkPalette : lightPalette;
  const bgPalette = isDark()
    ? ['#1e1b4b','#2e1065','#0c4a6e','#052e16','#431407','#500724']
    : ['#e0e7ff','#ede9fe','#e0f2fe','#dcfce7','#fef3c7','#fce7f3'];

  // Measure text width
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  ctx.font = '12px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
  const textWidth = t => ctx.measureText(t).width;

  // Compute actual node box widths
  root.descendants().forEach(d => {
    d._w = Math.min(textWidth(d.data.text) + NODE_PAD_X * 2, COL_W - 16);
  });

  const svg = d3.select(container).append('svg');
  svgEl = svg;

  const g = svg.append('g');

  zoomBehavior = d3.zoom().scaleExtent([0.1, 4])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoomBehavior).on('dblclick.zoom', null);

  // Links
  g.selectAll('.link')
    .data(root.links())
    .join('path')
    .attr('class', 'link')
    .attr('stroke', isDark() ? '#6366f1' : '#a5b4fc')
    .attr('d', d3.linkHorizontal()
      .x(d => d.y)
      .y(d => d.x));

  // Nodes
  const node = g.selectAll('.node')
    .data(root.descendants())
    .join('g')
    .attr('class', 'node')
    .attr('transform', d => `translate(${d.y},${d.x})`);

  node.append('rect')
    .attr('x', 0)
    .attr('y', -NODE_H / 2)
    .attr('width', d => d._w)
    .attr('height', NODE_H)
    .attr('rx', 5).attr('ry', 5)
    .attr('fill', d => bgPalette[d.depth % bgPalette.length])
    .attr('stroke', d => palette[d.depth % palette.length]);

  node.append('text')
    .attr('x', NODE_PAD_X)
    .attr('y', 0)
    .attr('fill', d => isDark() ? '#e2e8f0' : '#1e293b')
    .text(d => d.data.text);

  // Cursor for nodes with links
  node.style('cursor', d => d.data.links && d.data.links.length ? 'pointer' : 'default');

  // Tooltip
  const tip = d3.select(document.body).append('div')
    .style('position', 'fixed')
    .style('background', '#1e1b4b')
    .style('color', '#e0e7ff')
    .style('padding', '10px 14px')
    .style('border-radius', '8px')
    .style('font-size', '13px')
    .style('pointer-events', 'none')
    .style('z-index', '9999')
    .style('max-width', '360px')
    .style('box-shadow', '0 8px 24px rgba(0,0,0,0.4)')
    .style('line-height', '1.9')
    .style('display', 'none');

  node.on('mouseenter', function(event, d) {
    if (!d.data.links || !d.data.links.length) return;
    tip.html(d.data.links.map(l =>
      `<a href="${l.url}" target="_blank" style="color:#a5b4fc;text-decoration:none">${l.label} ↗</a>`
    ).join('<br>'))
    .style('display', 'block')
    .style('left', (event.clientX + 14) + 'px')
    .style('top',  (event.clientY - 10) + 'px');
  })
  .on('mouseleave', () => tip.style('display', 'none'))
  .on('click', (event, d) => {
    if (d.data.links && d.data.links.length) window.open(d.data.links[0].url, '_blank');
  });

  // Initial fit
  fitView(g, W, H);

  // Controls
  document.getElementById('btnZoomIn').onclick  = () => svg.transition().duration(250).call(zoomBehavior.scaleBy, 1.3);
  document.getElementById('btnZoomOut').onclick = () => svg.transition().duration(250).call(zoomBehavior.scaleBy, 0.75);
  document.getElementById('btnFit').onclick     = () => fitView(g, W, H);
}

function fitView(g, W, H) {
  const bb = g.node().getBBox();
  if (!bb.width || !bb.height) return;
  const scale = Math.min(0.9, Math.min(W / (bb.width + 40), H / (bb.height + 40)));
  const tx = W / 2 - (bb.x + bb.width / 2) * scale;
  const ty = H / 2 - (bb.y + bb.height / 2) * scale;
  svgEl.transition().duration(400)
    .call(zoomBehavior.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

// ── Boot ─────────────────────────────────────────────────
(async function() {
  try {
    const r = await fetch('https://raw.githubusercontent.com/ImChong/Robotics_Notebooks/main/README.md');
    if (!r.ok) throw new Error(`HTTP ${r.status} fetching README`);
    const md = await r.text();
    const tree = parseMd(md);
    document.getElementById('loading').style.display = 'none';
    render(tree);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('errMsg').textContent = e.message;
    console.error(e);
  }
})();
</script>
</body>
</html>
