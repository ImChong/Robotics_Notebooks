    /* ── 筛选面板尺寸（可拖拽缩放，尺寸写入 localStorage）── */
    const FILTER_PANEL_SIZE_KEY = 'graph-filter-panel-size';
    const FILTER_PANEL_DEFAULT_SIZE = { width: 260, height: 520 };
    const FILTER_PANEL_MIN_SIZE = { width: 220, height: 280 };

    function isFilterPanelResizeEnabled() {
      return !window.matchMedia('(max-width: 768px)').matches;
    }

    function getFilterPanelMaxSize() {
      const panelTop = 12;
      const panelLeft = 20;
      const canvasTop = 58 + 46;
      return {
        width: Math.max(FILTER_PANEL_MIN_SIZE.width, window.innerWidth - panelLeft - 24),
        height: Math.max(FILTER_PANEL_MIN_SIZE.height, window.innerHeight - canvasTop - panelTop - 12)
      };
    }

    function clampFilterPanelSize(width, height) {
      const max = getFilterPanelMaxSize();
      return {
        width: Math.round(Math.min(max.width, Math.max(FILTER_PANEL_MIN_SIZE.width, width))),
        height: Math.round(Math.min(max.height, Math.max(FILTER_PANEL_MIN_SIZE.height, height)))
      };
    }

    function loadFilterPanelSize() {
      if (!isFilterPanelResizeEnabled()) {
        return { ...FILTER_PANEL_DEFAULT_SIZE };
      }
      try {
        const raw = localStorage.getItem(FILTER_PANEL_SIZE_KEY);
        if (!raw) return { ...FILTER_PANEL_DEFAULT_SIZE };
        const parsed = JSON.parse(raw);
        return clampFilterPanelSize(
          parsed.width ?? FILTER_PANEL_DEFAULT_SIZE.width,
          parsed.height ?? FILTER_PANEL_DEFAULT_SIZE.height
        );
      } catch {
        return { ...FILTER_PANEL_DEFAULT_SIZE };
      }
    }

    function saveFilterPanelSize(width, height) {
      if (!isFilterPanelResizeEnabled()) return;
      try {
        localStorage.setItem(FILTER_PANEL_SIZE_KEY, JSON.stringify({ width, height }));
      } catch { /* ignore */ }
    }

    function clearFilterPanelInlineSize() {
      if (!filterPanel) return;
      filterPanel.style.width = '';
      filterPanel.style.height = '';
    }

    function applyFilterPanelSize(width, height) {
      if (!filterPanel || !isFilterPanelResizeEnabled()) return;
      const size = clampFilterPanelSize(width, height);
      filterPanel.style.width = size.width + 'px';
      filterPanel.style.height = size.height + 'px';
      return size;
    }

    function syncFilterPanelSizeMode() {
      if (!filterPanel) return;
      if (!isFilterPanelResizeEnabled()) {
        clearFilterPanelInlineSize();
        endFilterPanelResize();
        return;
      }
      const size = loadFilterPanelSize();
      applyFilterPanelSize(size.width, size.height);
    }

    let filterPanelResize = null;

    function startFilterPanelResize(edge, event) {
      if (!isFilterPanelResizeEnabled() || !filterPanel) return;
      const rect = filterPanel.getBoundingClientRect();
      filterPanelResize = {
        edge,
        startX: event.clientX,
        startY: event.clientY,
        startW: rect.width,
        startH: rect.height
      };
      document.addEventListener('mousemove', onFilterPanelResizeMove);
      document.addEventListener('mouseup', endFilterPanelResize);
      document.body.classList.add('filter-panel-resizing');
    }

    function onFilterPanelResizeMove(event) {
      if (!filterPanelResize) return;
      const dx = event.clientX - filterPanelResize.startX;
      const dy = event.clientY - filterPanelResize.startY;
      let w = filterPanelResize.startW;
      let h = filterPanelResize.startH;
      const edge = filterPanelResize.edge;
      if (edge.includes('e')) w += dx;
      if (edge.includes('s')) h += dy;
      const size = applyFilterPanelSize(w, h);
      const cursor = edge === 'e' ? 'ew-resize' : edge === 's' ? 'ns-resize' : 'nwse-resize';
      document.body.style.cursor = cursor;
      if (size) {
        filterPanelResize.liveW = size.width;
        filterPanelResize.liveH = size.height;
      }
    }

    function endFilterPanelResize() {
      if (!filterPanelResize) return;
      if (filterPanelResize.liveW != null && filterPanelResize.liveH != null) {
        saveFilterPanelSize(filterPanelResize.liveW, filterPanelResize.liveH);
      }
      filterPanelResize = null;
      document.removeEventListener('mousemove', onFilterPanelResizeMove);
      document.removeEventListener('mouseup', endFilterPanelResize);
      document.body.classList.remove('filter-panel-resizing');
      document.body.style.cursor = '';
    }

    (function initFilterPanelSize() {
      if (!filterPanel) return;
      syncFilterPanelSizeMode();
      filterPanel.querySelectorAll('.filter-resize-handle').forEach(handle => {
        handle.addEventListener('mousedown', ev => {
          ev.preventDefault();
          ev.stopPropagation();
          const edge = handle.classList.contains('filter-resize-se') ? 'se'
            : handle.classList.contains('filter-resize-s') ? 's' : 'e';
          startFilterPanelResize(edge, ev);
        });
      });
      window.addEventListener('resize', () => {
        syncFilterPanelSizeMode();
        if (filterPanel && !filterPanel.hidden) {
          setFilterPanelOpen(true);
        }
      });
    })();

    /* ── 筛选面板开关 ── */
    filterToggle.addEventListener('click', () => {
      if (areFiltersLocked()) return;
      setFilterPanelOpen(filterPanel.hidden);
    });

    // V17: 社区高亮功能 / V22: 扩展支持类型与健康度筛选
    graphLegend.addEventListener('click', (ev) => {
      if (areFiltersLocked()) return;
      const row = ev.target.closest('.legend-row');
      if (!row) return;

      const cid = row.getAttribute('data-community-id');
      const type = row.getAttribute('data-type');
      const health = row.getAttribute('data-health');

      if (cid) {
        focusedCommunityId = (focusedCommunityId === cid) ? null : cid;
      } else if (type) {
        focusedType = (focusedType === type) ? null : type;
      } else if (health !== null) {
        focusedHealth = (focusedHealth === health) ? null : health;
      } else {
        return;
      }
      renderLegend();
      renderFilterPanel();
      applyFilters();
      updateFilterCount();
    });
    document.getElementById('filter-close').addEventListener('click', (ev) => {
      ev.stopPropagation();
      setFilterPanelOpen(false);
    });
    document.getElementById('filter-clear').addEventListener('click', () => {
      if (areFiltersLocked()) return;
      activeFilters.clear();
      topDegreeLimit = totalNodeCount;
      topDegreeIds = null;
      initDegreeTopSlider();
      renderFilterPanel();
      setActiveTopic('all');
    });
    renderFilterPanel();

    /* ── checkbox 筛选 ── */
    function updateFilterCount() {
      const count = activeFilters.size + (topDegreeIds ? 1 : 0) + (currentTopic && currentTopic !== 'all' ? 1 : 0);
      const countEl = document.getElementById('filter-count');
      if (count > 0) {
        countEl.textContent = count;
        countEl.style.display = 'inline-flex';
      } else {
        countEl.style.display = 'none';
      }
    }

    /* ── 搜索 ── */
    let searchQuery = '';
    document.getElementById('graph-search').addEventListener('input', ev => {
      searchQuery = ev.target.value.trim().toLowerCase();
      applyFilters();
    });

    /* ── 专题视图切换（已合入筛选面板内 <details> 区块）── */
    const topicChipsEl = document.getElementById('filter-topic-chips');
    const topicCurrentEl = document.getElementById('filter-topic-current');
    function setActiveTopic(topic) {
      currentTopic = topic || 'all';
      let activeBtn = null;
      if (topicChipsEl) {
        topicChipsEl.querySelectorAll('.filter-topic-chip').forEach(btn => {
          const on = btn.getAttribute('data-topic') === currentTopic;
          btn.classList.toggle('is-active', on);
          if (on) activeBtn = btn;
        });
      }
      if (topicCurrentEl && activeBtn) topicCurrentEl.innerHTML = activeBtn.innerHTML;
      applyFilters();
      updateFilterCount();
      if (currentTopic !== 'all') fitToVisibleNodes();
      else fitToScreen();
    }
    if (topicChipsEl) {
      topicChipsEl.addEventListener('click', ev => {
        if (areFiltersLocked()) return;
        const btn = ev.target.closest('.filter-topic-chip');
        if (!btn) return;
        setActiveTopic(btn.getAttribute('data-topic'));
      });
    }

    /* 当前可见节点 ID 集合（供 hover 检查筛选状态用） */
    const visibleNodeIds = new Set();

    function nodeMatchesCurrentFilter(d) {
      if (focusedCommunityId) return d.community === focusedCommunityId;
      if (focusedType) return d.type === focusedType;
      if (focusedHealth !== null) return String(d.health_score != null ? d.health_score : 0) === focusedHealth;
      if (!activeFilters.size) return true;
      if (colorMode === 'community') {
        return activeFilters.has(d.community);
      }
      if (colorMode === 'health') {
        return activeFilters.has(String(d.health_score != null ? d.health_score : 0));
      }
      return activeFilters.has(d.type) || (activeFilters.has('__orphan__') && d._degree <= 1);
    }

    function edgeMatchesCurrentFilter(n) {
      if (focusedCommunityId) return n.community === focusedCommunityId;
      if (focusedType) return n.type === focusedType;
      if (focusedHealth !== null) return String(n.health_score != null ? n.health_score : 0) === focusedHealth;
      if (!activeFilters.size) return true;
      if (colorMode === 'community') {
        return activeFilters.has(n.community);
      }
      if (colorMode === 'health') {
        return activeFilters.has(String(n.health_score != null ? n.health_score : 0));
      }
      return activeFilters.has(n.type) || (activeFilters.has('__orphan__') && n._degree <= 1);
    }

    function nodeMatchesSearch(d) {
      if (!searchQuery) return true;
      return (d._info.title || d.label || '').toLowerCase().includes(searchQuery)
          || d.id.toLowerCase().includes(searchQuery);
    }

    function applyFilters() {
      if (timelineAnimating) return;
      const hasFilter = topDegreeIds !== null || activeFilters.size > 0 || searchQuery.length > 0
        || focusedCommunityId || focusedType || focusedHealth !== null
        || currentTopic !== 'all';
      visibleNodeIds.clear();
      let visible = 0;

      node.each(function(d) {
        const ok = nodeMatchesDegreeTop(d) && nodeMatchesCurrentFilter(d)
          && nodeMatchesSearch(d) && nodeMatchesTopic(d);
        if (ok) { visible++; visibleNodeIds.add(d.id); }

        // V21 修复：显式重置节点整体 opacity (移除 openSidebar 可能留下的残留)
        d3.select(this).style('opacity', hasFilter ? (ok ? 1 : 0.08) : 1);

        d3.select(this).select('.node-circle')
          .attr('fill-opacity', ok ? 1 : 0.06)
          .attr('stroke-opacity', ok ? 0.35 : 0.05);
        d3.select(this).select('.node-label').style('opacity', ok && searchQuery ? 0.9 : null);
      });

      link
        .style('opacity', null) // V21 修复：清除 openSidebar 的内联 style 干扰
        .attr('stroke-opacity', e => {
          if (!hasFilter) return 1;
          const s = typeof e.source === 'object' ? e.source : nodes.find(n => n.id === e.source);
          const t = typeof e.target === 'object' ? e.target : nodes.find(n => n.id === e.target);
          if (!s || !t) return 0.2;
          return (nodeMatchesDegreeTop(s) && nodeMatchesDegreeTop(t)
                  && edgeMatchesCurrentFilter(s) && nodeMatchesSearch(s) && nodeMatchesTopic(s)
                  && edgeMatchesCurrentFilter(t) && nodeMatchesSearch(t) && nodeMatchesTopic(t)) ? 1 : 0.2;
        })
        .attr('stroke-width', e => {
          if (!hasFilter) return linkWidthBase;
          const s = typeof e.source === 'object' ? e.source : nodes.find(n => n.id === e.source);
          const t = typeof e.target === 'object' ? e.target : nodes.find(n => n.id === e.target);
          if (!s || !t) return linkWidthBase * 0.5;
          const edgeOk = nodeMatchesDegreeTop(s) && nodeMatchesDegreeTop(t)
            && edgeMatchesCurrentFilter(s) && nodeMatchesSearch(s) && nodeMatchesTopic(s)
            && edgeMatchesCurrentFilter(t) && nodeMatchesSearch(t) && nodeMatchesTopic(t);
          return edgeOk ? linkWidthBase : linkWidthBase * 0.5;
        });
      updateCount(visible);
      if (searchQuery) flyToVisible();
    }

    /* ── 时序动画（Obsidian Animate：按 recency 从早到晚逐帧显现）── */
    const timelineAnimateBtn = document.getElementById('timeline-animate');
    const timelineControls = document.getElementById('timeline-controls');
    const timelineProgressEl = document.getElementById('timeline-progress');
    const timelinePlayPauseBtn = document.getElementById('timeline-playpause');
    const timelineRestartBtn = document.getElementById('timeline-restart');
    const timelineScrubCurrentEl = document.getElementById('timeline-scrub-current');
    const timelineScrubTotalEl = document.getElementById('timeline-scrub-total');

    const TIMELINE_ICON_PLAY = '<svg class="timeline-icon" viewBox="0 0 16 16" aria-hidden="true"><polygon points="5,3 5,13 13,8" fill="currentColor"/></svg>';
    const TIMELINE_ICON_PAUSE = '<svg class="timeline-icon" viewBox="0 0 16 16" aria-hidden="true"><rect x="4.2" y="3" width="2.6" height="10" rx="0.4" fill="currentColor"/><rect x="9.2" y="3" width="2.6" height="10" rx="0.4" fill="currentColor"/></svg>';

    function syncTimelineInteractionState() {
      const filtersLocked = areFiltersLocked();
      const scrubEnabled = timelineAnimating;

      if (filterToggle) {
        filterToggle.disabled = filtersLocked;
        filterToggle.classList.toggle('is-disabled', filtersLocked);
        filterToggle.setAttribute('aria-disabled', filtersLocked ? 'true' : 'false');
      }
      if (filterPanel) filterPanel.classList.toggle('filters-locked', filtersLocked);
      if (filtersLocked && filterPanel && !filterPanel.hidden) setFilterPanelOpen(false);

      if (timelineControls) timelineControls.classList.toggle('is-disabled', !scrubEnabled);
      if (timelinePlayPauseBtn) timelinePlayPauseBtn.disabled = !scrubEnabled;
      if (timelineRestartBtn) timelineRestartBtn.disabled = !scrubEnabled;
      if (timelineProgressEl) timelineProgressEl.disabled = !scrubEnabled;
    }

    function getNodeRecency(d) {
      return d.recency || '1970-01-01';
    }

    function sortNodesByTimeline(list) {
      return list.slice().sort((a, b) => {
        const cmp = getNodeRecency(a).localeCompare(getNodeRecency(b));
        return cmp !== 0 ? cmp : a.id.localeCompare(b.id);
      });
    }

    // 同步进度文本 + 进度条 + 顶部计数
    function updateTimelineProgress(revealedCount, total) {
      const countEl = document.getElementById('graph-node-count');
      if (countEl) countEl.textContent = `时序 ${revealedCount} / ${total} · ${edges.length} 边`;
      if (timelineScrubCurrentEl) timelineScrubCurrentEl.textContent = String(revealedCount);
      if (timelineScrubTotalEl) timelineScrubTotalEl.textContent = String(total);
      if (timelineProgressEl) {
        if (String(timelineProgressEl.max) !== String(total)) timelineProgressEl.max = String(total);
        timelineProgressEl.value = String(revealedCount);
        const pct = total > 0 ? (revealedCount / total) * 100 : 0;
        timelineProgressEl.style.setProperty('--tl-pct', pct + '%');
      }
    }

    // 按钮文案 / 高亮随播放状态切换
    function updateTimelineControls() {
      if (timelinePlayPauseBtn) {
        timelinePlayPauseBtn.innerHTML = timelinePlaying ? TIMELINE_ICON_PAUSE : TIMELINE_ICON_PLAY;
        timelinePlayPauseBtn.title = timelinePlaying ? '暂停' : '播放';
        timelinePlayPauseBtn.setAttribute('aria-label', timelinePlaying ? '暂停' : '播放');
      }
      if (timelineAnimateBtn) {
        timelineAnimateBtn.classList.toggle('is-timeline-active', timelineAnimating);
        const icon = timelineAnimateBtn.querySelector('span:first-child');
        const label = timelineAnimateBtn.querySelector('span:last-child');
        if (icon) icon.textContent = timelineAnimating ? '✕' : '▶';
        if (label) label.textContent = timelineAnimating ? '退出动画' : '时序动画';
      }
      syncTimelineInteractionState();
    }

    function updateTimelineLinks(revealed) {
      link.attr('stroke-opacity', e => {
        const sid = typeof e.source === 'object' ? e.source.id : e.source;
        const tid = typeof e.target === 'object' ? e.target.id : e.target;
        return revealed.has(sid) && revealed.has(tid) ? 0.35 : 0;
      });
    }

    // 前进显现单个节点（带 pop-in 动画，用于播放）
    function revealTimelineNode(d) {
      const sel = node.filter(n => n.id === d.id);
      sel.attr('transform', `translate(${d.x},${d.y})`);   // 从出生位置出现，随后由力模拟带动
      sel.style('pointer-events', null);   // 恢复指针事件，使暂停时可点击
      sel.interrupt()
        .style('opacity', 1)
        .select('.node-glow')
        .attr('fill-opacity', 0);
      sel.select('.node-circle')
        .attr('fill-opacity', 1)
        .attr('stroke-opacity', 0.35)
        .attr('r', n => scaledRadius(n) * 0.15)
        .transition()
        .duration(220)
        .ease(d3.easeCubicOut)
        .attr('r', scaledRadius);
    }

    // 按当前 timelineRevealedIds 一次性渲染（无动画，用于拖拽 / 倒退）
    function renderTimelineStatic() {
      node.each(function (d) {
        const shown = timelineRevealedIds.has(d.id);
        const g = d3.select(this);
        g.interrupt().style('opacity', shown ? 1 : 0);
        g.style('pointer-events', shown ? null : 'none');   // 已显现节点可点击
        g.select('.node-glow').attr('fill-opacity', 0);
        g.select('.node-circle')
          .interrupt()
          .attr('fill-opacity', shown ? 1 : 0)
          .attr('stroke-opacity', shown ? 0.35 : 0)
          .attr('r', scaledRadius);
      });
    }

    /* ── Obsidian 式：力模拟只作用于「已显现」的节点子集 ── */
    function buildTimelineAdjacency() {
      timelineIncident = new Map();
      edges.forEach(e => {
        const s = typeof e.source === 'object' ? e.source.id : e.source;
        const t = typeof e.target === 'object' ? e.target.id : e.target;
        if (!timelineIncident.has(s)) timelineIncident.set(s, []);
        if (!timelineIncident.has(t)) timelineIncident.set(t, []);
        timelineIncident.get(s).push(e);
        timelineIncident.get(t).push(e);
      });
    }

    // 新节点出生位置：落在已显现邻居的质心附近；无邻居则落在画布中心附近
    function seedTimelineNodePosition(d) {
      let sx = 0, sy = 0, cnt = 0;
      const inc = timelineIncident && timelineIncident.get(d.id);
      if (inc) {
        for (const e of inc) {
          const sid = typeof e.source === 'object' ? e.source.id : e.source;
          const other = sid === d.id ? e.target : e.source;
          if (other && typeof other === 'object' && timelineRevealedIds.has(other.id) && other.x != null) {
            sx += other.x; sy += other.y; cnt++;
          }
        }
      }
      if (cnt > 0) {
        d.x = sx / cnt + (Math.random() - 0.5) * 30;
        d.y = sy / cnt + (Math.random() - 0.5) * 30;
      } else {
        d.x = W / 2 + (Math.random() - 0.5) * 80;
        d.y = H / 2 + (Math.random() - 0.5) * 80;
      }
      d.vx = 0; d.vy = 0; d.fx = null; d.fy = null;
    }

    function placeTimelineNode(d) {
      node.filter(n => n.id === d.id).attr('transform', `translate(${d.x},${d.y})`);
    }

    // 把力模拟成员同步为「当前已显现」的节点与其内部边
    function syncTimelineSimulation() {
      const revNodes = nodes.filter(n => timelineRevealedIds.has(n.id));
      const revEdges = edges.filter(e => {
        const s = typeof e.source === 'object' ? e.source.id : e.source;
        const t = typeof e.target === 'object' ? e.target.id : e.target;
        return timelineRevealedIds.has(s) && timelineRevealedIds.has(t);
      });
      const linkForce = simulation.force('link');
      linkForce.links([]);            // 先清空，避免 nodes() 重新初始化时校验到已被移除的端点
      simulation.nodes(revNodes);
      linkForce.links(revEdges);
    }

    // 进入前布局快照与还原（退出时回到进入前的样子）
    function snapshotTimelinePositions() {
      timelineSavedPositions = nodes.map(n => ({ id: n.id, x: n.x, y: n.y }));
    }
    function restoreTimelinePositions() {
      if (!timelineSavedPositions) return;
      const byId = new Map(nodes.map(n => [n.id, n]));
      timelineSavedPositions.forEach(p => {
        const n = byId.get(p.id);
        if (n) { n.x = p.x; n.y = p.y; n.vx = 0; n.vy = 0; n.fx = null; n.fy = null; }
      });
    }

    // 相机自适应到「已显现」节点（生长时随之缩放，类似 Obsidian）
    function fitToTimelineNodes() {
      if (!updateGraphViewport()) return;
      const vis = nodes.filter(n => timelineRevealedIds.has(n.id) && n.x != null);
      if (vis.length < 2) return;
      const xs = vis.map(n => n.x), ys = vis.map(n => n.y);
      const x0 = Math.min(...xs), x1 = Math.max(...xs);
      const y0 = Math.min(...ys), y1 = Math.max(...ys);
      const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
      const pad = 160;
      const scale = Math.min(2.2, Math.max(0.45,
        Math.min(W / Math.max(x1 - x0 + pad, 200), H / Math.max(y1 - y0 + pad, 200))));
      svg.transition('tlfit').duration(500).ease(d3.easeCubicOut).call(
        zoom.transform,
        d3.zoomIdentity.translate(W / 2 - scale * cx, H / 2 - scale * cy).scale(scale)
      );
    }

    // 跳转到指定进度：显现前 targetIdx 个节点
    function seekTimeline(targetIdx, animate) {
      if (!timelineAnimating) return;
      if (sidebar.classList.contains('open')) closeSidebar();  // 时序推进/拖拽时收起详情侧栏，避免高亮态残留
      targetIdx = Math.max(0, Math.min(timelineTotal, Math.round(targetIdx)));
      const prev = timelineIdx;
      if (targetIdx === prev) { updateTimelineProgress(timelineIdx, timelineTotal); return; }

      if (targetIdx > prev) {
        for (let i = prev; i < targetIdx; i++) {
          const d = timelineOrdered[i];
          seedTimelineNodePosition(d);          // 先按已显现邻居定位
          timelineRevealedIds.add(d.id);
          if (animate) revealTimelineNode(d);   // 播放：逐个 pop-in（含定位）
          else placeTimelineNode(d);            // 拖拽：仅定位，显隐交给下方批量渲染
        }
        if (!animate) renderTimelineStatic();
      } else {
        for (let i = targetIdx; i < prev; i++) timelineRevealedIds.delete(timelineOrdered[i].id);
        renderTimelineStatic();
      }
      syncTimelineSimulation();                 // 成员 = 已显现子集；暂停时力模拟仍继续
      timelineIdx = targetIdx;
      updateTimelineLinks(timelineRevealedIds);
      updateTimelineProgress(timelineIdx, timelineTotal);
    }

    function startTimelinePlayback() {
      if (!timelineAnimating || timelinePlaying) return;
      if (timelineIdx >= timelineTotal) seekTimeline(0, false); // 已到末尾再播放则从头开始
      timelinePlaying = true;
      updateTimelineControls();
      simulation.alphaTarget(0.3).restart();    // 力模拟持续运行，新节点逐帧被带动
      timelineAnimTimer = setInterval(() => {
        if (timelineIdx >= timelineTotal) { onTimelinePlaybackComplete(); return; }
        seekTimeline(timelineIdx + timelineBatchSize, true);
        const now = performance.now();
        if (now - timelineLastFit > 650) { timelineLastFit = now; fitToTimelineNodes(); }
      }, timelineStepMs);
    }

    function onTimelinePlaybackComplete() {
      if (timelineAnimTimer) { clearInterval(timelineAnimTimer); timelineAnimTimer = null; }
      timelinePlaying = false;
      updateTimelineControls();
      simulation.alphaTarget(0);     // 缓缓收敛（最后一批节点落位），不立即冻结
      fitToTimelineNodes();
    }

    function pauseTimelinePlayback() {
      if (timelineAnimTimer) {
        clearInterval(timelineAnimTimer);
        timelineAnimTimer = null;
      }
      timelinePlaying = false;
      svg.interrupt('tlfit');
      simulation.alphaTarget(0.3).restart();   // 仅停计时器，力导向布局继续演化
      updateTimelineControls();
    }

    function enterTimelineMode() {
      if (typeof closeSidebar === 'function') closeSidebar();
      hideTooltip();

      timelineOrdered = sortNodesByTimeline(nodes);
      timelineTotal = timelineOrdered.length;
      if (!timelineTotal) return;

      snapshotTimelinePositions();
      buildTimelineAdjacency();
      fitToScreen();                 // 先框定整图范围（用进入前布局），生长从中心展开

      timelineAnimating = true;
      timelineIdx = 0;
      timelineLastFit = 0;
      timelineRevealedIds.clear();

      timelineBatchSize = timelineTotal > 400 ? 4 : (timelineTotal > 180 ? 2 : 1);
      timelineStepMs = Math.min(90, Math.max(14,
        Math.floor(TIMELINE_TARGET_MS / Math.ceil(timelineTotal / timelineBatchSize))));

      // 隐藏全部，力模拟成员清空（从 0 个节点开始生长）
      // pointer-events: none 确保透明节点不捕获任何鼠标/触控事件（opacity:0 在 SVG 中不足以屏蔽指针事件）
      node.interrupt().style('opacity', 0).style('pointer-events', 'none');
      node.select('.node-circle')
        .interrupt()
        .attr('fill-opacity', 0)
        .attr('stroke-opacity', 0);
      node.select('.node-label').style('opacity', 0);
      link.interrupt().attr('stroke-opacity', 0);
      syncTimelineSimulation();
      simulation.stop();

      if (timelineProgressEl) timelineProgressEl.max = String(timelineTotal);
      updateTimelineProgress(0, timelineTotal);
      updateTimelineControls();

      startTimelinePlayback();
    }

    // 拆除时序模式：停播、恢复完整力模拟成员、复位节点显隐（供退出与「刷新布局」共用）
    function teardownTimelineMode() {
      pauseTimelinePlayback();
      timelineAnimating = false;
      timelineRevealedIds.clear();
      timelineIdx = 0;
      timelineTotal = 0;
      node.interrupt().style('pointer-events', null);  // 恢复指针事件
      link.interrupt();
      svg.interrupt('tlfit');
      updateTimelineControls();

      const linkForce = simulation.force('link');
      linkForce.links([]);
      simulation.nodes(nodes);
      linkForce.links(edges);
      applyFilters();                 // 复位节点显隐，清除时序遗留的 opacity
    }

    function exitTimelineMode() {
      teardownTimelineMode();
      // 还原进入前布局并定格
      restoreTimelinePositions();
      simulation.stop();
      syncGraphDomFromSimulation();
      node.select('.node-label').transition().duration(350).style('opacity', 0.85);
      fitToScreen();
    }

    if (timelineAnimateBtn) {
      timelineAnimateBtn.addEventListener('click', () => {
        if (timelineAnimating) exitTimelineMode();
        else enterTimelineMode();
      });
    }
    if (timelinePlayPauseBtn) {
      timelinePlayPauseBtn.addEventListener('click', () => {
        if (!timelineAnimating) return;
        if (timelinePlaying) pauseTimelinePlayback();
        else startTimelinePlayback();
      });
    }
    if (timelineRestartBtn) {
      timelineRestartBtn.addEventListener('click', () => {
        if (!timelineAnimating) return;
        pauseTimelinePlayback();
        seekTimeline(0, false);
      });
    }
    if (timelineProgressEl) {
      timelineProgressEl.addEventListener('input', () => {
        if (!timelineAnimating) return;
        pauseTimelinePlayback();            // 拖拽时暂停，交由用户控制
        seekTimeline(Number(timelineProgressEl.value), false);
      });
    }

    syncTimelineInteractionState();

    function fitToVisibleNodes() {
      if (!updateGraphViewport()) return;
      const visNodes = nodes.filter(n => visibleNodeIds.has(n.id) && n.x != null);
      if (visNodes.length === 0) return;
      const xs = visNodes.map(n => n.x), ys = visNodes.map(n => n.y);
      const x0 = Math.min(...xs), x1 = Math.max(...xs);
      const y0 = Math.min(...ys), y1 = Math.max(...ys);
      const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
      const pad = 140;
      const scale = Math.min(5, Math.max(0.4,
        Math.min(W / Math.max(x1 - x0 + pad, 200), H / Math.max(y1 - y0 + pad, 200))));
      svg.transition().duration(650).call(
        zoom.transform,
        d3.zoomIdentity.translate(W / 2 - scale * cx, H / 2 - scale * cy).scale(scale)
      );
    }

    /* ── 适配屏幕到所有节点 ── */
    function fitToScreen() {
      if (!updateGraphViewport()) return;
      const allNodes = nodes.filter(n => n.x != null);
      if (allNodes.length === 0) return;
      const xs = allNodes.map(n => n.x), ys = allNodes.map(n => n.y);
      const x0 = Math.min(...xs), x1 = Math.max(...xs);
      const y0 = Math.min(...ys), y1 = Math.max(...ys);
      const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
      const pad = 120;
      const scale = Math.min(5, Math.max(0.5,
        Math.min(W / (x1 - x0 + pad), H / (y1 - y0 + pad))));
      svg.transition().duration(650).call(
        zoom.transform,
        d3.zoomIdentity.translate(W / 2 - scale * cx, H / 2 - scale * cy).scale(scale)
      );
    }

    /* ── 搜索飞行定位 ── */
    function flyToVisible() {
      if (!updateGraphViewport()) return;
      const visNodes = nodes.filter(n => visibleNodeIds.has(n.id) && n.x != null);
      if (visNodes.length === 0 || visNodes.length > 15) return;
      const xs = visNodes.map(n => n.x), ys = visNodes.map(n => n.y);
      const x0 = Math.min(...xs), x1 = Math.max(...xs);
      const y0 = Math.min(...ys), y1 = Math.max(...ys);
      const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
      const pad = 120;
      const scale = Math.min(5, Math.max(0.5,
        Math.min(W / (x1 - x0 + pad), H / (y1 - y0 + pad))));
      svg.transition().duration(650).call(
        zoom.transform,
        d3.zoomIdentity.translate(W / 2 - scale * cx, H / 2 - scale * cy).scale(scale)
      );
    }

    /* ── resize（移动端地址栏收起会改变可视高度）── */
    function onGraphViewportResize() {
      if (!updateGraphViewport()) return;
      simulation.alpha(0.1).restart();
    }
    window.addEventListener('resize', onGraphViewportResize);
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', onGraphViewportResize);
    }

    /* ── 主题切换监听：同步更新 D3 SVG 元素颜色 ── */
    new MutationObserver(() => {
      link.attr('stroke', edgeBaseColor());
      label.attr('fill', labelFill());
    }).observe(document.documentElement, {
      attributes: true,
      attributeFilter: ['data-theme'],
    });

    /* ════════════════════════════════════════════
       物理参数面板（三个滑动块）
    ════════════════════════════════════════════ */

    /* 面板开关 */
    document.getElementById('physics-toggle').addEventListener('click', () => {
      const panel = document.getElementById('physics-panel');
      panel.hidden = !panel.hidden;
    });
    document.getElementById('physics-close').addEventListener('click', () => {
      document.getElementById('physics-panel').hidden = true;
    });

    /* 适配屏幕按钮 */
    document.getElementById('fit-to-screen').addEventListener('click', () => {
      fitToScreen();
    });

    /* 1. 排斥力 slider（min=50, max=800 → 实际 chargeStrength = -value） */
    document.getElementById('sl-charge').addEventListener('input', ev => {
      chargeStrength = -Number(ev.target.value);
      document.getElementById('val-charge').textContent = chargeStrength;
      updateForces();
    });

    /* 4. 磁吸模式 checkbox */
    document.getElementById('check-magnetic').addEventListener('change', ev => {
      isMagnetic = ev.target.checked;
      updateForces();
    });

    /* 2. 节点大小 slider（min=40, max=280, value/100 = nodeScale） */
    document.getElementById('sl-size').addEventListener('input', ev => {
      nodeScale = Number(ev.target.value) / 100;
      document.getElementById('val-size').textContent = nodeScale.toFixed(1) + '×';
      // 更新圆半径 & 标签位置
      node.select('.node-circle').attr('r', scaledRadius);
      node.select('.node-glow').attr('r', d => scaledRadius(d) + 6);
      label.attr('dy', d => scaledRadius(d) + 13);
      // 更新碰撞半径并重新模拟
      simulation
        .force('collision', d3.forceCollide().radius(d => scaledRadius(d) + 5).strength(0.7))
        .alpha(0.3).restart();
    });

    /* 3. 连接线粗细 slider（min=2, max=60, value/10 = linkWidthBase） */
    document.getElementById('sl-link').addEventListener('input', ev => {
      linkWidthBase = Number(ev.target.value) / 10;
      document.getElementById('val-link').textContent = linkWidthBase.toFixed(1) + 'px';
      // 立即更新，无需重启模拟
      link.attr('stroke-width', linkWidthBase);
    });

    /* 4. 节点字体大小 slider（min=6, max=22, step=1）—— 在 nodeScale 基础上再缩放 */
    document.getElementById('sl-font').addEventListener('input', ev => {
      fontSliderVal = Number(ev.target.value);
      document.getElementById('val-font').textContent = '×' + (fontSliderVal / 10).toFixed(1);
      label.attr('font-size', d => scaledFontSize(d) + 'px');
    });

    /* ════════════════════════════════════════════
       右侧详情侧边栏
    ════════════════════════════════════════════ */

    const sidebar      = document.getElementById('graph-sidebar');
    const sbTypeBadge  = document.getElementById('sb-type-badge');
    const sbTitle      = document.getElementById('sb-title');
    const sbTags       = document.getElementById('sb-tags');
    const sbSummary    = document.getElementById('sb-summary');
    const sbCommunityBlock = document.getElementById('sb-community-block');
    const sbCommunityDot   = document.getElementById('sb-community-dot');
    const sbCommunityLabel = document.getElementById('sb-community-label');
    const sbRelSec     = document.getElementById('sb-related-section');
    const sbRelList    = document.getElementById('sb-related-list');
    const sbPaperSec   = document.getElementById('sb-paper-section');
    const sbPaperList  = document.getElementById('sb-paper-list');
    const sbOpenLink   = document.getElementById('sb-open-link');
    const sbClose      = document.getElementById('sb-close');

    function edgeNodeIds(e) {
      return {
        sourceId: typeof e.source === 'object' ? e.source.id : e.source,
        targetId: typeof e.target === 'object' ? e.target.id : e.target,
      };
    }

    function openSidebar(d) {
      // V19: 高亮当前节点及 2-hop 邻居
      const direct = new Set();
      const secondary = new Set();
      edges.forEach(e => {
        const { sourceId: sId, targetId: tId } = edgeNodeIds(e);
        if (sId === d.id) direct.add(tId);
        if (tId === d.id) direct.add(sId);
      });
      edges.forEach(e => {
        const { sourceId: sId, targetId: tId } = edgeNodeIds(e);
        if (direct.has(sId) && tId !== d.id) secondary.add(tId);
        if (direct.has(tId) && sId !== d.id) secondary.add(sId);
      });

      hideTooltip();
      // 时序动画期间：未显现的节点/连线必须保持隐藏，高亮只在「已显现子集」内进行
      const tlShown = id => !timelineAnimating || timelineRevealedIds.has(id);
      node.select('.node-glow').attr('fill-opacity', n => (n.id === d.id && tlShown(n.id)) ? 0.2 : 0);
      node.select('.node-circle').attr('fill-opacity', n => tlShown(n.id) ? 1 : 0);
      node.style('opacity', n => {
        if (!tlShown(n.id)) return 0;
        return (n.id === d.id || direct.has(n.id)) ? 1 : (secondary.has(n.id) ? 0.4 : 0.05);
      });
      link
        .style('opacity', null)
        .style('stroke-width', null)
        .attr('stroke', e => {
          const { sourceId: sId, targetId: tId } = edgeNodeIds(e);
          return (sId === d.id || tId === d.id) ? nodeColor(d) : edgeBaseColor();
        })
        .attr('stroke-opacity', e => {
          const { sourceId: sId, targetId: tId } = edgeNodeIds(e);
          if (!tlShown(sId) || !tlShown(tId)) return 0;   // 任一端未显现 → 连线隐藏
          const involved = (sId === d.id || tId === d.id);
          return involved ? 0.85 : 0.18;
        })
        .attr('stroke-width', e => {
          const { sourceId: sId, targetId: tId } = edgeNodeIds(e);
          return (sId === d.id || tId === d.id) ? linkWidthBase * 1.5 : linkWidthBase;
        });

      const color = nodeColor(d);
      const info  = d._info;
      const typeLabel = TYPE_LABEL[d.type] || d.type || 'Wiki';
      const detailUrl = 'detail.html?id=' + encodeURIComponent(toDetailId(d.id));
      const summary = (info.summary || '').slice(0, 150) + (info.summary?.length > 150 ? '…' : '');

      sbTypeBadge.style.background = color;
      sbTypeBadge.style.color = '#0d1117';
      sbTypeBadge.textContent = typeLabel;
      sbTitle.textContent = info.title || d.label;
      sbSummary.textContent = summary;
      const sbCommunityText = communityLabelMap.get(d.community);
      if (sbCommunityText) {
        sbCommunityBlock.hidden = false;
        sbCommunityDot.style.background = communityColorMap.get(d.community) || color;
        sbCommunityLabel.textContent = sbCommunityText;
      } else {
        sbCommunityBlock.hidden = true;
      }

      // tags from index
      const item = indexItems.find(it => it.path === d.id);
      const tags = item?.tags || [];
      sbTags.innerHTML = tags.map(t => `<span class="sb-tag">${escapeHtml(t)}</span>`).join('');

      // related from index
      const related = item?.related || [];
      if (related.length) {
        sbRelList.innerHTML = related.slice(0, 8).map(r => {
          const relId = toDetailId(r);
          const relItem = indexItems.find(it => it.path === r || it.id === relId);
          const relTitle = relItem?.title || r.split('/').pop().replace('.md','');
          return `<li><a href="detail.html?id=${encodeURIComponent(relId)}">${escapeHtml(relTitle)}</a></li>`;
        }).join('');
        sbRelSec.hidden = false;
      } else {
        sbRelSec.hidden = true;
      }

      const paperLinks = (item?.source_links || []).filter(url =>
        String(url).includes('Humanoid_Robot_Learning_Paper_Notebooks')
      );
      if (paperLinks.length) {
        sbPaperList.innerHTML = paperLinks.slice(0, 6).map((url, idx) => {
          if (!isSafeUrl(url)) return '';
          const stem = decodeURIComponent(String(url).split('/').pop().replace(/\.html$/, ''));
          const label = stem.replace(/[_-]+/g, ' ').trim() || `论文阅读笔记 ${idx + 1}`;
          return `<li><a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(label)}</a></li>`;
        }).join('');
        sbPaperSec.hidden = false;
      } else {
        sbPaperSec.hidden = true;
      }

      sbOpenLink.href = detailUrl;

      sidebar.classList.add('open');
      wrap.classList.add('sidebar-open');
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      pinnedNode = null;
      if (isMobile) hideTooltip();
      if (timelineAnimating) {
        // 时序模式：只恢复「已显现子集」的渲染，不触发 applyFilters 重建全图，也不重启力模拟/相机
        renderTimelineStatic();
        link.style('opacity', null).style('stroke-width', null)
            .attr('stroke', edgeBaseColor()).attr('stroke-width', linkWidthBase);
        updateTimelineLinks(timelineRevealedIds);
        wrap.classList.remove('sidebar-open');
        return;
      }
      node.select('.node-glow').attr('fill-opacity', 0);
      link
        .style('opacity', null)
        .style('stroke-width', null)
        .attr('stroke', edgeBaseColor());
      applyFilters(); // 恢复筛选/搜索状态下的透明度
      wrap.classList.remove('sidebar-open');
      updateGraphViewport();
      const cx = (wrap.clientWidth || W) / 2;
      const cy = (wrap.clientHeight || H) / 2;
      simulation.force('center', d3.forceCenter(cx, cy).strength(0.05));
      simulation.alpha(0.1).restart();
      simulation.on('end.sidebar', () => {
        simulation.on('end.sidebar', null);
        fitToScreen();
      });
    }

    sbClose.addEventListener('click', closeSidebar);

    function dismissMobilePinnedTooltip() {
      if (!isMobile || !pinnedNode) return false;
      pinnedNode = null;
      hideTooltip();
      return true;
    }

    // V21: 点击背景退出高亮聚焦模式；移动端空白处关闭浮窗
    svg.on('click', (ev) => {
      if (ev.defaultPrevented) return;
      if (ev.target.closest('.node-g')) return;
      if (isMobile) {
        dismissMobilePinnedTooltip();
        return;
      }
      closeSidebar();
    });

    if (window.RNGraphTooltip) {
      window.RNGraphTooltip.bindBlankDismiss(
        document.getElementById('graph-canvas'),
        {
          isMobile,
          getPinned: () => pinnedNode,
          clearPin: () => { pinnedNode = null; },
          hide: hideTooltip
        },
        { nodeSelector: '.node-g', tooltipEl: tooltip }
      );
    }

    // 覆盖节点 click：PC 打开侧边栏而不是直接跳转
    node.on('click', (ev, d) => {
      ev.stopPropagation();
      // 播放中禁止点击；暂停时已显现节点（pointer-events 已恢复）可点击打开详情侧栏
      // （openSidebar 已做时序感知，仅在「已显现子集」内高亮，不会显示背景全局图）
      if (timelinePlaying) return;
      if (isMobile) {
        if (pinnedNode === d) {
          pinnedNode = null;
          hideTooltip();
        } else {
          pinnedNode = d;
          showTooltip(ev, d);
        }
      } else {
        openSidebar(d);
      }
    });

    // Esc 也关闭侧边栏
    document.addEventListener('keydown', ev => {
      if (ev.key === 'Escape') {
        closeSidebar();
      }
    }, true);  // 用 capture 覆盖前面的 Esc handler

    /* ════════════════════════════════════════════
       ?focus=<id> URL 参数：页面加载后飞行定位
    ════════════════════════════════════════════ */

    const focusId = new URLSearchParams(location.search).get('focus');
    if (focusId) {
      const focusNode = nodes.find(n => n.id === focusId ||
        n.id === decodeURIComponent(focusId));
      if (focusNode) {
        const flyToFocus = () => {
          if (focusNode.x == null) return;
          const scale = 2.2;
          svg.transition().duration(700).call(
            zoom.transform,
            d3.zoomIdentity
              .translate(W / 2 - scale * focusNode.x, H / 2 - scale * focusNode.y)
              .scale(scale)
          );
          openSidebar(focusNode);
        };
        simulation.on('end.focus', () => { flyToFocus(); simulation.on('end.focus', null); });
        setTimeout(flyToFocus, 1400);
      }
    }

  })();
  </script>
</body>
</html>
