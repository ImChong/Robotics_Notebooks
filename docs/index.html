<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Robotics Notebooks - 面向机器人学习与工程实践的技术栈导航，系统梳理运动控制、强化学习、模仿学习、人形机器人与相关技术主线。" />
  <meta name="keywords" content="Robotics Notebooks, 机器人技术栈, Humanoid Robot, Motion Control, Reinforcement Learning, Imitation Learning, Whole-Body Control" />
  <meta name="author" content="Chong Liu" />
  <meta property="og:title" content="Robotics Notebooks | 机器人技术栈地图" />
  <meta property="og:description" content="面向机器人学习与工程实践的技术栈导航，系统梳理运动控制、强化学习、模仿学习、人形机器人与相关技术主线。" />
  <meta property="og:type" content="website" />
  <title>Robotics Notebooks | 机器人技术栈地图</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#3b82f6" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-title" aria-label="机器人技术栈地图首页">🗺️ Robotics Notebooks | 机器人技术栈地图</a>
      <div class="header-spacer"></div>
      <div class="header-right">
        <a href="https://github.com/ImChong/Robotics_Notebooks" class="github-link" target="_blank" rel="noopener noreferrer">GitHub</a>
        <button id="themeToggle" class="theme-toggle" aria-label="切换白天黑夜模式" title="切换白天黑夜模式">
          <span class="icon-sun">☀️</span>
          <span class="icon-moon">🌙</span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <section id="hero" class="hero">
      <div class="container hero-grid">
        <div>
          <p class="hero-kicker">Robotics Notebooks · 面向人形机器人运动控制的知识入口</p>
          <h1 class="hero-title">系统学习人形机器人运动控制</h1>
          <p class="hero-subtitle">把 <strong>路线、图谱、模块、论文</strong> 串成一套极简导航系统。</p>
          
          <div class="hero-stat-row-mini" aria-label="知识库当前规模">
            <span id="heroNodeCount">239</span> Nodes ·
            <span id="heroEdgeCount">1477</span> Links ·
            <span id="heroCoverageCount">237/237</span> Sources
          </div>

          <div class="cta-row">
            <a class="btn-primary" href="roadmap.html?id=roadmap-motion-control">🚀 开始路径</a>
            <a class="btn-secondary" href="graph.html">🕸️ 知识图谱</a>
            <a class="btn-secondary" href="references.html">📚 论文入口</a>
          </div>
        </div>
      </div>
    </section>

    <section class="section" id="wiki-search">
      <div class="container">
        <div class="search-bar-wrap">
          <input
            id="wikiSearchInput"
            type="search"
            placeholder="搜索概念、方法或任务：MPC、PPO、Diffusion Policy…"
            aria-label="搜索知识页面"
            autocomplete="off"
          />
          <select id="wikiTypeFilter" aria-label="按类型过滤">
            <option value="">全部类型</option>
            <option value="concept">概念 (concept)</option>
            <option value="method">方法 (method)</option>
            <option value="task">任务 (task)</option>
            <option value="comparison">对比 (comparison)</option>
            <option value="entity">工具/平台 (entity)</option>
            <option value="query">Query 产物</option>
          </select>
        </div>
        <div id="wikiTagCloud" class="tag-cloud" aria-label="热门标签"></div>
        <div id="wikiSearchResults" class="card-grid" aria-live="polite"></div>
      </div>
    </section>

    <section class="section section-alt" id="mini-graph-section">
      <div class="container">
        <h2 class="section-title">知识图谱预览</h2>
        <div id="mini-graph-wrap" style="position:relative;width:100%;height:480px;border-radius:12px;overflow:hidden;">
          <svg id="mini-graph-svg" style="width:100%;height:100%"></svg>
          <div id="mini-graph-stats" style="position:absolute;bottom:12px;left:16px;font-size:.72rem;line-height:1.8;pointer-events:none"></div>
          <a href="graph.html" id="mini-graph-expand" style="position:absolute;bottom:12px;right:16px;font-size:.72rem;text-decoration:none;">打开完整图谱 →</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© Chong Liu 2026 · Robotics Notebooks</p>
    </div>
  </footer>

  <script src="main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js" defer></script>
  <script src="mini-graph.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .catch(() => {});
      });
    }
  </script>
</body>
</html>
