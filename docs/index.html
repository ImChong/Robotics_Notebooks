<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robotics Notebooks — Mind Map</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --bg-alt: #f7f6f3;
      --text: #37352f;
      --text-muted: #787774;
      --accent: #2d74da;
      --accent-hover: #1a5bb8;
      --border: #e8e8e4;
    }
    body.dark {
      --bg: #191919;
      --bg-alt: #222222;
      --text: #e8e8e4;
      --text-muted: #9b9a97;
      --accent: #5b9cf6;
      --accent-hover: #7ab3ff;
      --border: #3d3d3d;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }
    .header {
      background: var(--bg-alt);
      border-bottom: 1px solid var(--border);
      color: var(--text);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s;
    }
    .header-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .header-actions { display: flex; gap: 6px; }
    .btn {
      padding: 4px 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    #chart { flex: 1; overflow: hidden; background: var(--bg); transition: background 0.3s; }
    svg { width: 100%; height: 100%; }

    .node rect {
      rx: 5; ry: 5;
      stroke-width: 1.5;
    }
    .node text {
      font-size: 12px;
      dominant-baseline: middle;
      pointer-events: none;
    }
    .link {
      fill: none;
      stroke-width: 1.5;
      stroke-opacity: 0.6;
    }

    #loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: var(--text-muted);
    }
    #error {
      display: none; position: fixed; inset: 0;
      background: var(--bg-alt); color: var(--text);
      padding: 40px; font-size: 14px; line-height: 1.8;
    }
  </style>
</head>
<body>

<div class="header">
  <span class="header-title">🗺️ Robotics Notebooks</span>
  <div class="header-actions">
    <button class="btn" id="btnZoomIn">+</button>
    <button class="btn" id="btnZoomOut">−</button>
    <button class="btn" id="btnFit">Fit</button>
    <button class="btn" id="btnTheme">🌙</button>
  </div>
</div>

<div id="chart"></div>
<div id="loading">Loading…</div>
<div id="error"><b>⚠ Error</b><br><span id="errMsg"></span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
// ── Theme ───────────────────────────────────────────────
const isDark = () => document.body.classList.contains('dark');
function setTheme(dark) {
  document.body.classList.toggle('dark', dark);
  document.getElementById('btnTheme').textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('rn-theme', dark ? 'dark' : 'light');
}
(function(){
  const s = localStorage.getItem('rn-theme');
  setTheme(s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme:dark)').matches));
})();
document.getElementById('btnTheme').onclick = () => {
  setTheme(!isDark());
  if (!window._mindmapData) return;
  const W = document.getElementById('chart').clientWidth;
  const H = document.getElementById('chart').clientHeight;
  render(window._mindmapData);
  // fit to window after re-render
  const gSel = svgEl ? svgEl.select('g') : null;
  if (gSel && gSel.node()) fitView(gSel, W, H);
};



// ── Parser: bullet-point indentation → tree ─────────────
function parseMd(md) {
  const root = { text: 'Robotics Notebooks', children: [], links: [] };
  // stack entries: { node, depth }
  const stack = [{ node: root, depth: -1 }];

  for (const rawLine of md.split('\n')) {
    const line = rawLine.replace(/\t/g, '    ');
    const m = line.match(/^( *)-[ \t]+(.+)/);
    if (!m) continue;

    const depth = Math.floor(m[1].length / 4);   // 0-based indent level
    let text = m[2].trim();

    // extract markdown links
    const links = [];
    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, url) => {
      links.push({ label: label.trim(), url: url.trim() });
      return label.trim();
    });
    // strip inline code & bold
    text = text.replace(/`([^`]+)`/g, '$1').replace(/\*\*([^*]+)\*\*/g, '$1').trim();
    if (!text) continue;

    const node = { text, links, children: [] };

    // find parent: pop until stack top has depth < current depth
    while (stack.length > 1 && stack[stack.length - 1].depth >= depth) stack.pop();
    stack[stack.length - 1].node.children.push(node);
    stack.push({ node, depth });
  }
  return root;
}

// ── Renderer: collapsible horizontal tree ───────────────
const NODE_H   = 24;
const NODE_PAD_X = 10;
const COL_W    = 200;

let svgEl, zoomBehavior, root, treeLayout;

function render(data) {
  const container = document.getElementById('chart');
  container.innerHTML = '';
  const W = container.clientWidth;
  const H = container.clientHeight;

  root = d3.hierarchy(data, d => d.children && d.children.length ? d.children : null);

  treeLayout = d3.tree()
    .nodeSize([NODE_H + 12, COL_W])
    .separation((a, b) => a.parent === b.parent ? 1.8 : 2.5);

  treeLayout(root);

  // Light mode: pale/muted pastels; Dark mode: vivid
  const palette = isDark()
    ? ['#4f46e5','#7c3aed','#0369a1','#047857','#92400e','#9d174d']
    : ['#a5b4fc','#c4b5fd','#7dd3fc','#86efac','#fcd34d','#f9a8d4'];
  const bgPalette = isDark()
    ? ['#1e1b4b','#2e1065','#0c4a6e','#052e16','#431407','#500724']
    : ['#f0f2fd','#f5f0fe','#f0f9ff','#f0fdf4','#fefce8','#fdf2f8'];
  const linkColor = isDark() ? '#5b9cf6' : '#2d74da';

  const svg = d3.select(container).append('svg');
  svgEl = svg;
  const g = svg.append('g');

  zoomBehavior = d3.zoom().scaleExtent([0.1, 4])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoomBehavior).on('dblclick.zoom', null)
    .on('dblclick', function(event) { event.stopPropagation(); });

  // Tooltip element
  const tipBg = isDark() ? '#252525' : '#f7f6f3';
  const tipText = isDark() ? '#e8e8e4' : '#37352f';
  const tipLink = isDark() ? '#5b9cf6' : '#2d74da';
  const tip = d3.select(document.body).append('div')
    .style('position', 'fixed').style('background', tipBg)
    .style('color', tipText).style('padding', '10px 14px')
    .style('border-radius', '8px').style('font-size', '13px')
    .style('pointer-events', 'none').style('z-index', '9999')
    .style('max-width', '360px').style('box-shadow', '0 8px 24px rgba(0,0,0,0.4)')
    .style('line-height', '1.9').style('display', 'none')
    .style('border', `1px solid ${isDark() ? '#3d3d3d' : '#e8e8e4'}`);

  let linkSel = g.append('g').attr('class', 'links');
  let nodeSel = g.append('g').attr('class', 'nodes');

  function update() {
    // Re-layout with current children/_children state
    treeLayout(root);

    // ── Links ──
    linkSel.selectAll('.link').data(root.links()).join(
      enter => enter.append('path').attr('class', 'link')
        .attr('stroke', linkColor)
        .attr('fill', 'none')
        .attr('d', d3.linkHorizontal().x(dd => dd.y).y(dd => dd.x)),
      update => update
        .transition().duration(300)
        .attr('d', d3.linkHorizontal().x(dd => dd.y).y(dd => dd.x)),
      exit => exit.remove()
    );

    // ── Nodes ──
    const nodes = nodeSel.selectAll('.node').data(root.descendants(), d => d);

    nodes.join(
      enter => {
        const grp = enter.append('g').attr('class', 'node')
          .attr('transform', d => `translate(${d.y},${d.x})`);
        // Append text first with visibility:hidden to measure rendered width
        // (display:none returns 0 for getComputedTextLength, visibility:hidden does not)
        const txt = grp.append('text')
          .attr('x', NODE_PAD_X).attr('y', 0)
          .attr('fill', isDark() ? '#e8e8e4' : '#37352f')
          .style('visibility', 'hidden')
          .text(d => {
            const count = (d._children || []).length;
            return (d.children || count === 0) ? d.data.text : `${d.data.text}  (${count})`;
          });
        // Measure actual rendered width
        txt.each(function(d) {
          d._w = Math.max(this.getComputedTextLength() + NODE_PAD_X * 3, 40);
        });
        // Insert rect behind text with accurate width
        grp.insert('rect', 'text')
          .attr('x', 0).attr('y', -NODE_H / 2)
          .attr('width', d => d._w).attr('height', NODE_H)
          .attr('rx', 5).attr('ry', 5)
          .attr('fill', d => bgPalette[d.depth % bgPalette.length])
          .attr('stroke', d => palette[d.depth % palette.length]);
        // Reveal text
        txt.style('visibility', null);
        return grp;
      },
      update => {
        update.transition().duration(300)
          .attr('transform', d => `translate(${d.y},${d.x})`);
        update.select('rect')
          .attr('width', d => d._w)
          .attr('fill', d => bgPalette[d.depth % bgPalette.length])
          .attr('stroke', d => palette[d.depth % palette.length]);
        update.select('text')
          .attr('fill', d => isDark() ? '#e8e8e4' : '#37352f')
          .text(d => {
            const count = (d._children || []).length;
            return (d.children || count === 0) ? d.data.text : `${d.data.text}  (${count})`;
          });
        return update;
      },
      exit => exit.remove()
    );

    // Re-attach events after join
    nodeSel.selectAll('.node')
      .on('mouseenter', function(event, d) {
        if (!d.data.links || !d.data.links.length) return;
        tip.html(d.data.links.map(l =>
          `<a href="${l.url}" target="_blank" style="color:${tipLink};text-decoration:none">${l.label} ↗</a>`
        ).join('<br>'))
        .style('display', 'block')
        .style('left', (event.clientX + 14) + 'px')
        .style('top',  (event.clientY - 10) + 'px');
      })
      .on('mouseleave', () => tip.style('display', 'none'))
      // Single click = expand/collapse (always); double click = open link
      .on('click', function(event, d) {
        event.stopPropagation();
        if (d.children) {
          d._children = d.children;
          d.children = null;
        } else if (d._children) {
          d.children = d._children;
          d._children = null;
        }
        treeLayout(root);
        update();
      })
      .on('dblclick', function(event, d) {
        event.stopPropagation();
        if (d.data.links && d.data.links.length) {
          window.open(d.data.links[0].url, '_blank');
        }
      })
      .on('dblclick', function(event, d) {
        event.stopPropagation();
        if (d.data.links && d.data.links.length) {
          window.open(d.data.links[0].url, '_blank');
        }
      })
      .style('cursor', d => d.data.links && d.data.links.length ? 'pointer' : 'pointer');
  }

  update();

  // Collapse all except root depth 0
  root.descendants().forEach(d => {
    if (d.depth > 0) {
      d._children = d.children;
      d.children = null;
    }
  });
  treeLayout(root);
  update();

  fitView(g, W, H);

  // Controls
  document.getElementById('btnZoomIn').onclick  = () => svg.transition().duration(250).call(zoomBehavior.scaleBy, 1.3);
  document.getElementById('btnZoomOut').onclick = () => svg.transition().duration(250).call(zoomBehavior.scaleBy, 0.75);
  document.getElementById('btnFit').onclick     = () => fitView(g, W, H);
}

function fitView(g, W, H) {
  const bb = g.node().getBBox();
  if (!bb.width || !bb.height) return;
  const scale = Math.min(1.4, Math.min(W / (bb.width + 40), H / (bb.height + 40)));
  const tx = W / 2 - (bb.x + bb.width / 2) * scale;
  const ty = H / 2 - (bb.y + bb.height / 2) * scale;
  svgEl.transition().duration(400)
    .call(zoomBehavior.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

// ── Boot ─────────────────────────────────────────────────
(async function() {
  const README_URL = 'https://raw.githubusercontent.com/ImChong/Robotics_Notebooks/main/README.md';
  const MAX_RETRIES = 4;

  let md = null;
  for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
    try {
      const r = await fetch(README_URL);
      if (r.ok) {
        md = await r.text();
        break;
      }
      if (r.status === 429 && attempt < MAX_RETRIES - 1) {
        // Rate limited — wait with exponential backoff
        const waitMs = (attempt + 1) * 1200;
        document.getElementById('loading').textContent = `⏳ Rate limited, retrying in ${waitMs/1000}s…`;
        await new Promise(resolve => setTimeout(resolve, waitMs));
        continue;
      }
      throw new Error(`HTTP ${r.status}`);
    } catch(e) {
      if (attempt === MAX_RETRIES - 1) throw e;
      await new Promise(resolve => setTimeout(resolve, 800));
    }
  }

  if (!md) { document.getElementById('loading').style.display = 'none'; return; }

  try {
    const tree = parseMd(md);
    document.getElementById('loading').style.display = 'none';
    window._mindmapData = tree;
    render(tree);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('errMsg').textContent = e.message;
    console.error(e);
  }
})();
</script>
</body>
</html>
