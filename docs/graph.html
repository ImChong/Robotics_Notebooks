<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Robotics Notebooks 知识图谱 — 75 个概念节点、429 条关联边、8 个社区的力导向可视化" />
  <title>知识图谱 | Robotics Notebooks</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕸️</text></svg>" />
  <meta name="color-scheme" content="dark light" />
  <script src="theme-init.js"></script>
  <script id="sponsor-js" src="sponsor.js?v=2"></script>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── 图谱页专用样式（不影响其他页面）── */
    body { 
      overflow: hidden; 
      font-family: var(--font-sans);
    }

    /* 显式声明字体以防部分浏览器组件继承失效 */
    #graph-toolbar, .filter-panel, .physics-panel, #graph-tooltip, #graph-sidebar, #graph-legend, #graph-legend-fab, .chip, .mode-chip, .filter-mode-chip, .filter-subtitle {
      font-family: var(--font-sans);
    }

    /* ── 工具栏 ── */
    #graph-toolbar {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      background: rgba(13, 17, 23, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-wrap: wrap;
    }
    #graph-search {
      height: 34px;
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #e6edf3;
      font-size: .85rem;
      font-family: inherit;
      width: 180px;
      outline: none;
      transition: border-color .18s, width .22s;
    }
    #graph-search::placeholder { color: rgba(255,255,255,0.3); }
    #graph-search:focus { border-color: rgba(0,212,255,0.5); width: 240px; }
    /* 专题视图区块（在筛选面板里，可折叠 <details>）*/
    .filter-topic-section {
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .filter-topic-summary {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      list-style: none;
      user-select: none;
      transition: background .12s;
    }
    .filter-topic-summary:hover { background: rgba(255,255,255,0.03); }
    .filter-topic-summary::-webkit-details-marker { display: none; }
    .filter-topic-summary::after {
      content: '▾';
      margin-left: auto;
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      transition: transform .18s;
    }
    .filter-topic-section[open] .filter-topic-summary::after {
      transform: rotate(180deg);
    }
    .filter-topic-summary-label {
      font-size: .68rem;
      font-weight: 700;
      color: rgba(255,255,255,0.34);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .filter-topic-summary-current {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .75rem;
      font-weight: 600;
      color: rgba(255,255,255,0.78);
    }
    .filter-topic-summary-current span:first-child { font-size: .92rem; line-height: 1; }
    .filter-topic-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 2px 14px 12px;
    }
    .filter-topic-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 26px;
      padding: 0 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.65);
      font-size: .74rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .15s, color .15s, background .15s;
      white-space: nowrap;
    }
    .filter-topic-chip:hover {
      border-color: rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.92);
    }
    .filter-topic-chip.is-active {
      background: rgba(0,212,255,0.16);
      border-color: rgba(0,212,255,0.55);
      color: #e6edf3;
    }
    .filter-topic-chip span:first-child { font-size: .9rem; line-height: 1; }
    /* 专题汇总导读条（画布左上角，选中非「全量」专题时显示） */
    .topic-intro-banner {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 12;
      max-width: min(420px, calc(100% - 24px));
      padding: 10px 12px 10px 11px;
      border-radius: 10px;
      border: 1px solid rgba(0, 212, 255, 0.28);
      background: rgba(13, 17, 23, 0.88);
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      pointer-events: auto;
    }
    .topic-intro-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .topic-intro-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .78rem;
      font-weight: 700;
      color: #7dd3fc;
      letter-spacing: .02em;
    }
    .topic-intro-hub-tag {
      font-size: .62rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(0, 212, 255, 0.12);
      color: rgba(255, 255, 255, 0.72);
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .topic-intro-text {
      margin: 0 0 8px;
      font-size: .76rem;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.62);
    }
    .topic-intro-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: .74rem;
      font-weight: 600;
      color: #38bdf8;
      text-decoration: none;
    }
    .topic-intro-link:hover { color: #7dd3fc; text-decoration: underline; }
    .node-topic-hub .node-glow { fill-opacity: 0.28 !important; }
    .node-topic-hub .node-circle {
      stroke-width: 2.5px !important;
      stroke-opacity: 0.85 !important;
      filter: drop-shadow(0 0 6px rgba(0, 212, 255, 0.45));
    }
    .node-topic-hub .node-label {
      font-weight: 700;
      fill: rgba(255, 255, 255, 0.92) !important;
    }
    .chip-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      height: 28px;
      padding: 0 11px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.5);
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .chip:hover { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.8); }
    .chip.is-running {
      background: rgba(0,212,255,0.16);
      border-color: rgba(0,212,255,0.55);
      color: #e6edf3;
      cursor: wait;
    }
    .chip:disabled {
      opacity: 0.72;
      cursor: wait;
    }
    .chip.active {
      background: #00d4ff;
      color: #0d1117;
      border-color: transparent;
      font-weight: 700;
    }
    .chip[data-type="concept"].active    { background: #60a5fa; }
    .chip[data-type="method"].active     { background: #34d399; }
    .chip[data-type="task"].active       { background: #f472b6; }
    .chip[data-type="entity"].active     { background: #fbbf24; }
    .chip[data-type="comparison"].active { background: #c084fc; }
    .chip[data-type="query"].active      { background: #94a3b8; color: #fff; }
    .chip[data-type="formalization"].active { background: #fb923c; }
    .toolbar-sep { width: 1px; height: 24px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
    .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    #graph-node-count {
      font-size: .78rem;
      color: rgba(255,255,255,0.3);
      white-space: nowrap;
      margin-left: auto;
    }
    #graph-back {
      display: inline-flex; align-items: center; gap: 5px;
      height: 28px; padding: 0 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.55);
      font-size: .8rem;
      text-decoration: none;
      transition: all .15s;
      white-space: nowrap;
    }
    #graph-back:hover { border-color: rgba(255,255,255,0.3); color: #e6edf3; text-decoration: none; }

    /* ── 画布 ── */
    #graph-wrap {
      position: fixed;
      top: calc(var(--header-h) + 46px);
      left: 0; right: 0; bottom: 0;
      transition: right .22s cubic-bezier(.4,0,.2,1);
    }
    #graph-canvas,
    #graph-canvas-3d {
      width: 100%; height: 100%;
      background:
        radial-gradient(circle at 20% 20%, rgba(96,165,250,.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(52,211,153,.04) 0%, transparent 50%),
        #0d1117;
      cursor: grab;
      display: block;
    }
    #graph-canvas:active { cursor: grabbing; }
    #graph-canvas-3d {
      position: absolute;
      inset: 0;
      z-index: 2;
      touch-action: none;
    }
    #graph-canvas-3d canvas {
      display: block;
      outline: none;
    }
    #graph-canvas-3d[hidden] { display: none !important; }
    #graph-canvas-3d .scene-nav-info { display: none !important; }

    /* dot-grid overlay (CSS only) */
    #graph-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Tooltip ── */
    #graph-tooltip {
      position: fixed;
      z-index: 200;
      padding: 12px 15px;
      border-radius: 10px;
      background: rgba(22, 27, 34, 0.97);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      max-width: 280px;
      max-height: 70vh;
      overflow-y: auto;
      pointer-events: none;
      visibility: visible;
      transition: opacity .12s;
    }
    #graph-tooltip.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none !important;
      transition: none;
    }
    #graph-tooltip.tt-pinned {
      pointer-events: auto;
      border-color: rgba(0,212,255,0.35);
      box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,212,255,0.15);
    }
    .tt-type {
      display: inline-block;
      font-size: .7rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .tt-community {
      display: inline-block;
      font-size: .7rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: .02em;
    }
    .tt-meta-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }
    .tt-meta-badges .tt-type,
    .tt-meta-badges .tt-community {
      margin-bottom: 0;
    }
    .tt-title { font-size: .92rem; font-weight: 700; color: #e6edf3; margin-bottom: 5px; line-height: 1.3; }
    .tt-summary { font-size: .78rem; color: rgba(255,255,255,0.45); line-height: 1.5; }
    .tt-link {
      display: inline-block;
      font-size: .72rem;
      color: rgba(0,212,255,0.8);
      margin-top: 9px;
      text-decoration: none;
      border-bottom: 1px solid rgba(0,212,255,0.3);
      transition: color .12s, border-color .12s;
    }
    .tt-link:hover { color: #00d4ff; border-color: rgba(0,212,255,0.7); }

    /* ── 图例 ── */
    #graph-legend {
      position: absolute;
      bottom: 20px; left: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 10px 13px;
      background: rgba(13,17,23,0.88);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      backdrop-filter: blur(6px);
      max-height: min(420px, calc(100dvh - var(--header-h) - 88px));
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.28) transparent;
    }
    #graph-legend::-webkit-scrollbar {
      width: 6px;
    }
    #graph-legend::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.22);
      border-radius: 4px;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .72rem;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      padding: 3px 6px;
      border-radius: 4px;
      transition: all 0.2s;
      min-width: 0;
    }
    .legend-label-text {
      flex: 1;
      min-width: 0;
      line-height: 1.35;
    }
    .legend-row:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .legend-row.active { background: rgba(0,212,255,0.15); color: #00d4ff; font-weight: 700; }
    .legend-title { font-size: .68rem; font-weight: 700; color: rgba(255,255,255,0.32); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .legend-count {
      margin-left: auto;
      font-size: .62rem;
      color: rgba(255,255,255,0.28);
      font-variant-numeric: tabular-nums;
    }
    .filter-count-badge {
      margin-left: auto;
      font-size: .64rem;
      color: rgba(255,255,255,0.32);
      font-variant-numeric: tabular-nums;
    }

    /* ── 移动端图例 FAB + 左侧抽屉 ── */
    #graph-legend-fab {
      display: none;
    }
    #graph-legend-scrim {
      display: none;
    }
    @media (max-width: 768px) {
      #graph-legend-fab {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        bottom: 16px;
        left: 16px;
        z-index: 12;
        width: 44px;
        height: 44px;
        padding: 0;
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 50%;
        background: rgba(13,17,23,0.92);
        color: rgba(255,255,255,0.82);
        font-size: 1.1rem;
        line-height: 1;
        cursor: pointer;
        box-shadow: 0 4px 18px rgba(0,0,0,0.45);
        backdrop-filter: blur(8px);
        transition: transform .15s, border-color .15s, box-shadow .15s;
      }
      #graph-legend-fab:hover,
      #graph-legend-fab:focus-visible {
        border-color: rgba(0,212,255,0.45);
        box-shadow: 0 6px 22px rgba(0,212,255,0.18);
        outline: none;
      }
      #graph-legend-fab[aria-expanded="true"] {
        opacity: 0;
        pointer-events: none;
      }
      #graph-legend {
        /* 与桌面端相同的卡片外观，仅改为默认隐藏 + 自左滑入 */
        position: fixed;
        bottom: 16px;
        left: 16px;
        top: auto;
        width: auto;
        max-width: calc(100vw - 32px);
        max-height: min(72vh, calc(100dvh - var(--header-h) - 120px));
        margin: 0;
        padding: 10px 13px;
        background: rgba(13,17,23,0.88);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 10px;
        backdrop-filter: blur(6px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.45);
        transform: translateX(calc(-100% - 28px));
        transition: transform .28s cubic-bezier(.4,0,.2,1);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        z-index: 46;
        pointer-events: none;
      }
      #graph-legend.graph-legend-open {
        transform: translateX(0);
        pointer-events: auto;
      }
      #graph-legend-scrim {
        position: fixed;
        top: calc(var(--header-h) + 46px);
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 44;
        background: rgba(0,0,0,0.42);
        opacity: 0;
        pointer-events: none;
        transition: opacity .22s ease;
      }
      #graph-legend-scrim.is-visible {
        display: block;
        opacity: 1;
        pointer-events: auto;
      }
    }

    /* ── 加载页：2D / 3D 图就绪前覆盖画布，带进度条 ── */
    #graph-loading {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(96,165,250,.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(52,211,153,.06) 0%, transparent 50%),
        #0d1117;
      opacity: 1;
      transition: opacity .45s ease;
    }
    #graph-loading[hidden] { display: none !important; }
    #graph-loading.is-hidden { opacity: 0; pointer-events: none; }
    .graph-loading-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: min(320px, 72vw);
      text-align: center;
    }
    .graph-loading-spinner {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: #00d4ff;
      animation: graph-loading-spin .8s linear infinite;
    }
    @keyframes graph-loading-spin { to { transform: rotate(360deg); } }
    .graph-loading-title {
      font-size: .92rem;
      font-weight: 600;
      color: #e6edf3;
      letter-spacing: .02em;
    }
    .graph-loading-bar {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
    }
    .graph-loading-bar-fill {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #60a5fa, #34d399);
      transition: width .3s ease;
    }
    .graph-loading-pct {
      font-size: .8rem;
      color: rgba(255,255,255,0.55);
      font-variant-numeric: tabular-nums;
    }
    #graph-loading.is-error .graph-loading-spinner {
      animation: none;
      border-color: rgba(248,113,113,0.3);
      border-top-color: #f87171;
    }
    @media (prefers-reduced-motion: reduce) {
      .graph-loading-spinner { animation-duration: 1.8s; }
    }

    /* ── 移动端优化 ── */
    @media (max-width: 768px) {
      #graph-tooltip {
        max-width: calc(100vw - 40px);
        max-height: 60vh;
      }
      #graph-toolbar {
        padding: 6px 12px;
        gap: 6px;
        /* 移动端工具栏内容仅 ~43px，但 #graph-wrap 顶部按 header+46px 定位；
           补足 min-height 让工具栏正好填满该 46px 带，避免底部露出比画布更浅的
           页面背景(#1c1c1e)形成一条灰条。 */
        min-height: 46px;
      }
      #graph-search {
        width: 120px;
        font-size: .8rem;
        height: 30px;
      }
      #graph-search:focus {
        width: 160px;
      }
      .chip {
        height: 26px;
        padding: 0 8px;
        font-size: .72rem;
      }
      #filter-label {
        display: none;
      }
      #filter-toggle {
        padding: 0 6px;
      }
      #physics-toggle span:first-child {
        margin-right: 0;
      }
      #physics-toggle span:last-child {
        display: none;
      }
      #graph-node-count {
        display: none;
      }
      .toolbar-sep {
        display: none;
      }
      #graph-back {
        height: 26px;
        padding: 0 8px;
        font-size: .72rem;
      }
      #graph-back span {
        display: none;
      }
      .toolbar-right {
        gap: 4px;
      }
    }

    /* 触屏设备：节点详情用底部固定浮窗，不展示右侧侧边栏 */
    @media (hover: none) and (pointer: coarse) {
      #graph-sidebar {
        display: none !important;
      }
      #graph-wrap.sidebar-open {
        right: 0 !important;
      }
    }

    @media (max-width: 480px) {
      #graph-search {
        width: 90px;
      }
      #graph-search:focus {
        width: 120px;
      }
    }

    /* ── 提示条（2D / 3D 互斥，同位置切换）── */
    .graph-hint {
      position: absolute;
      bottom: 20px; right: 20px;
      z-index: 10;
      font-size: .72rem;
      color: rgba(255,255,255,0.2);
      text-align: right;
      line-height: 1.7;
      pointer-events: none;
    }
    .graph-hint[hidden] { display: none !important; }

    /* ── SVG 节点动画 ── */
    .node-circle { transition: r .15s, fill-opacity .15s; }
    .node-label { transition: opacity .15s; }

    /* ════════════════════════════════════════════
       白天模式覆盖（[data-theme="light"]）
    ════════════════════════════════════════════ */
    [data-theme="light"] #graph-toolbar {
      background: rgba(250,249,246,0.96);
      border-bottom-color: rgba(0,0,0,0.07);
    }
    [data-theme="light"] #graph-search {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.12);
      color: #2f2d29;
    }

    /* ── 物理参数面板 ── */
    .physics-panel {
      position: absolute;
      top: 12px; right: 20px;
      z-index: 30;
      width: 240px;
      background: rgba(13,17,23,0.96);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.55);
      overflow: hidden;
    }
    .physics-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px 9px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: .8rem; font-weight: 700; color: rgba(255,255,255,0.65);
      letter-spacing: .03em;
    }
    .physics-close {
      background: none; border: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer; font-size: .9rem; line-height: 1;
      font-family: inherit;
      padding: 2px 4px; border-radius: 4px;
      transition: color .12s;
    }
    .physics-close:hover { color: rgba(255,255,255,0.75); }
    .slider-row { padding: 11px 14px 5px; }
    .slider-row:last-child { padding-bottom: 13px; }
    .slider-label {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 7px;
      font-size: .74rem; color: rgba(255,255,255,0.4);
    }
    .slider-val {
      color: #00d4ff; font-weight: 700; font-size: .72rem;
      font-variant-numeric: tabular-nums;
    }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 15px; height: 15px; border-radius: 50%;
      background: #00d4ff; cursor: pointer;
      box-shadow: 0 0 8px rgba(0,212,255,0.55);
      transition: box-shadow .15s, transform .1s;
    }
    input[type=range]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 14px rgba(0,212,255,0.85);
      transform: scale(1.15);
    }
    input[type=range]::-moz-range-thumb {
      width: 15px; height: 15px; border-radius: 50%; border: none;
      background: #00d4ff; cursor: pointer;
      box-shadow: 0 0 8px rgba(0,212,255,0.55);
    }
    .slider-divider {
      height: 1px; background: rgba(255,255,255,0.05);
      margin: 0 14px;
    }
    .physics-toggle {
      display: flex; align-items: center; gap: 9px;
      font-size: .74rem; color: rgba(255,255,255,0.4);
      cursor: pointer; user-select: none;
    }
    .physics-toggle input[type=checkbox] {
      width: 18px; height: 18px;
      accent-color: #60a5fa;
      cursor: pointer;
      flex-shrink: 0;
    }
    .physics-section-title {
      padding: 10px 14px 4px;
      font-size: .68rem;
      font-weight: 700;
      color: rgba(255,255,255,0.35);

      color: rgba(255,255,255,0.62);

          <button class="filter-topic-chip" type="button" data-topic="wbt" title="全身运动跟踪 (WBT)"><span>🕺</span><span>全身运动跟踪 (WBT)</span></button>
          <button class="filter-topic-chip" type="button" data-topic="cross-embodiment" title="跨具身迁移 (Cross-Embodiment)"><span>🔀</span><span>跨具身迁移 (Cross-Embodiment)</span></button>
          <button class="filter-topic-chip" type="button" data-topic="safe-fine-tuning" title="安全微调 (Safe Fine-Tuning)"><span>🛡️</span><span>安全微调 (Safe Fine-Tuning)</span></button>
          <button class="filter-topic-chip" type="button" data-topic="vision-backbone" title="视觉骨干 (Vision Backbone)"><span>👁️</span><span>视觉骨干 (Vision Backbone)</span></button>
          <button class="filter-topic-chip" type="button" data-topic="data-pipeline" title="训练数据 (Data Pipeline)"><span>📦</span><span>训练数据 (Data Pipeline)</span></button>
          <button class="filter-topic-chip" type="button" data-topic="physics-fidelity" title="物理保真度 (Physics Fidelity)"><span>⚙️</span><span>物理保真度 (Physics Fidelity)</span></button>
          <button class="filter-topic-chip" type="button" data-topic="contact-force-control" title="接触力控 (Contact Force Control)"><span>🤝</span><span>接触力控 (Contact Force Control)</span></button>
        </div>
      </details>
      <details class="filter-topic-section" id="filter-institution-section">
        <summary class="filter-topic-summary">
          <span class="filter-topic-summary-label">研究机构</span>
          <span class="filter-topic-summary-current" id="filter-institution-current"><span>🏛️</span><span>全部</span></span>
        </summary>
        <div class="filter-institution-list" id="filter-institution-list"></div>
      </details>
      <div class="filter-footer">
        <button id="filter-clear" class="filter-clear">清除全部</button>
      </div>
      <div class="filter-resize-handle filter-resize-e" role="separator" aria-label="拖拽右边框调整面板宽度" tabindex="-1"></div>
      <div class="filter-resize-handle filter-resize-s" role="separator" aria-label="拖拽下边框调整面板高度" tabindex="-1"></div>
      <div class="filter-resize-handle filter-resize-se" role="separator" aria-label="拖拽右下角调整面板大小" tabindex="-1"></div>

    <div id="graph-hint-2d" class="graph-hint">
      滚轮缩放 · 拖拽平移<br>点击节点查看详情
    </div>
    <div id="graph-hint-3d" class="graph-hint" hidden>
      拖拽旋转 · 滚轮缩放<br>点击节点查看详情
    </div>
  </div>

  <!-- ── 右侧详情侧边栏 ── -->
  <aside id="graph-sidebar" aria-label="节点详情">
    <div class="sb-header">
      <div>
        <div id="sb-meta-badges"></div>
        <div id="sb-community" class="sb-community"></div>
        <div class="sb-title" id="sb-title">选择节点查看详情</div>
      </div>
      <button id="sb-close" class="sb-close" aria-label="关闭侧边栏">✕</button>
    </div>
    <div class="sb-body">
      <div class="sb-tags" id="sb-tags"></div>
      <p class="sb-summary" id="sb-summary"></p>
      <div id="sb-neighbors-section" hidden>
        <div class="sb-section-title">图邻居 <span id="sb-neighbors-count" class="sb-neighbors-count"></span></div>
        <ul class="sb-related-list sb-neighbors-list" id="sb-neighbors-list"></ul>
      </div>
      <div id="sb-related-section" hidden>
        <div class="sb-section-title">关联页面</div>
        <ul class="sb-related-list" id="sb-related-list"></ul>
      </div>
      <div id="sb-paper-section" hidden>
        <div class="sb-section-title">论文阅读笔记</div>
        <ul class="sb-related-list" id="sb-paper-list"></ul>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;">
        <a id="sb-open-link" class="sb-open-link" href="#" target="_self">打开详情页 →</a>
      </div>
    </div>
  </aside>

  <!-- ── D3.js + 3D 图谱 ── -->
  <script src="vendor/d3.min.js"></script>
  <script src="vendor/3d-force-graph.min.js"></script>
  <script src="wiki-type-labels.js"></script>
  <script src="main.js"></script>
  <script src="graph-tooltip.js"></script>
  <script src="graph-node-size.js"></script>
  <script src="graph-3d.js"></script>
  <script src="topic-filters.js"></script>
  <script>
  (async function () {
    /* ── 颜色 & 类型标签 ── */
    const TYPE_COLOR = {
      concept:       '#60a5fa',
      method:        '#34d399',
      task:          '#f472b6',
      entity:        '#fbbf24',
      comparison:    '#c084fc',
      query:         '#94a3b8',
      formalization: '#fb923c',
      overview:      '#64748b',
      reference:     '#64748b',
      roadmap:       '#22d3ee',
      roadmap_page:  '#22d3ee',
      '':            '#64748b',
    };
    const TYPE_LEGEND_ORDER = [
      'concept', 'method', 'task', 'formalization', 'comparison',
      'entity', 'query', 'overview', 'reference', 'roadmap_page',
    ];
    function formatTypeLegendLabel(type) {
      const api = window.RNWikiTypeLabels;
      if (api && api.formatBilingual) return api.formatBilingual(type);
      return type || '知识页';
    }
    const TYPE_FILTER_OPTIONS = TYPE_LEGEND_ORDER.map((type) => ({
      value: type,
      label: formatTypeLegendLabel(type),
      color: TYPE_COLOR[type] || TYPE_COLOR[''],
    })).concat([
      { value: '__orphan__', label: '孤儿（度≤1）', color: '#94a3b8' },
    ]);
    const HEALTH_FILTER_OPTIONS = [
      { value: '0', label: '0 分', color: '#f87171' },
      { value: '1', label: '1 分', color: '#fb923c' },
      { value: '2', label: '2 分', color: '#facc15' },
      { value: '3', label: '3 分', color: '#4ade80' }
    ];
    const COMMUNITY_COLORS = d3.schemeTableau10.concat([
      '#e377c2', '#bcbd22', '#17becf', '#aec7e8', '#ffbb78', '#98df8a', '#c5b0d5'
    ]);
    const graphLegend = document.getElementById('graph-legend');
    const graphLegendFab = document.getElementById('graph-legend-fab');
    const graphLegendScrim = document.getElementById('graph-legend-scrim');
    let legendDrawerOpen = false;

    function isLegendDrawerMode() {
      return window.matchMedia('(max-width: 768px)').matches;
    }

    function setLegendDrawerOpen(open) {
      if (!isLegendDrawerMode()) {
        graphLegend.classList.remove('graph-legend-open');
        if (graphLegendScrim) {
          graphLegendScrim.classList.remove('is-visible');
          graphLegendScrim.hidden = true;
        }
        if (graphLegendFab) graphLegendFab.setAttribute('aria-expanded', 'false');
        legendDrawerOpen = false;
        return;
      }
      legendDrawerOpen = open;
      graphLegend.classList.toggle('graph-legend-open', open);
      if (graphLegendScrim) {
        graphLegendScrim.classList.toggle('is-visible', open);
        graphLegendScrim.hidden = !open;
        graphLegendScrim.setAttribute('aria-hidden', open ? 'false' : 'true');
      }
      if (graphLegendFab) graphLegendFab.setAttribute('aria-expanded', open ? 'true' : 'false');
    }

    function closeLegendDrawer() { setLegendDrawerOpen(false); }
    function toggleLegendDrawer() { setLegendDrawerOpen(!legendDrawerOpen); }

    if (graphLegendFab) {
      graphLegendFab.addEventListener('click', (ev) => {
        ev.stopPropagation();
        toggleLegendDrawer();
      });
    }
    if (graphLegendScrim) {
      graphLegendScrim.addEventListener('click', () => closeLegendDrawer());
    }
    window.addEventListener('resize', () => {
      if (!isLegendDrawerMode()) closeLegendDrawer();
    });
    const filterToggle = document.getElementById('filter-toggle');
    const filterLabel = document.getElementById('filter-label');
    const filterPanel = document.getElementById('filter-panel');
    const filterPanelTitle = document.getElementById('filter-panel-title');
    const filterSubtitle = document.getElementById('filter-subtitle');
    const filterModeTypeBtn = document.getElementById('filter-mode-type');
    const filterModeCommunityBtn = document.getElementById('filter-mode-community');
    const filterModeHealthBtn = document.getElementById('filter-mode-health');
    const filterPanelBody = document.getElementById('filter-panel-body');
    const filterPanelScrim = document.getElementById('filter-panel-scrim');

    function isFilterPanelMobileMode() {
      return window.matchMedia('(max-width: 768px)').matches;
    }

    function setFilterPanelOpen(open) {
      if (open && areFiltersLocked()) return;
      if (!filterPanel) return;
      filterPanel.hidden = !open;
      filterPanel.setAttribute('aria-hidden', open ? 'false' : 'true');
      if (!filterPanelScrim) return;
      if (isFilterPanelMobileMode() && open) {
        filterPanelScrim.classList.add('is-visible');
        filterPanelScrim.hidden = false;
        filterPanelScrim.setAttribute('aria-hidden', 'false');
      } else {
        filterPanelScrim.classList.remove('is-visible');
        filterPanelScrim.hidden = true;
        filterPanelScrim.setAttribute('aria-hidden', 'true');
      }
    }

    if (filterPanelScrim) {
      filterPanelScrim.addEventListener('click', () => setFilterPanelOpen(false));
    }

    let colorMode = 'community';
    let activeFilters = new Set();
    let timelineAnimating = false;   // 处于时序模式（播放 / 暂停 / 拖拽中均为 true）
    let timeline3D = false;          // 当前时序模式跑在 3D 视图（决定走 3D 还是 2D 推进逻辑）
    let timelinePlaying = false;     // 计时器是否正在推进
    let timelineAnimTimer = null;
    let timelineOrdered = [];        // 按时间排序后的节点
    let timelineIdx = 0;             // 当前已显现节点数（进度）
    let timelineTotal = 0;
    let timelineStepMs = 40;
    let timelineBatchSize = 1;
    let timelineIncident = null;        // nodeId -> 关联边数组（把新节点种在邻居附近）
    let timelineSavedPositions = null;  // 进入前布局快照（退出时还原）
    let timelineLastFit = 0;            // 上次相机自适应时间戳（节流）
    const timelineRevealedIds = new Set();
    const TIMELINE_TARGET_MS = 12000;

    function areFiltersLocked() {
      return timelineAnimating;
    }

    let communityColorMap = new Map();
    let communityLabelMap = new Map();
    let communityMetaMap = new Map();

    function getSortedCommunities() {
      const list = graphData && graphData.communities ? graphData.communities.slice() : [];
      return list.sort((a, b) => {
        if (a.id === 'community-other') return 1;
        if (b.id === 'community-other') return -1;
        const sizeDiff = (b.size || 0) - (a.size || 0);
        if (sizeDiff !== 0) return sizeDiff;
        return String(a.label || a.id).localeCompare(String(b.label || b.id), 'zh-CN');
      });
    }

    function initCommunityMapsFromGraph() {
      communityColorMap = new Map();
      communityLabelMap = new Map();
      communityMetaMap = new Map();
      let namedColorIdx = 0;
      getSortedCommunities().forEach((community) => {
        const color = community.id === 'community-other'
          ? '#94a3b8'
          : COMMUNITY_COLORS[namedColorIdx++ % COMMUNITY_COLORS.length];
        communityColorMap.set(community.id, color);
        communityLabelMap.set(community.id, community.label || community.id);
        communityMetaMap.set(community.id, community);
      });
    }

    function formatCommunityOptionLabel(communityId) {
      const meta = communityMetaMap.get(communityId);
      const label = communityLabelMap.get(communityId) || communityId;
      if (!meta || meta.size == null) return label;
      return label + ' (' + meta.size + ')';
    }

    // 研究机构维度：一个节点可属于多个机构（d.institutions 为 id 数组），复用社区色板。
    let institutionColorMap = new Map();
    let institutionLabelMap = new Map();
    let institutionMetaMap = new Map();

    function getSortedInstitutions() {
      const list = graphData && graphData.institutions ? graphData.institutions.slice() : [];
      return list.sort((a, b) => {
        const sizeDiff = (b.size || 0) - (a.size || 0);
        if (sizeDiff !== 0) return sizeDiff;
        return String(a.label || a.id).localeCompare(String(b.label || b.id), 'zh-CN');
      });
    }

    function initInstitutionMapsFromGraph() {
      institutionColorMap = new Map();
      institutionLabelMap = new Map();
      institutionMetaMap = new Map();
      let idx = 0;
      getSortedInstitutions().forEach((inst) => {
        institutionColorMap.set(inst.id, COMMUNITY_COLORS[idx++ % COMMUNITY_COLORS.length]);
        institutionLabelMap.set(inst.id, inst.label || inst.id);
        institutionMetaMap.set(inst.id, inst);
      });
    }

    function nodeInstitutions(d) {
      return Array.isArray(d.institutions) ? d.institutions : [];
    }

    // 研究机构筛选：独立于着色维度的过滤面（与「专题视图」同类），多选；命中任一
    // 所选机构即保留，着色仍由 colorMode 决定（社区/类型/健康度），不改图例配色。
    const activeInstitutions = new Set();

    function nodeMatchesInstitutionFilter(d) {
      if (!activeInstitutions.size) return true;
      return nodeInstitutions(d).some((id) => activeInstitutions.has(id));
    }

    function updateInstitutionFilterSummary() {
      const cur = document.getElementById('filter-institution-current');
      if (!cur) return;
      const n = activeInstitutions.size;
      cur.innerHTML = '<span>🏛️</span><span>' + (n ? n + ' 个机构' : '全部') + '</span>';
    }

    function renderInstitutionFilterSection() {
      const listEl = document.getElementById('filter-institution-list');
      if (!listEl) return;
      const insts = getSortedInstitutions();
      if (!insts.length) {
        listEl.innerHTML = '<div class="filter-empty">暂无机构数据</div>';
        updateInstitutionFilterSummary();
        return;
      }
      listEl.innerHTML = insts.map((inst) => {
        const checked = activeInstitutions.has(inst.id) ? ' checked' : '';
        const color = institutionColorMap.get(inst.id) || COMMUNITY_COLORS[9];
        const countBadge = inst.size != null
          ? '<span class="filter-count-badge">' + escapeHtml(String(inst.size)) + '</span>'
          : '';
        return '<label class="filter-item">'
          + '<input type="checkbox" data-institution-filter value="' + escapeHtml(inst.id) + '"' + checked + ' /> '
          + '<span class="filter-dot" style="background:' + escapeHtml(color) + '"></span>'
          + '<span class="filter-item-label">' + escapeHtml(institutionLabelMap.get(inst.id) || inst.id) + '</span>'
          + countBadge
          + '</label>';
      }).join('');
      listEl.querySelectorAll('input[data-institution-filter]').forEach((cb) => {
        cb.addEventListener('change', () => {
          if (areFiltersLocked()) return;
          if (cb.checked) activeInstitutions.add(cb.value);
          else activeInstitutions.delete(cb.value);
          applyFilters();
          updateFilterCount();
          updateInstitutionFilterSummary();
        });
      });
      updateInstitutionFilterSummary();
    }

    let focusedCommunityId = null;
    let focusedType = null;
    let focusedHealth = null;

    /* ── 专题视图（V22 P3）：复用 link-graph.json 的 path / community 元数据 ── */
    // 每个专题给一组路径片段或 community id，命中即视为属于该专题（叠加关系，任一命中即可）。
    // 专题命中规则迁移至共享模块 topic-filters.js（与详情页徽标同源）。
    const TOPIC_FILTERS = window.RNTopicFilters.TOPIC_FILTERS;
    const TOPIC_META = window.RNTopicFilters.TOPIC_META;
    let currentTopic = 'all';
    const topicIntroBanner = document.getElementById('topic-intro-banner');
    const topicIntroBadge = document.getElementById('topic-intro-badge');
    const topicIntroText = document.getElementById('topic-intro-text');
    const topicIntroLink = document.getElementById('topic-intro-link');

    function isCurrentTopicHub(d) {
      return currentTopic !== 'all'
        && window.RNTopicFilters.isTopicHub(d, currentTopic);
    }

    function updateTopicIntroBanner() {
      if (!topicIntroBanner) return;
      if (!currentTopic || currentTopic === 'all') {
        topicIntroBanner.hidden = true;
        return;
      }
      const meta = TOPIC_META[currentTopic];
      if (!meta) {
        topicIntroBanner.hidden = true;
        return;
      }
      topicIntroBanner.hidden = false;
      if (topicIntroBadge) {
        topicIntroBadge.innerHTML = '<span>' + (meta.emoji || '🏷️') + '</span><span>'
          + escapeHtml(meta.label || currentTopic) + '</span>';
      }
      if (topicIntroText) topicIntroText.textContent = meta.description || '';
      if (topicIntroLink && meta.wikiPath) {
        topicIntroLink.href = 'detail.html?id=' + encodeURIComponent(toDetailId(meta.wikiPath));
        topicIntroLink.hidden = false;
      } else if (topicIntroLink) {
        topicIntroLink.hidden = true;
      }
    }

    function nodeMatchesTopic(d) {
      return window.RNTopicFilters.matches(d, currentTopic);
    }

    /* ── 可变物理参数 ── */
    let chargeStrength = -800;   // 排斥力（负值，由滑块控制）
    const nodeScale      = 1.0;    // 节点大小倍数
    const linkWidthBase  = 1.0;    // 连接线基础粗细（px）
    const fontSliderVal  = 15;     // 字体缩放（相对 nodeScale）
    let isMagnetic2D = false;
    let isMagnetic3D = false;
    const checkMagneticEl = document.getElementById('check-magnetic');

    function isMagneticForCurrentView() {
      return is3DView() ? isMagnetic3D : isMagnetic2D;
    }

    function syncMagneticCheckbox() {
      if (checkMagneticEl) checkMagneticEl.checked = isMagneticForCurrentView();
    }

    const SPATIAL_VIEW_KEY = 'rn-graph-spatial-view';
    const spatialViewParam = new URLSearchParams(location.search).get('view');
    let spatialViewMode = (function () {
      if (spatialViewParam === '2d') {
        try { localStorage.setItem(SPATIAL_VIEW_KEY, '2d'); } catch (_e) { /* ignore */ }
        return '2d';
      }
      if (spatialViewParam === '3d') {
        try { localStorage.setItem(SPATIAL_VIEW_KEY, '3d'); } catch (_e) { /* ignore */ }
        return '3d';
      }
      try {
        const saved = localStorage.getItem(SPATIAL_VIEW_KEY);
        return saved === '3d' ? '3d' : '2d';
      } catch (_e) {
        return '2d';
      }
    })();
    let graph3dView = null;
    let graph3dHoverNode = null;
    const graphCanvas3d = document.getElementById('graph-canvas-3d');
    const viewMode2dBtn = document.getElementById('view-mode-2d');
    const viewMode3dBtn = document.getElementById('view-mode-3d');
    const graphHint2dEl = document.getElementById('graph-hint-2d');
    const graphHint3dEl = document.getElementById('graph-hint-3d');

    function is3DView() { return spatialViewMode === '3d'; }

    function updateGraphHint() {
      const in3d = is3DView();
      if (graphHint2dEl) graphHint2dEl.hidden = in3d;
      if (graphHint3dEl) graphHint3dEl.hidden = !in3d;
    }

    function updateViewModeButtons() {
      if (viewMode2dBtn) {
        viewMode2dBtn.classList.toggle('is-active', !is3DView());
        viewMode2dBtn.setAttribute('aria-pressed', !is3DView() ? 'true' : 'false');
      }
      if (viewMode3dBtn) {
        viewMode3dBtn.classList.toggle('is-active', is3DView());
        viewMode3dBtn.setAttribute('aria-pressed', is3DView() ? 'true' : 'false');
      }
    }

    function getMagneticConfig3D() {
      if (!isMagnetic3D) return null;
      const categories = (colorMode === 'community')
        ? Array.from(communityLabelMap.keys())
        : Array.from(new Set(nodes.map(n => n.type)));
      const centers = window.RNGraph3D?.buildMagneticCenters3D
        ? window.RNGraph3D.buildMagneticCenters3D(categories)
        : {};
      return {
        enabled: true,
        centers,
        getKey: d => ((colorMode === 'community') ? d.community : d.type) || '',
      };
    }

    function ensureGraph3DView() {
      if (graph3dView || !window.RNGraph3D?.create || !graphCanvas3d) return graph3dView;
      try {
        graph3dView = window.RNGraph3D.create({
        container: graphCanvas3d,
        nodes,
        edges,
        resolveSourceNode: (id) => nodes.find(n => n.id === id),
        getNodeColor: nodeColor,
        getNodeRadius: scaledRadius,
        getLinkColor: edgeBaseColor,
        getLinkWidth: () => linkWidthBase,
        isDark,
        getVisibleNodeIds: () => visibleNodeIds,
        hasActiveFilter: hasActiveGraphFilter,
        edgeHighlightsWithNode,
        getChargeStrength: () => chargeStrength,
        getMagneticConfig: getMagneticConfig3D,
        onNodeClick: (d, ev) => {
          if (timelinePlaying) return;
          if (isMobile) {
            if (pinnedNode === d) {
              pinnedNode = null;
              hideTooltip();
              clearGraph3DMobileHighlight();
            } else {
              pinnedNode = d;
              showTooltip(ev, d);
              syncGraph3DMobileHighlight(d);
            }
          } else {
            openSidebar(d);
          }
        },
        onNodeHover: (d, pointer) => {
          graph3dHoverNode = d || null;
          if (timelineAnimating || isMobile) return;
          if (sidebar.classList.contains('open')) {
            if (d && sidebarFocusIds && sidebarFocusIds.has(d.id)) showTooltip(pointer, d);
            else hideTooltip();
            return;
          }
          if (hasActiveGraphFilter() && d && !visibleNodeIds.has(d.id)) {
            hideTooltip();
            return;
          }
          if (d) showTooltip(pointer, d);
          else hideTooltip();
        },
        onPointerMove: (ev) => {
          if (!is3DView() || timelineAnimating || isMobile) return;
          if (!graph3dHoverNode) return;
          if (sidebar.classList.contains('open')) {
            if (sidebarFocusIds && sidebarFocusIds.has(graph3dHoverNode.id)) showTooltip(ev, graph3dHoverNode);
            return;
          }
          if (hasActiveGraphFilter() && !visibleNodeIds.has(graph3dHoverNode.id)) return;
          showTooltip(ev, graph3dHoverNode);
        },
        onBackgroundClick: () => {
          graph3dHoverNode = null;
          if (isMobile) {
            dismissMobilePinnedTooltip();
            return;
          }
          hideTooltip();
          closeSidebar();
        },
      });
      } catch (err) {
        console.error('3D graph init failed:', err);
        graph3dView = null;
      }
      return graph3dView;
    }

    function setSpatialViewMode(mode, opts) {
      opts = opts || {};
      if (mode !== '2d' && mode !== '3d') return;
      if (!opts.force && mode === spatialViewMode) return;

      // 切换视图前先干净退出时序动画（2D / 3D 任一形态），避免遗留定时器与显隐状态跨视图泄漏。
      if (timelineAnimating) teardownTimelineMode();

      // 先切换状态：resumeSimulation2D / 力模拟 tick / fitToScreen 都依赖 is3DView()，
      // 必须在调用它们之前就反映目标视图，否则回到 2D 时力模拟会被旧状态挡住、无法重启。
      spatialViewMode = mode;

      if (mode === '3d') {
        if (!window.RNGraph3D?.isAvailable?.()) {
          spatialViewMode = '2d';
          window.alert('3D 视图库加载失败，请刷新页面后重试');
          return;
        }
        pauseSimulation2D();
        svg.style('display', 'none');
        graphCanvas3d.hidden = false;
        ensureGraph3DView();
        if (!graph3dView) {
          spatialViewMode = '2d';
          graphCanvas3d.hidden = true;
          graph3dHoverNode = null;
          hideTooltip();
          svg.style('display', 'block');
          syncGraphDomFromSimulation();
          resumeSimulation2D();
          window.alert('3D 视图初始化失败，请刷新页面后重试');
          return;
        }
        graph3dView.show();
        graph3dView.syncFilters();
        if (isMobile && pinnedNode) syncGraph3DMobileHighlight(pinnedNode);
        // 不在切换时自动适配：仅首次力布局结束后由 graph-3d 自动适配一次，
        // 之后只有用户点「适配屏幕」按钮才适配。
      } else {
        if (graph3dView) graph3dView.hide();
        graphCanvas3d.hidden = true;
        graph3dHoverNode = null;
        hideTooltip();
        svg.style('display', 'block');
        syncGraphDomFromSimulation();
        resumeSimulation2D();
        fitToScreen();
      }

      try { localStorage.setItem(SPATIAL_VIEW_KEY, mode); } catch (_e) { /* ignore */ }
      updateViewModeButtons();
      updateGraphHint();
      syncTimeline3DState();
      syncMagneticCheckbox();
      updateForces();
    }

    function syncTimeline3DState() {
      if (timelineAnimateBtn) {
        timelineAnimateBtn.disabled = false;
        timelineAnimateBtn.title = is3DView()
          ? '按页面更新时间顺序在 3D 立体视图中逐帧激活节点与连线'
          : '按页面更新时间顺序逐帧显现节点与连线（类似 Obsidian 图谱 Animate）';
      }
    }

    updateGraphHint();
    updateViewModeButtons();

    /* ── 主题辅助（响应 data-theme 切换）── */
    function isDark() {
      return document.documentElement.getAttribute('data-theme') !== 'light';
    }
    function edgeBaseColor() {
      return isDark() ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.1)';
    }
    function labelFill() {
      return isDark() ? 'rgba(255,255,255,0.55)' : 'rgba(0,0,0,0.5)';
    }

    const HEALTH_COLORS = ['#f87171', '#fb923c', '#facc15', '#4ade80'];
    function metaBadgeColor(d) {
      if (colorMode === 'community') {
        return d.community
          ? (communityColorMap.get(d.community) || COMMUNITY_COLORS[9])
          : (TYPE_COLOR[d.type] || TYPE_COLOR['']);
      }
      if (colorMode === 'health') {
        const score = d.health_score != null ? Math.min(d.health_score, 3) : 0;
        return HEALTH_COLORS[score];
      }
      return TYPE_COLOR[d.type] || TYPE_COLOR[''];
    }
    function buildNodeMetaBadges(d) {
      if (!window.RNGraphTooltip?.buildMetaBadgesHtml) return '';
      return window.RNGraphTooltip.buildMetaBadgesHtml({
        type: d.type || '',
        typeColors: TYPE_COLOR,
        badgeColor: metaBadgeColor(d),
      });
    }
    function nodeColor(d)  {
      if (colorMode === 'community') {
        return communityColorMap.get(d.community) || COMMUNITY_COLORS[9];
      }
      if (colorMode === 'health') {
        return HEALTH_COLORS[d.health_score != null ? Math.min(d.health_score, 3) : 0];
      }
      return TYPE_COLOR[d.type] || TYPE_COLOR[''];
    }
    // 节点半径标尺与首页预览、详情页知识地图共用（graph-node-size.js）：
    // 度数 1 → 最小半径，全图最大度数 → 最大半径
    let graphMaxDegree = 1;
    function baseRadius(d) { return window.RNGraphNodeSize.radiusForDegree(d._degree || 0, graphMaxDegree); }
    function scaledRadius(d) { return baseRadius(d) * nodeScale; }
    // 最终字号 = max(6, baseRadius × nodeScale × 0.4 × (fontSliderVal/10))
    // 当前常量 nodeScale=1、fontSliderVal=15 ⇒ 字号 = max(6, baseRadius×0.6)；
    // baseRadius∈[4,30] 对应约 [6,18]px（6px 为下限，防止低度数节点标签过小）
    function scaledFontSize(d) { return Math.max(6, baseRadius(d) * nodeScale * 0.4 * (fontSliderVal / 10)); }
    function toDetailId(path) {
      const item = indexItems && indexItems.find(it => it.path === path || it.id === path);
      return item?.id || path.replace(/\//g, '-').replace('.md', '');
    }
    function pageUrlForNode(d) {
      const detailId = d.detail_id || toDetailId(d.id);
      if (d.type === 'roadmap_page' || (d.id && String(d.id).startsWith('roadmap/'))) {
        return 'roadmap.html?id=' + encodeURIComponent(detailId);
      }
      return 'detail.html?id=' + encodeURIComponent(detailId);
    }
    function pageUrlForPath(path, nodeHint) {
      const n = nodeHint || nodes.find(nd => nd.id === path);
      if (n) return pageUrlForNode(n);
      const detailId = toDetailId(path);
      if (String(path).startsWith('roadmap/')) {
        return 'roadmap.html?id=' + encodeURIComponent(detailId);
      }
      return 'detail.html?id=' + encodeURIComponent(detailId);
    }
    function pageLinkLabelForNode(d) {
      return (d.type === 'roadmap_page' || (d.id && String(d.id).startsWith('roadmap/')))
        ? '打开路线页 →' : '打开详情页 →';
    }
    function findFocusNode(focusId) {
      if (!focusId) return null;
      const decoded = decodeURIComponent(focusId);
      return nodes.find(n => n.id === focusId || n.id === decoded
        || n.detail_id === focusId || n.detail_id === decoded) || null;
    }
    function renderLegend() {
      const rows = [];
      if (colorMode === 'community') {
        rows.push('<div class="legend-title">按社区着色</div>');
        for (const community of getSortedCommunities()) {
          const communityId = community.id;
          const label = communityLabelMap.get(communityId) || community.label || communityId;
          const color = communityColorMap.get(communityId) || COMMUNITY_COLORS[9];
          const isActive = (focusedCommunityId === communityId);
          const countHtml = community.size != null
            ? `<span class="legend-count">${escapeHtml(String(community.size))}</span>`
            : '';
          rows.push(`<div class="legend-row ${isActive ? 'active' : ''}" data-community-id="${escapeHtml(String(communityId))}">
            <div class="legend-dot" style="background:${escapeHtml(String(color))}"></div><span class="legend-label-text">${escapeHtml(String(label))}</span>${countHtml}
          </div>`);
        }
      } else if (colorMode === 'health') {
        rows.push('<div class="legend-title">按健康度着色</div>');
        const healthRows = [
          { score: '0', color: '#f87171', label: '0分 — 缺 summary/sources' },
          { score: '1', color: '#fb923c', label: '1分 — 基础信息不完整' },
          { score: '2', color: '#facc15', label: '2分 — summary + sources 齐全' },
          { score: '3', color: '#4ade80', label: '3分 — 完整且近期更新' },
        ];
        for (const h of healthRows) {
          const isActive = (focusedHealth === h.score);
          rows.push(`<div class="legend-row ${isActive ? 'active' : ''}" data-health="${escapeHtml(String(h.score))}">
            <div class="legend-dot" style="background:${escapeHtml(String(h.color))}"></div>${escapeHtml(String(h.label))}
          </div>`);
        }
      } else {
        rows.push('<div class="legend-title">按类型着色</div>');
        const typeRows = TYPE_LEGEND_ORDER.map((type) => ({
          type,
          color: TYPE_COLOR[type] || TYPE_COLOR[''],
          label: formatTypeLegendLabel(type),
        }));
        for (const t of typeRows) {
          const isActive = (focusedType === t.type);
          rows.push(`<div class="legend-row ${isActive ? 'active' : ''}" data-type="${escapeHtml(String(t.type))}">
            <div class="legend-dot" style="background:${escapeHtml(String(t.color))}"></div>${escapeHtml(String(t.label))}
          </div>`);
        }
      }
      graphLegend.innerHTML = rows.join('');
      if (graphLegendFab) {
        const fabLabels = {
          community: '按社区着色',
          health: '按健康度着色',
          type: '按类型着色',
        };
        const label = fabLabels[colorMode] || '图例';
        graphLegendFab.title = label;
        graphLegendFab.setAttribute('aria-label', '打开' + label + '图例');
      }
    }

    /* ── 加载页进度控制 ──
       下载数据(5→78%) → 解析(→80%) → 构图渲染(→100%)；力布局在加载页关闭后于画布上继续展开。 */
    const loadingEl    = document.getElementById('graph-loading');
    const loadingFill  = document.getElementById('graph-loading-fill');
    const loadingPct   = document.getElementById('graph-loading-pct');
    const loadingTitle = document.getElementById('graph-loading-title');
    let loadingValue = 0;
    let loadingDone  = false;

    function setLoadingProgress(pct) {
      if (loadingDone) return;
      pct = Math.max(loadingValue, Math.min(99, pct));  // 单调递增、封顶 99，完成时才到 100
      loadingValue = pct;
      if (loadingFill) loadingFill.style.width = pct.toFixed(0) + '%';
      if (loadingPct)  loadingPct.textContent = Math.round(pct) + '%';
    }

    function finishLoading() {
      if (loadingDone) return;
      loadingDone = true;
      if (loadingFill) loadingFill.style.width = '100%';
      if (loadingPct)  loadingPct.textContent = '100%';
      if (loadingEl) {
        loadingEl.classList.add('is-hidden');
        setTimeout(() => { loadingEl.hidden = true; }, 500);
      }
    }

    function failLoading(msg) {
      if (loadingDone) return;
      loadingDone = true;  // 停止后续进度推进
      if (loadingEl) loadingEl.classList.add('is-error');
      if (loadingTitle) loadingTitle.textContent = msg || '加载失败，请刷新页面重试';
      if (loadingPct) loadingPct.textContent = '';
    }

    /* 流式读取以反映真实下载进度；无法读取流或缺少 Content-Length 时退化为一次性解析。 */
    async function fetchJsonWithProgress(url, onProgress) {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const total = Number(resp.headers.get('Content-Length')) || 0;
      if (!resp.body || !resp.body.getReader || !total) return resp.json();
      const reader = resp.body.getReader();
      const chunks = [];
      let received = 0;
      for (;;) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        received += value.length;
        if (onProgress) onProgress(Math.min(1, received / total));
      }
      let size = 0;
      for (const c of chunks) size += c.length;
      const merged = new Uint8Array(size);
      let pos = 0;
      for (const c of chunks) { merged.set(c, pos); pos += c.length; }
      return JSON.parse(new TextDecoder('utf-8').decode(merged));
    }

    setLoadingProgress(5);

    /* ── 加载数据 ──
       仅首屏阻塞 link-graph.json（~570KB，含 summary）。
       index-v1.json（~3.4MB）懒加载，供节点侧栏的 tags / related / source_links 使用。 */
    let graphData;
    let indexItems = [];
    try {
      graphData = await fetchJsonWithProgress('exports/link-graph.json', frac => {
        setLoadingProgress(5 + frac * 73);   // 下载阶段（首屏主要耗时）：5% → 78%
      });
    } catch (e) {
      const countEl = document.getElementById('graph-node-count');
      if (countEl) {
        countEl.textContent = '数据加载失败';
        countEl.title = e.message || '';
      }
      failLoading('数据加载失败，请刷新页面重试');
      return;
    }
    setLoadingProgress(80);   // 数据解析完成，进入构图渲染
    fetch('exports/index-v1.json')
      .then(r => r.json())
      .then(d => { indexItems = d.items || []; })
      .catch(() => { /* 侧栏 tags / related 退化为空，不阻塞主图 */ });

    initCommunityMapsFromGraph();
    initInstitutionMapsFromGraph();
    renderInstitutionFilterSection();
    renderLegend();

    /* ── 计算节点度数 ── */
    const degreeMap = window.RNGraphNodeSize.computeDegreeMap(graphData.edges);
    graphMaxDegree = window.RNGraphNodeSize.maxDegreeOf(degreeMap);

    /* ── 准备节点/边数据：title / summary / recency 都直接来自 link-graph.json ── */
    const nodes = graphData.nodes.map(n => ({
      ...n,
      recency: n.recency || '1970-01-01',
      _degree: degreeMap[n.id] || 0,
      _info: { title: n.label || n.id, summary: n.summary || '' },
    }));
    const edges = graphData.edges.map(e => ({ ...e }));

    /* ── 连接数 Top N 筛选（滑动条）── */
    const totalNodeCount = nodes.length;
    const degreeTopMin = Math.min(10, totalNodeCount);
    let topDegreeLimit = totalNodeCount;
    let topDegreeIds = null;

    function computeTopDegreeIds(limit) {
      if (limit >= totalNodeCount) return null;
      return new Set(
        nodes.slice()
          .sort((a, b) => (b._degree || 0) - (a._degree || 0))
          .slice(0, limit)
          .map(n => n.id)
      );
    }

    function nodeMatchesDegreeTop(d) {
      return !topDegreeIds || topDegreeIds.has(d.id);
    }

    function updateDegreeTopLabel() {
      const valEl = document.getElementById('val-degree-top');
      if (!valEl) return;
      valEl.textContent = topDegreeLimit >= totalNodeCount ? '全部' : String(topDegreeLimit);
    }

    function initDegreeTopSlider() {
      const slider = document.getElementById('sl-degree-top');
      if (!slider) return;
      slider.min = String(degreeTopMin);
      slider.max = String(totalNodeCount);
      slider.value = String(topDegreeLimit);
      updateDegreeTopLabel();
    }

    function setTopDegreeLimit(limit) {
      topDegreeLimit = Math.max(degreeTopMin, Math.min(totalNodeCount, Number(limit)));
      topDegreeIds = computeTopDegreeIds(topDegreeLimit);
      const slider = document.getElementById('sl-degree-top');
      if (slider) slider.value = String(topDegreeLimit);
      updateDegreeTopLabel();
      applyFilters();
      updateFilterCount();
    }

    initDegreeTopSlider();
    const slDegreeTop = document.getElementById('sl-degree-top');
    if (slDegreeTop) {
      slDegreeTop.addEventListener('input', ev => {
        if (areFiltersLocked()) return;
        setTopDegreeLimit(ev.target.value);
      });
      slDegreeTop.addEventListener('change', () => {
        if (topDegreeIds) fitToScreen();
      });
    }

    /* ── 初始化搜索自动联想 ── */
    const searchList = document.getElementById('graph-search-list');
    if (searchList) {
      searchList.innerHTML = nodes.map(n => '<option value="' + escapeHtml(n._info.title || n.label) + '"></option>').join('');
    }

    /* ── SVG 尺寸（移动端首屏 clientHeight 可能为 0，需延后 fit）── */
    const wrap = document.getElementById('graph-wrap');
    const svg = d3.select('#graph-canvas');
    let W = 0;
    let H = 0;

    function measureGraphViewport() {
      if (!wrap) return false;
      const nextW = wrap.clientWidth;
      const nextH = wrap.clientHeight;
      if (nextW <= 0 || nextH <= 0) return false;
      W = nextW;
      H = nextH;
      svg.attr('width', W).attr('height', H);
      return true;
    }

    function updateGraphViewport() {
      if (!measureGraphViewport()) return false;
      if (simulation) {
        simulation.force('center', d3.forceCenter(W / 2, H / 2).strength(0.05));
      }
      return true;
    }

    function whenGraphViewportReady(callback, attempt) {
      const n = attempt || 0;
      if (updateGraphViewport()) {
        callback();
        return;
      }
      if (n < 80) {
        requestAnimationFrame(() => whenGraphViewportReady(callback, n + 1));
        return;
      }
      window.addEventListener('load', () => {
        if (updateGraphViewport()) callback();
      }, { once: true });
    }

    /* ── Zoom ── */
    const GRAPH_ZOOM_MIN = 0.08;
    const GRAPH_ZOOM_MAX = 5;
    const gRoot = svg.append('g');
    const zoom = d3.zoom()
      .scaleExtent([GRAPH_ZOOM_MIN, GRAPH_ZOOM_MAX])
      .on('zoom', ev => {
        gRoot.attr('transform', ev.transform);
        const k = ev.transform.k;
        label.style('opacity', k > 0.6 ? Math.min(1, (k - 0.6) * 2.5) : 0);
      });
    svg.call(zoom);

    // 尽早拿到视口尺寸；若容器尚未布局完成则用兜底尺寸，
    // 避免 W=H=0 时 forceCenter(0,0) 把所有节点钉在 SVG 左上角。
    if (!measureGraphViewport()) {
      W = 1200;
      H = 800;
      svg.attr('width', W).attr('height', H);
    }

    function randomizeNodePositions() {
      const cx = W / 2;
      const cy = H / 2;
      for (const n of nodes) {
        n.fx = null;
        n.fy = null;
        n.vx = 0;
        n.vy = 0;
        n.x = cx + (Math.random() - 0.5) * 80;
        n.y = cy + (Math.random() - 0.5) * 80;
      }
    }

    /* ── 力模拟 ── */
    const simulation = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(edges).id(d => d.id).distance(80).strength(0.35))
      .force('charge', d3.forceManyBody().strength(chargeStrength).distanceMax(400))
      .force('center', d3.forceCenter(W / 2, H / 2).strength(0.05))
      .force('collision', d3.forceCollide().radius(d => scaledRadius(d) + 5).strength(0.7))
      .alphaDecay(0.025);

    function pauseSimulation2D() {
      simulation.stop();
      simulation.alphaTarget(0);
    }

    function resumeSimulation2D() {
      if (is3DView()) return;
      simulation.alphaTarget(0);
      simulation.alpha(0.18).restart();
    }

    function updateForces() {
      if (is3DView() && graph3dView) {
        graph3dView.updateForces();
        return;
      }
      if (is3DView()) return;
      simulation.force('charge').strength(chargeStrength);
      
      if (isMagnetic2D) {
        const categories = (colorMode === 'community') 
          ? Array.from(communityLabelMap.keys())
          : Array.from(new Set(nodes.map(n => n.type)));
          
        const angleStep = (2 * Math.PI) / (categories.length || 1);
        const radius = Math.min(W, H) * 0.25;
        const centers = {};
        categories.forEach((cat, i) => {
          centers[cat] = {
            x: W/2 + radius * Math.cos(i * angleStep),
            y: H/2 + radius * Math.sin(i * angleStep)
          };
        });

        const getTargetX = d => {
          const key = (colorMode === 'community') ? d.community : d.type;
          return centers[key]?.x || W/2;
        };
        const getTargetY = d => {
          const key = (colorMode === 'community') ? d.community : d.type;
          return centers[key]?.y || H/2;
        };

        simulation.force('x', d3.forceX(getTargetX).strength(0.18));
        simulation.force('y', d3.forceY(getTargetY).strength(0.18));
      } else {
        simulation.force('x', null);
        simulation.force('y', null);
      }
      simulation.alpha(0.3).restart();
    }

    /* ── 渲染边 ── */
    setLoadingProgress(88);   // 开始挂载节点/边 DOM
    const gEdges = gRoot.append('g').attr('class', 'edges');
    const link = gEdges.selectAll('line')
      .data(edges)
      .join('line')
      .attr('stroke', edgeBaseColor())
      .attr('stroke-width', linkWidthBase);

    /* ── 渲染节点 ── */
    const gNodes = gRoot.append('g').attr('class', 'nodes');
    const node = gNodes.selectAll('g')
      .data(nodes)
      .join('g')
      .attr('class', 'node-g')
      .style('cursor', 'pointer')
      .call(d3.drag()
        .on('start', (ev, d) => {
          if (is3DView()) return;
          if (!ev.active) simulation.alphaTarget(0.3).restart();
          d.fx = d.x; d.fy = d.y;
        })
        .on('drag', (ev, d) => {
          if (is3DView()) return;
          d.fx = ev.x; d.fy = ev.y;
        })
        .on('end', (ev, d) => {
          if (is3DView()) return;
          if (!ev.active) simulation.alphaTarget(0);
          d.fx = null; d.fy = null;
        })
      );

    node.append('circle')
      .attr('class', 'node-glow')
      .attr('r', d => scaledRadius(d) + 6)
      .attr('fill', d => nodeColor(d))
      .attr('fill-opacity', 0)
      .attr('stroke', 'none');

    node.append('circle')
      .attr('class', 'node-circle')
      .attr('r', scaledRadius)
      .attr('fill', d => nodeColor(d))
      .attr('fill-opacity', 1)
      .attr('stroke', d => nodeColor(d))
      .attr('stroke-width', 1.5)
      .attr('stroke-opacity', 0.35);

    const label = node.append('text')
      .attr('class', 'node-label')
      .text(d => d._info.title || d.label)
      .attr('dy', d => scaledRadius(d) + 13)
      .attr('text-anchor', 'middle')
      .attr('font-size', d => scaledFontSize(d) + 'px')
      .attr('fill', labelFill())
      .attr('pointer-events', 'none')
      .style('opacity', 0);

    let entered3dOnLoad = false;
    function enter3dOnLoadOnce() {
      if (entered3dOnLoad) return;
      entered3dOnLoad = true;
      try { setSpatialViewMode('3d', { force: true }); }
      catch (err) { console.error('3D graph init failed on load:', err); }
    }

    function finishGraphRenderLoad() {
      finishLoading();
      if (spatialViewMode === '3d') {
        requestAnimationFrame(() => whenGraphViewportReady(enter3dOnLoadOnce));
      }
    }

    syncGraphDomFromSimulation();
    whenGraphViewportReady(() => finishGraphRenderLoad());

    function getFilterOptions() {
      if (colorMode === 'community') {
        return getSortedCommunities().map((community) => ({
          value: community.id,
          label: formatCommunityOptionLabel(community.id),
          color: communityColorMap.get(community.id) || COMMUNITY_COLORS[9]
        }));
      }
      if (colorMode === 'health') {
        return HEALTH_FILTER_OPTIONS;
      }
      return TYPE_FILTER_OPTIONS;
    }

    function getColorModeLabel(mode) {
      if (mode === 'community') return '按社区';
      if (mode === 'health') return '按健康度';
      return '按类型';
    }

    function renderFilterPanel() {
      const title = '🔍 图谱筛选';
      if (filterToggle) filterToggle.title = '图谱筛选（当前' + getColorModeLabel(colorMode) + '）';
      if (filterPanelTitle) filterPanelTitle.textContent = title;
      if (filterLabel) filterLabel.textContent = '筛选';
      if (filterSubtitle) filterSubtitle.textContent = '当前' + getColorModeLabel(colorMode) + '着色与筛选';
      if (filterModeTypeBtn) filterModeTypeBtn.classList.toggle('active', colorMode === 'type');
      if (filterModeCommunityBtn) filterModeCommunityBtn.classList.toggle('active', colorMode === 'community');
      if (filterModeHealthBtn) filterModeHealthBtn.classList.toggle('active', colorMode === 'health');
      if (!filterPanelBody) return;
      const options = getFilterOptions();
      if (!options.length) {
        filterPanelBody.innerHTML = '<div class="filter-empty">当前暂无可筛选项</div>';
      } else {
        filterPanelBody.innerHTML =
          '<div class="filter-section-title">' + escapeHtml(getColorModeLabel(colorMode)) + '筛选</div>'
          + options.map(option => {
              const checked = activeFilters.has(option.value) ? ' checked' : '';
              const meta = colorMode === 'community' ? communityMetaMap.get(option.value) : null;
              const countBadge = meta && meta.size != null
                ? '<span class="filter-count-badge">' + escapeHtml(String(meta.size)) + '</span>'
                : '';
              return '<label class="filter-item">'
                + '<input type="checkbox" value="' + escapeHtml(option.value) + '"' + checked + ' /> '
                + '<span class="filter-dot" style="background:' + escapeHtml(option.color) + '"></span>'
                + '<span class="filter-item-label">' + escapeHtml(option.label) + '</span>'
                + countBadge
                + '</label>';
            }).join('');
      }

      filterPanelBody.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', () => {
          if (areFiltersLocked()) return;
          if (cb.checked) {
            activeFilters.add(cb.value);
          } else {
            activeFilters.delete(cb.value);
          }
          applyFilters();
          updateFilterCount();
        });
      });
    }

    function refreshNodeColors() {
      node.select('.node-glow').attr('fill', d => nodeColor(d));
      node.select('.node-circle')
        .attr('fill', d => nodeColor(d))
        .attr('stroke', d => nodeColor(d));
      if (graph3dView) graph3dView.refreshColors();
      renderLegend();
      renderFilterPanel();
      refreshMetaBadges();
    }

    function refreshMetaBadges() {
      if (pinnedNode && tooltip && !tooltip.classList.contains('hidden')) {
        tooltip.innerHTML = tooltipHtml(pinnedNode);
      }
      if (sidebarNode && sidebar?.classList.contains('open') && sbMetaBadges) {
        sbMetaBadges.innerHTML = buildNodeMetaBadges(sidebarNode);
      }
    }

    function setColorMode(mode) {
      if (areFiltersLocked()) return;
      if (colorMode === mode) return;
      colorMode = mode;
      activeFilters.clear();
      focusedCommunityId = null;
      focusedType = null;
      focusedHealth = null;
      updateFilterCount();
      refreshNodeColors();
      applyFilters();
      if (isMagneticForCurrentView()) updateForces();
    }

    if (filterModeTypeBtn) filterModeTypeBtn.addEventListener('click', () => setColorMode('type'));
    if (filterModeCommunityBtn) filterModeCommunityBtn.addEventListener('click', () => setColorMode('community'));
    if (filterModeHealthBtn) filterModeHealthBtn.addEventListener('click', () => setColorMode('health'));

    function syncGraphDomFromSimulation() {
      link
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    }

    function finishSimulationLoad() {
      node.select('.node-label').transition().duration(400).style('opacity', 0.85);
      whenGraphViewportReady(() => fitToScreen());
    }

    function restartForceSimulation() {
      if (is3DView() && graph3dView) {
        graph3dView.restartSimulation();
        graph3dView.fitToScreen(350);
        return;
      }
      node.select('.node-label').style('opacity', 0);
      updateGraphViewport();
      randomizeNodePositions();
      syncGraphDomFromSimulation();
      simulation.alpha(1).restart();
    }

    /* ── Tick ── */
    simulation.on('tick', () => {
      if (is3DView()) return;
      syncGraphDomFromSimulation();
    });

    /* ── 布局稳定后标签渐显 ── */
    simulation.on('end', () => {
      if (timelineAnimating) return;   // 时序动画期间不触发整图标签渐显 / 自适应
      finishSimulationLoad();
    });

    setTimeout(() => {
      if (simulation.alpha() > 0.01) return;
      finishSimulationLoad();
    }, 1200);

    const restartSimulationBtn = document.getElementById('restart-simulation');
    if (restartSimulationBtn) {
      restartSimulationBtn.addEventListener('click', () => {
        if (timelineAnimating) teardownTimelineMode();   // 先干净退出时序动画
        restartForceSimulation();                        // 再对整图重新随机布局
      });
    }

    /* ── Tooltip ── */
    const tooltip = document.getElementById('graph-tooltip');

    /* ── 移动端检测 ── */
    const isMobile = window.matchMedia('(hover: none) and (pointer: coarse)').matches;

    /* ── 固定卡片状态（仅移动端使用）── */
    let pinnedNode = null;
    let sidebarNode = null;

    function tooltipSummary(raw) {
      return window.RNGraphTooltip?.formatTooltipSummary
        ? window.RNGraphTooltip.formatTooltipSummary(raw, 100)
        : (raw || '');
    }

    function tooltipHtml(d) {
      const info = d._info;
      const summary = tooltipSummary(info.summary);
      const detailUrl = pageUrlForNode(d);
      if (window.RNGraphTooltip?.buildNodeTooltipHtml) {
        return window.RNGraphTooltip.buildNodeTooltipHtml({
          type: d.type || '',
          typeColors: TYPE_COLOR,
          badgeColor: metaBadgeColor(d),
          title: info.title || d.label,
          summary,
          linkHtml: `<a class="tt-link" href="${escapeHtml(detailUrl)}" target="_self">${escapeHtml(pageLinkLabelForNode(d))}</a>`
        });
      }
      return '';
    }

    function showTooltip(ev, d) {
      if (!d) return;
      tooltip.innerHTML = tooltipHtml(d);
      tooltip.classList.remove('hidden');
      // 清理可能残留的 left/top/width，确保重新计算尺寸
      tooltip.style.left = '';
      tooltip.style.top = '';
      tooltip.style.width = '';
      tooltip.style.transform = '';
      if (isMobile) {
        tooltip.classList.add('tt-pinned');
        tooltip.style.right = '20px';
        tooltip.style.bottom = '20px';
        pinnedNode = d;
      } else {
        tooltip.classList.remove('tt-pinned');
        moveTooltip(ev);
      }
    }

    function moveTooltip(ev) {
      if (!ev || ev.clientX == null || ev.clientY == null) return;
      const x = ev.clientX + 14, y = ev.clientY - 10;
      const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
      tooltip.style.left = (x + tw > window.innerWidth - 20 ? x - tw - 28 : x) + 'px';
      tooltip.style.top  = (y + th > window.innerHeight - 20 ? y - th : y) + 'px';
      tooltip.style.transform = '';
    }

    function hideTooltip() {
      tooltip.classList.add('hidden');
      tooltip.classList.remove('tt-pinned');
      tooltip.style.right = '';
      tooltip.style.bottom = '';
    }

    // 移动端 tooltip 内链接点击：先跳转，再关闭 tooltip（避免 pointer-events: none 中断导航）
    tooltip.addEventListener('click', ev => {
      const link = ev.target.closest && ev.target.closest('.tt-link');
      if (link) {
        const href = link.getAttribute('href');
        if (href) {
          // 先导航
          window.location.href = href;
          // 然后异步关闭 tooltip（确保导航已开始）
          setTimeout(() => {
            pinnedNode = null;
            hideTooltip();
            clearGraph3DMobileHighlight();
          }, 100);
        }
      }
    });

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    const NOTEBOOK_SITE_PREFIX = 'imchong.github.io/Humanoid_Robot_Learning_Paper_Notebooks/papers/';

    function normalizeSourceLinkEntry(entry) {
      if (entry == null) return { label: '', url: '' };
      if (typeof entry === 'string') return { label: entry, url: entry };
      return {
        label: String((entry && entry.label) || (entry && entry.url) || ''),
        url: String((entry && entry.url) || '')
      };
    }

    function isPaperNotebookHtmlUrl(url) {
      if (!url) return false;
      const base = String(url).split('#')[0].split('?')[0];
      return base.includes(NOTEBOOK_SITE_PREFIX) && /\.html$/i.test(base);
    }

    function cleanPaperNotebookLabel(label, url, fallbackTitle) {
      let text = String(label || '').trim();
      text = text.replace(/^机器人论文阅读笔记[:：]\s*/u, '');
      text = text.replace(/^[深读笔记论]+[:：<\s]+/u, '').replace(/[<>]+$/g, '').trim();
      if (!text || text.length < 3) {
        const stem = decodeURIComponent(String(url).split('/').pop().replace(/\.html$/i, ''));
        text = stem.replace(/__+/g, ': ').replace(/[_-]+/g, ' ').trim();
      }
      if (!text && fallbackTitle) text = String(fallbackTitle);
      return text || '论文阅读笔记';
    }

    function collectPaperNotebookLinks(item) {
      if (!item) return [];
      const seen = new Set();
      const out = [];
      function push(url, label) {
        if (!isPaperNotebookHtmlUrl(url) || !isSafeUrl(url)) return;
        const key = String(url).split('#')[0].split('?')[0];
        if (seen.has(key)) return;
        seen.add(key);
        out.push({ url: key, label: cleanPaperNotebookLabel(label, key, item.title) });
      }
      const mapped = item.paper_notebook_links;
      if (Array.isArray(mapped)) {
        mapped.forEach(entry => {
          const norm = normalizeSourceLinkEntry(entry);
          push(norm.url, norm.label);
        });
      }
      (item.source_links || []).forEach(entry => {
        const norm = normalizeSourceLinkEntry(entry);
        push(norm.url, norm.label);
      });
      const content = item.content_markdown || '';
      const mdRe = /\[机器人论文阅读笔记[:：]([^\]]+)\]\((https:\/\/imchong\.github\.io\/Humanoid_Robot_Learning_Paper_Notebooks\/papers\/[^)]+\.html)\)/gi;
      let match;
      while ((match = mdRe.exec(content)) !== null) {
        push(match[2], match[1]);
      }
      const bareRe = /https:\/\/imchong\.github\.io\/Humanoid_Robot_Learning_Paper_Notebooks\/papers\/[^\s)<>"']+\.html/gi;
      while ((match = bareRe.exec(content)) !== null) {
        push(match[0], '');
      }
      return out.slice(0, 6);
    }

    function isSafeUrl(url) {
      if (!url || (typeof url !== 'string' && typeof url !== 'number')) return false;
      // eslint-disable-next-line no-control-regex
    let s = String(url).replace(/[\x00-\x1F\x7F-\x9F]/g, '').trim();
      s = s.replace(/&#x([0-9a-f]+);?/gi, (_, hex) => String.fromCharCode(parseInt(hex, 16)))
           .replace(/&#([0-9]+);?/g, (_, dec) => String.fromCharCode(parseInt(dec, 10)))
           .replace(/&colon;?/gi, ':');
      if (/^\/\//.test(s)) return false;
      if (/^(?:https?|mailto|tel):/i.test(s)) return true;
      if (/:/i.test(s)) return false;
      return true;
    }

    /* ── 悬停高亮 ── */
    const neighborSet = new Set();
    // 选中态（侧边栏打开）下允许悬停浮窗的节点：选中节点 + 直连邻居；非选中态为 null
    let sidebarFocusIds = null;

    function buildNeighborSet(d) {
      neighborSet.clear();
      neighborSet.add(d.id);
      for (const e of edges) {
        const srcId = typeof e.source === 'object' ? e.source.id : e.source;
        const tgtId = typeof e.target === 'object' ? e.target.id : e.target;
        if (srcId === d.id) neighborSet.add(tgtId);
        if (tgtId === d.id) neighborSet.add(srcId);
      }
    }

    function hasActiveGraphFilter() {
      return topDegreeIds !== null || activeFilters.size > 0 || searchQuery.length > 0
        || focusedCommunityId || focusedType || focusedHealth !== null
        || activeInstitutions.size > 0 || currentTopic !== 'all';
    }

    function edgeNodeId(endpoint) {
      return typeof endpoint === 'object' ? endpoint.id : endpoint;
    }

    /** 悬停/聚焦高亮：筛选态下与灰色节点相连的边不参与高亮 */
    function edgeHighlightsWithNode(e, nodeId) {
      const s = edgeNodeId(e.source);
      const t = edgeNodeId(e.target);
      if (s !== nodeId && t !== nodeId) return false;
      if (!hasActiveGraphFilter()) return true;
      return visibleNodeIds.has(s) && visibleNodeIds.has(t);
    }

    node
      .on('mouseenter', (ev, d) => {
        // 时序动画进行中：禁用节点悬停，避免选中尚未显现的背景节点
        if (timelineAnimating) return;
        // V21 修复：如果当前已经点击聚焦了某个节点（侧边栏打开），跳过 hover 高亮逻辑；
        // 但选中节点及其直连邻居仍可悬停显示浮窗卡片
        if (sidebar.classList.contains('open')) {
          if (sidebarFocusIds && sidebarFocusIds.has(d.id)) showTooltip(ev, d);
          return;
        }
        // 筛选态下灰色节点不响应悬停（pointer-events 已关，此处作兜底）
        if (hasActiveGraphFilter() && !visibleNodeIds.has(d.id)) return;

        buildNeighborSet(d);
        const hasFilter = hasActiveGraphFilter();
        node.select('.node-circle').attr('fill-opacity', n => {
          // 过滤后被隐藏的节点保持原始低透明度，不被 hover 恢复
          if (hasFilter && !visibleNodeIds.has(n.id)) return 0.06;
          return neighborSet.has(n.id) ? 1 : 0.15;
        });
        node.select('.node-glow').attr('fill-opacity', n =>
          n.id === d.id ? 0.18 : 0);
        link
          .attr('stroke', e => {
            const dimColor = isDark() ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.06)';
            return edgeHighlightsWithNode(e, d.id) ? nodeColor(d) : dimColor;
          })
          .attr('stroke-width', e => {
            return edgeHighlightsWithNode(e, d.id) ? linkWidthBase * 1.8 : linkWidthBase * 0.5;
          })
          .attr('stroke-opacity', e => {
