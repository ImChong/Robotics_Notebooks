name: Auto Export & Lint

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - 'sources/**'
      - 'roadmap/**'
      - 'scripts/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-ci-lite.txt

      - name: Install lightweight dependencies
        run: pip install -r requirements-ci-lite.txt

      - name: Run CI preflight
        run: python3 scripts/ci_preflight.py

      - name: Commit updated exports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exports/ docs/exports/ docs/search-index.json docs/sitemap.xml index.md README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-export + badge [skip ci]"
            git push
          fi
